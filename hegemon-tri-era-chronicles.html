const MAP_COLORS = { greek: '#f59e0b', enemy: '#f43f5e', water: '#38bdf8', land: '#292524', landLine: '#57534e', label: '#d6d3d1' };

function MapShell({ children, legend }) {
  return (
    <div className="map-frame rounded-xl overflow-hidden">
      <svg viewBox="0 0 400 250" className="w-full h-auto block" role="img">
        <defs>
          <marker id="arrGreek" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill={MAP_COLORS.greek} />
          </marker>
          <marker id="arrEnemy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill={MAP_COLORS.enemy} />
          </marker>
          <pattern id="gridDots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="1.2" cy="1.2" r="1.2" fill="rgba(168,162,158,0.12)" />
          </pattern>
          <pattern id="marshHatch" width="12" height="8" patternUnits="userSpaceOnUse">
            <path d="M0 6 q3 -4 6 0 q3 4 6 0" stroke="rgba(74,222,128,0.5)" strokeWidth="1" fill="none" />

            <path d="M0 8 q6.5 -6 13 0 t13 0" stroke="rgba(56,189,248,0.35)" strokeWidth="1.1" fill="none" />
          </pattern>
        </defs>
        <rect width="400" height="250" fill="#0c0a09" />
        <rect width="400" height="250" fill="url(#gridDots)" />
        {children}
      </svg>
      <div className="flex flex-wrap gap-x-4 gap-y-1 px-3 py-2 border-t border-sky-400/15 text-[10px] uppercase tracking-wider text-stone-400 bg-stone-950/60">
        {legend.map((l, i) => (

          </span>

  );
}

              <div className={`w-11 h-11 rounded-lg border flex items-center justify-center mb-4 ${amber ? 'border-amber-500/40 bg-amber-500/10 text-amber-500' : 'border-sky-400/40 bg-sky-400/10 text-sky-400'}`}>
                <Icon name={ph.icon} size={22} strokeWidth={1.7} />
              </div>
              <p className={`text-[10px] font-bold uppercase tracking-[0.25em] mb-1 ${amber ? 'text-amber-500/80' : 'text-sky-400/80'}`}>
                {t.era} {['I', 'II', 'III'][i]} · {ph.range[lang]}
              </p>
              <h3 className="font-display font-bold text-lg text-stone-100 leading-snug">{ph.name[lang]}</h3>
              <p className="text-stone-400 text-xs mt-2.5 leading-relaxed">{ph.blurb[lang]}</p>
              <ul className="mt-4 space-y-1.5 border-t border-stone-700/50 pt-3">
                {eraScenarios.map((s) => (
                  <li key={s.id} className="flex items-center gap-2 text-[11px] text-stone-500">
                    <Icon name="ChevronRight" size={11} className={amber ? 'text-amber-600' : 'text-sky-600'} />
                    <span className="truncate">{s.title[lang]} · {t.year(s.year)}</span>
                  </li>
                ))}
              </ul>
              <span className={`mt-4 inline-flex items-center gap-2 text-xs font-bold uppercase tracking-wider ${amber ? 'text-amber-500' : 'text-sky-400'} group-hover:translate-x-1 transition-transform`}>
                <Icon name="Swords" size={14} /> {t.playEra}
              </span>
            </motion.button>
          );
        })}
      </div>
      <p className="text-center text-[11px] text-stone-600 mt-8 leading-relaxed max-w-3xl mx-auto">{t.hubFooter}</p>
    </motion.div>
  );
}

/* ============================================================
   SCENARIO VIEW — 3-step loop
   ============================================================ */
function ScenarioView({ lang, setLang, scenario, scenarioNum, totalScenarios, step, setStep, unity, power, chosenIndex, onChoose, onAdvance, isLastOfRun }) {
  const t = UI[lang];
  const phase = PHASES.find((p) => p.key === scenario.phase);
  const MapComp = MAPS[scenario.mapId];
  const chosen = chosenIndex != null ? scenario.choices[chosenIndex] : null;
  const positive = chosen ? (chosen.unity + chosen.power) > 0 : false;

  return (
    <motion.div key={scenario.id} {...fadeUp} className="w-full max-w-4xl mx-auto">
      {/* Command header */}
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div className="flex items-center gap-3">
          <span className="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-stone-900/80 border border-stone-700/60 text-[11px] font-bold uppercase tracking-widest text-stone-400">
            <Icon name={phase.icon} size={13} className="text-amber-500" /> {phase.name[lang]}
          </span>
          <span className="text-[11px] font-semibold uppercase tracking-widest text-stone-500">{t.scenarioOf(scenarioNum, totalScenarios)}</span>
        </div>
        <LangToggle lang={lang} setLang={setLang} />
      </div>

      {/* Metrics dashboard */}
      <div className="glass-card rounded-2xl px-5 py-4 mb-5 flex flex-col sm:flex-row gap-4 sm:gap-8">
        <MetricBar label={t.unity} value={unity} icon="Users" color="sky" />
        <MetricBar label={t.power} value={power} icon="Crown" color="amber" />
      </div>

      {/* Main tactical card */}
      <div className="glass-card rounded-2xl overflow-hidden">
        <div className="px-6 sm:px-8 pt-6 pb-5 border-b border-amber-500/15 greek-key-border">
          <div className="flex flex-wrap items-end justify-between gap-3">
            <div>
              <p className="text-amber-500/90 text-[11px] font-bold uppercase tracking-[0.25em] mb-1">{t.year(scenario.year)} · {t.location}: {scenario.location[lang]}</p>
              <h2 className="font-display font-bold text-2xl sm:text-3xl text-stone-100">{scenario.title[lang]}</h2>
            </div>
            <StepPips step={step} />
          </div>
        </div>

        <AnimatePresence mode="wait">
          {/* ---- STEP 1: SOURCE ANALYSIS ---- */}
          {step === 1 && (
            <motion.div key="s1" {...fadeUp} className="px-6 sm:px-8 py-7">
              <p className="flex items-center gap-2 text-sky-400 text-xs font-bold uppercase tracking-[0.2em] mb-5">
                <Icon name="Scroll" size={15} /> {t.step1Title}
              </p>
              <div className="relative rounded-xl border border-sky-400/25 bg-sky-400/5 px-6 py-6 sm:px-8">
                <span className="absolute -top-3 left-6 px-2.5 bg-stone-900 text-sky-400 text-[10px] font-bold uppercase tracking-widest border border-sky-400/25 rounded">
                  {t.theSourceSays}
                </span>
                <blockquote className="font-display text-lg sm:text-xl text-stone-200 leading-relaxed italic">
                  {scenario.source.quote[lang]}
                </blockquote>
                <p className="mt-4 text-sky-400/90 text-sm font-semibold flex items-center gap-2">
                  <Icon name="BookOpen" size={14} /> — {scenario.source.author[lang]}
                </p>
              </div>
              <div className="mt-7 flex justify-center">
                <motion.button
                  whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }}
                  onClick={() => setStep(2)}
                  className="inline-flex items-center gap-2.5 px-8 py-3.5 rounded-xl bg-gradient-to-r from-amber-600 to-amber-500 text-stone-950 font-bold text-sm uppercase tracking-widest shadow-glow-amber hover:from-amber-500 hover:to-amber-400 transition-colors"
                >
                  <Icon name="Compass" size={17} /> {t.analyzeSource}
                </motion.button>
              </div>
            </motion.div>
          )}

          {/* ---- STEP 2: STRATEGIC CHOICE & MAP ---- */}
          {step === 2 && (
            <motion.div key="s2" {...fadeUp} className="px-6 sm:px-8 py-7">
              <p className="flex items-center gap-2 text-sky-400 text-xs font-bold uppercase tracking-[0.2em] mb-5">
                <Icon name="Map" size={15} /> {t.step2Title}
              </p>
              <div className="rounded-xl border border-stone-700/60 bg-stone-900/50 px-5 py-4 mb-5">
                <p className="flex items-center gap-2 text-amber-500 text-[11px] font-bold uppercase tracking-widest mb-2">
                  <Icon name="AlertTriangle" size={13} /> {t.dilemmaTitle}
                </p>
                <p className="text-stone-300 text-sm leading-relaxed">{scenario.dilemma[lang]}</p>
              </div>
              <p className="flex items-center gap-2 text-stone-400 text-[11px] font-bold uppercase tracking-widest mb-2.5">
                <Icon name="Compass" size={13} className="text-sky-400" /> {t.mapTitle}
              </p>
              <MapComp lang={lang} />
              <p className="mt-6 mb-3 font-display text-amber-400 text-base font-bold">{t.choicePrompt}</p>
              <div className="grid grid-cols-1 gap-4">
                {scenario.choices.map((c, i) => (
                  <motion.button
                    key={i}
                    whileHover={{ y: -4, scale: 1.012 }} whileTap={{ scale: 0.99 }}
                    onClick={() => onChoose(i)}
                    className="text-left rounded-xl border border-stone-700/70 bg-stone-900/60 px-5 py-4 hover:border-amber-500/70 hover:shadow-glow-amber hover:bg-stone-900/90 transition-all duration-300 group"
                  >
                    <span className={`inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.25em] mb-2 ${i === 0 ? 'text-amber-500' : 'text-sky-400'}`}>
                      <Icon name="Swords" size={12} /> {i === 0 ? t.optionA : t.optionB}
                    </span>
                    <p className="text-stone-200 text-sm leading-relaxed group-hover:text-stone-50 transition-colors">{c.text[lang]}</p>
                  </motion.button>
                ))}
              </div>
            </motion.div>
          )}

          {/* ---- STEP 3: OUTCOME FEEDBACK ---- */}
          {step === 3 && chosen && (
            <motion.div key="s3" {...fadeUp} className="px-6 sm:px-8 py-7">
              <p className="flex items-center gap-2 text-sky-400 text-xs font-bold uppercase tracking-[0.2em] mb-5">
                <Icon name="Hourglass" size={15} /> {t.step3Title}
              </p>
              <div className={`rounded-xl border px-6 py-6 ${positive ? 'border-emerald-500/40 bg-emerald-500/5' : 'border-rose-500/40 bg-rose-500/5'}`}>
                <p className={`flex items-center gap-2 font-display font-bold text-lg mb-3 ${positive ? 'text-emerald-400' : 'text-rose-400'}`}>
                  <Icon name={positive ? 'TrendingUp' : 'Flame'} size={19} />
                  {positive ? t.outcomeTriumph : t.outcomeSetback}
                </p>
                <p className="text-stone-200 text-sm sm:text-[15px] leading-relaxed">{chosen.outcome[lang]}</p>
                <div className="mt-5 pt-4 border-t border-stone-700/50">
                  <p className="text-[10px] font-bold uppercase tracking-[0.25em] text-stone-500 mb-2.5">{t.metricShift}</p>
                  <div className="flex flex-wrap gap-2.5">
                    <DeltaChip label={t.unityDelta} delta={chosen.unity} color="sky" />
                    <DeltaChip label={t.powerDelta} delta={chosen.power} color="amber" />
                  </div>
                </div>
              </div>
              <div className="mt-7 flex justify-center">
                <motion.button
                  whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }}
                  onClick={onAdvance}
                  className="inline-flex items-center gap-2.5 px-8 py-3.5 rounded-xl bg-gradient-to-r from-sky-600 to-sky-500 text-stone-950 font-bold text-sm uppercase tracking-widest shadow-glow-sky hover:from-sky-500 hover:to-sky-400 transition-colors"
                >
                  {isLastOfRun ? t.concludePhase : t.nextScenario} <Icon name="ChevronRight" size={17} />
                </motion.button>
              </div>
            </motion.div>
          )}
        </AnimatePresence>
      </div>
    </motion.div>
  );
}

/* ============================================================
   ERA / GRAND CAMPAIGN OUTCOME SCREENS
   ============================================================ */
function EndingScreen({ lang, setLang, phaseKey, unity, power, mode, history, onContinue, onReplay, onHub, isGrandFinale }) {
  const t = UI[lang];
  const tier = resolveTier(unity, power);
  const phase = PHASES.find((p) => p.key === phaseKey);
  const ending = PHASE_ENDINGS[phaseKey][tier];
  const grand = GRAND_VERDICT[tier];
  const tierStyles = {
    golden: { ring: 'border-amber-500/60', glow: 'shadow-glow-amber', text: 'text-amber-400', icon: 'Trophy' },
    endured: { ring: 'border-sky-400/50', glow: 'shadow-glow-sky', text: 'text-sky-400', icon: 'Shield' },
    collapse: { ring: 'border-rose-500/50', glow: '', text: 'text-rose-400', icon: 'Flame' },
  }[tier];
  const canContinue = mode === 'all' && !isGrandFinale;

  return (
    <motion.div key={`end-${phaseKey}-${isGrandFinale}`} {...fadeUp} className="w-full max-w-3xl mx-auto">
      <div className="flex justify-end mb-4"><LangToggle lang={lang} setLang={setLang} /></div>
      <div className={`glass-card rounded-2xl overflow-hidden ${tierStyles.glow}`}>
        <div className="px-6 sm:px-10 pt-9 pb-7 text-center border-b border-stone-700/50">
          <motion.div initial={{ scale: 0.6, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} transition={{ duration: 0.6, delay: 0.15 }}
            className={`inline-flex items-center justify-center w-16 h-16 rounded-2xl border bg-stone-900/80 mb-4 ${tierStyles.ring} ${tierStyles.text}`}>
            <Icon name={tierStyles.icon} size={30} strokeWidth={1.6} />
          </motion.div>
          <p className="text-[11px] font-bold uppercase tracking-[0.3em] text-stone-500 mb-2">
            {isGrandFinale ? t.campaignComplete : `${t.phaseComplete} — ${phase.name[lang]}`}
          </p>
          <h2 className={`font-display font-black text-2xl sm:text-4xl ${tierStyles.text}`}>
            {isGrandFinale ? grand.title[lang] : ending.title[lang]}
          </h2>
        </div>
        <div className="px-6 sm:px-10 py-7">
          <p className="flex items-center gap-2 text-stone-500 text-[11px] font-bold uppercase tracking-[0.25em] mb-3">
            <Icon name="BookOpen" size={13} /> {t.verdict}
          </p>
          <p className="text-stone-200 text-sm sm:text-[15px] leading-relaxed">
            {isGrandFinale ? grand.text[lang] : ending.text[lang]}
          </p>
          {isGrandFinale && (
            <p className="text-stone-400 text-sm leading-relaxed mt-4 border-l-2 border-amber-500/40 pl-4 italic">
              {ending.text[lang]}
            </p>
          )}
          <div className="mt-7">
            <p className="text-[11px] font-bold uppercase tracking-[0.25em] text-stone-500 mb-3">{t.finalStanding}</p>
            <div className="flex flex-col sm:flex-row gap-4 sm:gap-8">
              <MetricBar label={t.unity} value={unity} icon="Users" color="sky" />
              <MetricBar label={t.power} value={power} icon="Crown" color="amber" />
            </div>
          </div>
          {history.length > 0 && (
            <div className="mt-7">
              <p className="text-[11px] font-bold uppercase tracking-[0.25em] text-stone-500 mb-3">{t.chronicleOfDecisions}</p>
              <ul className="space-y-2">
                {history.map((h, i) => {
                  const sc = SCENARIOS.find((s) => s.id === h.id);
                  const ch = sc.choices[h.choice];
                  const good = (ch.unity + ch.power) > 0;
                  return (
                    <li key={i} className="flex items-center justify-between gap-3 rounded-lg border border-stone-700/50 bg-stone-900/50 px-4 py-2.5">
                      <span className="flex items-center gap-2.5 text-xs text-stone-300 min-w-0">
                        <Icon name={good ? 'TrendingUp' : 'Flame'} size={13} className={good ? 'text-emerald-400 shrink-0' : 'text-rose-400 shrink-0'} />
                        <span className="truncate">{sc.title[lang]}</span>
                        <span className="text-stone-600 shrink-0">· {h.choice === 0 ? 'Α' : 'Β'}</span>
                      </span>
                      <span className="text-[11px] font-bold tabular-nums shrink-0">
                        <span className={ch.unity >= 0 ? 'text-sky-400' : 'text-rose-400'}>{ch.unity >= 0 ? '+' : ''}{ch.unity}U</span>
                        <span className="text-stone-600 mx-1">/</span>
                        <span className={ch.power >= 0 ? 'text-amber-400' : 'text-rose-400'}>{ch.power >= 0 ? '+' : ''}{ch.power}P</span>
                      </span>
                    </li>
                  );
                })}
              </ul>
            </div>
          )}
          <div className="mt-8 flex flex-wrap justify-center gap-3">
            {canContinue && (
              <motion.button whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }} onClick={onContinue}
                className="inline-flex items-center gap-2 px-7 py-3 rounded-xl bg-gradient-to-r from-amber-600 to-amber-500 text-stone-950 font-bold text-sm uppercase tracking-widest shadow-glow-amber">
                <Icon name="Swords" size={16} /> {t.continueCampaign}
              </motion.button>
            )}
            <motion.button whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }} onClick={onReplay}
              className="inline-flex items-center gap-2 px-7 py-3 rounded-xl border border-sky-400/40 bg-stone-900/70 text-sky-400 font-bold text-sm uppercase tracking-widest hover:border-sky-400/80 hover:shadow-glow-sky transition-all">
              <Icon name="RotateCcw" size={16} /> {t.replay}
            </motion.button>
            <motion.button whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }} onClick={onHub}
              className="inline-flex items-center gap-2 px-7 py-3 rounded-xl border border-stone-600/60 bg-stone-900/70 text-stone-300 font-bold text-sm uppercase tracking-widest hover:border-stone-400/60 transition-all">
              <Icon name="Home" size={16} /> {t.returnHub}
            </motion.button>
          </div>
        </div>
      </div>
    </motion.div>
  );
}

/* ============================================================
   ROOT APP — STATE MACHINE
   ============================================================ */
const BASELINE = { unity: 50, power: 20 };

function App() {
  const [lang, setLang] = useState('en');
  const [selectedPlayMode, setSelectedPlayMode] = useState(null); // "all" | "phase1" | "phase2" | "phase3" | null (hub)
  const [screen, setScreen] = useState('hub'); // 'hub' | 'game' | 'ending'
  const [currentScenarioIndex, setCurrentScenarioIndex] = useState(0);
  const [currentStep, setCurrentStep] = useState(1); // 1: Source, 2: Choice & Map, 3: Outcome
  const [unity, setUnity] = useState(BASELINE.unity);
  const [power, setPower] = useState(BASELINE.power);
  const [chosenIndex, setChosenIndex] = useState(null);
  const [history, setHistory] = useState([]);
  const [endedPhase, setEndedPhase] = useState(null);
  const [isGrandFinale, setIsGrandFinale] = useState(false);

  const runScenarios = useMemo(() => {
    if (!selectedPlayMode) return [];
    return selectedPlayMode === 'all' ? SCENARIOS : SCENARIOS.filter((s) => s.phase === selectedPlayMode);
  }, [selectedPlayMode]);

  const startRun = useCallback((mode) => {
    setSelectedPlayMode(mode);
    setCurrentScenarioIndex(0);
    setCurrentStep(1);
    setUnity(BASELINE.unity);
    setPower(BASELINE.power);
    setChosenIndex(null);
    setHistory([]);
    setEndedPhase(null);
    setIsGrandFinale(false);
    setScreen('game');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const scenario = runScenarios[currentScenarioIndex] || null;

  const handleChoose = useCallback((i) => {
    if (!scenario) return;
    const c = scenario.choices[i];
    setChosenIndex(i);
    setUnity((u) => clamp(u + c.unity));
    setPower((p) => clamp(p + c.power));
    setHistory((h) => [...h, { id: scenario.id, choice: i }]);
    setCurrentStep(3);
  }, [scenario]);

  const handleAdvance = useCallback(() => {
    if (!scenario) return;
    const isLastInRun = currentScenarioIndex === runScenarios.length - 1;
    const nextScenario = runScenarios[currentScenarioIndex + 1];
    const phaseBoundary = isLastInRun || (nextScenario && nextScenario.phase !== scenario.phase);
    if (phaseBoundary) {
      setEndedPhase(scenario.phase);
      setIsGrandFinale(selectedPlayMode === 'all' && isLastInRun);
      setScreen('ending');
    } else {
      setCurrentScenarioIndex((x) => x + 1);
      setCurrentStep(1);
      setChosenIndex(null);
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [scenario, currentScenarioIndex, runScenarios, selectedPlayMode]);

  const handleContinueCampaign = useCallback(() => {
    setScreen('game');
    setCurrentScenarioIndex((x) => x + 1);
    setCurrentStep(1);
    setChosenIndex(null);
    setEndedPhase(null);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const goHub = useCallback(() => {
    setSelectedPlayMode(null);
    setScreen('hub');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const isLastOfRun = scenario
    ? (currentScenarioIndex === runScenarios.length - 1 ||
       (runScenarios[currentScenarioIndex + 1] && runScenarios[currentScenarioIndex + 1].phase !== scenario.phase))
    : false;

  const endingHistory = useMemo(() => {
    if (!endedPhase) return history;
    if (isGrandFinale) return history;
    return history.filter((h) => {
      const sc = SCENARIOS.find((s) => s.id === h.id);
      return sc && sc.phase === endedPhase;
    });
  }, [history, endedPhase, isGrandFinale]);

  return (
    <div className="min-h-screen w-full px-4 py-8 sm:py-12 font-body">
      <AnimatePresence mode="wait">
        {screen === 'hub' && (
          <Hub key="hub" lang={lang} setLang={setLang} onStart={startRun} />
        )}
        {screen === 'game' && scenario && (
          <ScenarioView
            key={`game-${scenario.id}`}
            lang={lang} setLang={setLang}
            scenario={scenario}
            scenarioNum={currentScenarioIndex + 1}
            totalScenarios={runScenarios.length}
            step={currentStep} setStep={setCurrentStep}
            unity={unity} power={power}
            chosenIndex={chosenIndex}
            onChoose={handleChoose}
            onAdvance={handleAdvance}
            isLastOfRun={isLastOfRun}
          />
        )}
        {screen === 'ending' && endedPhase && (
          <EndingScreen
            key={`ending-${endedPhase}-${isGrandFinale}`}
            lang={lang} setLang={setLang}
            phaseKey={endedPhase}
            unity={unity} power={power}
            mode={selectedPlayMode}
            history={endingHistory}
            onContinue={handleContinueCampaign}
            onReplay={() => startRun(selectedPlayMode)}
            onHub={goHub}
            isGrandFinale={isGrandFinale}
          />
        )}
      </AnimatePresence>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
