<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SymposiON — Season & Temple FX Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,500;0,600;1,500&family=Montserrat:wght@500;600;700;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/tokens.css"/>
<link rel="stylesheet" href="css/shell.css"/>
<style>
  /* Force-allow motion for this PREVIEW page only, so the effects are
     always visible even if the OS/browser requests reduced motion. */
  @media (prefers-reduced-motion: reduce) { .season-fx { display: block !important; } }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Montserrat', system-ui, sans-serif; }
  .stage { position: relative; min-height: 100vh; overflow: hidden;
    background: radial-gradient(1200px 560px at 80% -10%, var(--terra-soft), transparent 58%), radial-gradient(820px 460px at 2% 6%, var(--gold-soft), transparent 52%), var(--bg);
    color: var(--fg); display: grid; place-items: center; padding: 40px 20px; transition: background .35s; }
  .demo { position: relative; z-index: 2; text-align: center; max-width: 640px; }
  .demo__ey { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: .2em; text-transform: uppercase; color: var(--terra-dk); }
  .demo__h1 { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: clamp(40px,8vw,80px); letter-spacing: .02em; text-transform: uppercase; margin: 10px 0 6px; line-height: .95; }
  .demo__h1 span { color: var(--terra); }
  .demo__p { font-family: 'Alegreya', serif; font-size: 18px; color: var(--fg-70); margin: 0 auto 20px; max-width: 30em; }
  .demo__card { display: inline-flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--line-bold); border-radius: 16px; padding: 16px 22px; box-shadow: 0 16px 40px var(--shadow); }
  .demo__mark { width: 44px; height: 44px; color: var(--fg); }
  .demo__big { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 22px; text-transform: uppercase; letter-spacing: .02em; }
  .demo__sub { font-size: 12px; color: var(--muted); }
  .demo__hint { margin-top: 26px; font-size: 13px; color: var(--muted); display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border: 1px dashed var(--line-bold); border-radius: 999px; animation: hintpulse 2.4s ease-in-out infinite; }
  @keyframes hintpulse { 0%,100%{opacity:.6} 50%{opacity:1} }

  /* control dock */
  .dock { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 9000;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: #14161b; border: 1px solid #2a2e36; border-radius: 16px; padding: 12px 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5); color: #cdd2da; max-width: 94vw; }
  .dock__grp { display: flex; flex-direction: column; gap: 6px; }
  .dock__lbl { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: #6b7280; font-weight: 700; }
  .dock__row { display: flex; gap: 4px; background: #0a0b0e; border: 1px solid #23262e; border-radius: 9px; padding: 3px; }
  .dock__b { border: 0; background: transparent; color: #9aa1ac; font-family: inherit; font-weight: 600; font-size: 12px; padding: 7px 11px; border-radius: 7px; cursor: pointer; white-space: nowrap; }
  .dock__b:hover { color: #e7ebf0; }
  .dock__b.on { background: #2a2e37; color: #fff; }
  .dock__back { font-size: 12px; color: #8a9099; text-decoration: none; padding: 8px 12px; border: 1px solid #2a2e36; border-radius: 9px; }
  .dock__back:hover { color: #fff; }
  @media (max-width: 640px){ .dock { gap: 10px; padding: 10px; } }
</style>
</head>
<body class="theme-alabaster">

<div class="stage theme-alabaster" id="stage">
  <div class="demo">
    <div class="demo__ey">Season &amp; Temple FX · Live Preview</div>
    <h1 class="demo__h1">Symposi<span>ON</span></h1>
    <p class="demo__p">Switch a season or equip a Temple particle below — the GSAP effect drifts over the page. Click anywhere to throw a glyph.</p>
    <div class="demo__card">
      <svg class="demo__mark" viewBox="0 0 100 100">
        <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="square"><line x1="22" y1="20" x2="78" y2="20"/><line x1="22" y1="20" x2="48" y2="50"/><line x1="48" y1="50" x2="22" y2="80"/><line x1="22" y1="80" x2="78" y2="80"/></g>
        <g fill="none" stroke="var(--terra)" stroke-width="3.2" stroke-linecap="round"><circle cx="64" cy="50" r="12" stroke-dasharray="62 12" stroke-dashoffset="-7" transform="rotate(-90 64 50)"/><line x1="64" y1="39" x2="64" y2="49"/></g>
      </svg>
      <div style="text-align:left">
        <div class="demo__big" id="stateLabel">No effect</div>
        <div class="demo__sub" id="stateSub">Pick a season or cosmetic →</div>
      </div>
    </div>
    <div class="demo__hint">✦ Click anywhere on the page to throw a glyph</div>
  </div>
</div>

<div class="dock" id="dock"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  // Preview-only: report motion as allowed so effects always show here.
  (function(){ const real = window.matchMedia.bind(window);
    window.matchMedia = (q)=> /reduced-motion/.test(q)
      ? { matches:false, media:q, onchange:null, addListener(){}, removeListener(){}, addEventListener(){}, removeEventListener(){}, dispatchEvent(){return false;} }
      : real(q); })();
</script>
<script src="js/seasons.js"></script>
<script>
(function(){
  const THEMES = { halloween:'theme-halloween', christmas:'theme-christmas', easter:'theme-easter', carnival:'theme-carnival' };
  const stage = document.getElementById('stage');
  const dock = document.getElementById('dock');
  let curSeason = null, curCosmetic = null;

  function setTheme(cls){
    document.body.className = cls; stage.className = 'stage ' + cls;
  }
  function label(){
    const sName = { halloween:'Halloween · Katabasis', christmas:'Christmas · Solstice', easter:'Easter · Anastasi', carnival:'Carnival · Apokries' };
    const cName = { 'pt-hearth':'Hearth Sparks', 'pt-golddust':'Gold Dust', 'pt-petals':'Falling Petals' };
    let big = 'No effect', sub = 'Pick a season or cosmetic →';
    if(curSeason){ big = sName[curSeason]; sub = 'Seasonal effect + cursor active'; }
    else if(curCosmetic){ big = cName[curCosmetic]; sub = 'Equipped Temple particle on the main page'; }
    document.getElementById('stateLabel').textContent = big;
    document.getElementById('stateSub').textContent = sub;
  }

  function group(lbl, opts, onpick){
    const g = document.createElement('div'); g.className='dock__grp';
    const l = document.createElement('div'); l.className='dock__lbl'; l.textContent=lbl; g.appendChild(l);
    const row = document.createElement('div'); row.className='dock__row';
    opts.forEach(([val,txt])=>{ const b=document.createElement('button'); b.className='dock__b'; b.textContent=txt;
      b.onclick=()=>{ row.querySelectorAll('.dock__b').forEach(x=>x.classList.remove('on')); b.classList.add('on'); onpick(val); };
      row.appendChild(b); });
    row.firstChild.classList.add('on');
    g.appendChild(row); return g;
  }

  dock.appendChild(group('Εποχή · Season', [
    ['none','None'],['halloween','🎃 Halloween'],['christmas','❄ Christmas'],['easter','🥚 Easter'],['carnival','🎭 Carnival']
  ], (v)=>{
    curSeason = v==='none'?null:v;
    if(curSeason){ setTheme(THEMES[curSeason]); SymSeasons.apply(curSeason); SymSeasons.applyCosmetic(null); curCosmetic=null;
      dock.querySelectorAll('.dock__grp')[1].querySelectorAll('.dock__b').forEach((x,i)=>x.classList.toggle('on', i===0)); }
    else { setTheme('theme-alabaster'); SymSeasons.apply(null); }
    label();
  }));

  dock.appendChild(group('Temple Particle · Cosmetic', [
    ['none','None'],['pt-hearth','Hearth Sparks'],['pt-golddust','Gold Dust'],['pt-petals','Petals']
  ], (v)=>{
    curCosmetic = v==='none'?null:v;
    SymSeasons.applyCosmetic(curCosmetic);
    label();
  }));

  const back = document.createElement('a'); back.className='dock__back'; back.href='Home Revamp.html'; back.textContent='← Home Revamp';
  dock.appendChild(back);

  // click-to-throw
  document.addEventListener('click', (e)=>{
    if(e.target.closest('.dock')) return;
    SymSeasons.clickThrow(e.clientX, e.clientY);
  });

  label();
})();
</script>
</body>
</html>
