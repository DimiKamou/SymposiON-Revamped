<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Διαχείριση Περιεχομένου — Ιστορία</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/istoria.css"/>
<style>
.adm{max-width:1120px;margin:0 auto;padding:24px 28px 80px;}
.adm-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
.adm-top h1{font-family:var(--f-disp);font-size:24px;font-weight:700;color:var(--ink);margin:0;}
.adm-top .ds{font-family:var(--f-quote);font-style:italic;font-size:15px;color:var(--ink-soft);}
.adm-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.minib{font-family:var(--f-ui);font-weight:600;font-size:12.5px;border:1px solid var(--hair-strong);background:var(--paper);color:var(--ink);border-radius:30px;padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.minib:hover{border-color:var(--gold);}
.minib.warn{color:var(--terra);border-color:color-mix(in srgb,var(--terra) 40%,transparent);}
.dir-toggle{display:inline-flex;border:1px solid var(--hair-strong);border-radius:40px;padding:3px;background:var(--paper);}
.dir-toggle button{font-family:var(--f-mono);font-size:11px;border:0;background:transparent;color:var(--ink-soft);border-radius:30px;padding:7px 12px;cursor:pointer;}
.dir-toggle button.on{background:var(--terra);color:#fff;}

.adm-grid{display:grid;grid-template-columns:250px 1fr;gap:22px;margin-top:14px;align-items:start;}
@media(max-width:840px){.adm-grid{grid-template-columns:1fr;}}
.side{background:var(--paper);border:1px solid var(--hair);border-radius:10px;padding:16px;box-shadow:var(--shadow);position:sticky;top:14px;}
.side .lab{font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;color:var(--terra-dk);text-transform:uppercase;margin:4px 0 8px;}
.dir-agon .side .lab{color:var(--terra);}
/* override the hub's .unit card styling inside the admin sidebar */
.side .unit,.side .ty{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:transparent;font-family:var(--f-ui);font-size:13.5px;color:var(--ink);padding:9px 10px;border-radius:8px;cursor:pointer;min-height:0;flex-direction:row;box-shadow:none;}
.side .unit:hover,.side .ty:hover{background:var(--paper2);transform:none;}
.side .unit.on,.side .ty.on{background:color-mix(in srgb,var(--terra) 14%,transparent);color:var(--terra-dk);font-weight:600;box-shadow:none;}
.dir-agon .side .unit.on,.dir-agon .side .ty.on{color:var(--gold-lt);}
.side .unit .rn{font-family:var(--f-disp);font-weight:700;color:var(--gold-dk);width:22px;font-size:14px;margin:0;}
.dir-agon .side .unit .rn{color:var(--gold);}
.side .ty .ico{font-size:18px;color:var(--terra);}
.side .ty .ct{margin-left:auto;font-family:var(--f-mono);font-size:10px;color:var(--stone);background:var(--paper2);border-radius:20px;padding:2px 7px;}
.side hr{border:0;border-top:1px solid var(--hair);margin:12px 0;}

.panel{display:flex;flex-direction:column;gap:14px;}
.phead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.phead h2{font-family:var(--f-disp);font-size:21px;font-weight:700;color:var(--ink);margin:0;}
.phead .sub{font-family:var(--f-mono);font-size:11px;color:var(--stone);letter-spacing:.04em;}
.itemrow{background:var(--paper);border:1px solid var(--hair);border-radius:9px;padding:13px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.itemrow .ix{font-family:var(--f-disp);font-weight:700;color:var(--gold-dk);font-size:14px;width:24px;flex-shrink:0;}
.dir-agon .itemrow .ix{color:var(--gold);}
.itemrow .tx{font-family:var(--f-serif);font-size:14.5px;color:var(--ink);line-height:1.4;flex:1;}
.itemrow .tx small{display:block;font-family:var(--f-mono);font-size:11px;color:var(--stone);margin-top:3px;}
.itemrow .ops{display:flex;gap:6px;flex-shrink:0;}
.iconb{width:32px;height:32px;border-radius:8px;border:1px solid var(--hair-strong);background:var(--paper2);cursor:pointer;display:grid;place-items:center;font-size:14px;color:var(--ink-soft);}
.iconb:hover{border-color:var(--gold);color:var(--terra);}
.iconb.del:hover{border-color:var(--terra);color:var(--terra);}
.adm-empty{font-family:var(--f-quote);font-style:italic;font-size:16px;color:var(--stone);text-align:center;padding:26px;border:1px dashed var(--hair-strong);border-radius:10px;}
.editor{background:var(--paper);border:1px solid var(--hair);border-top:3px solid var(--terra);border-radius:10px;padding:20px 22px;box-shadow:var(--shadow);}
.editor h3{font-family:var(--f-disp);font-size:16px;font-weight:700;color:var(--ink);margin:0 0 14px;display:flex;align-items:center;gap:8px;}
.fld{margin-bottom:13px;}
.fld label{display:block;font-family:var(--f-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--terra-dk);margin-bottom:6px;}
.dir-agon .fld label{color:var(--terra);}
.fld input,.fld textarea,.fld select{width:100%;font-family:var(--f-serif);font-size:15px;color:var(--ink);background:var(--paper2);border:1px solid var(--hair-strong);border-radius:6px;padding:11px 13px;outline:none;}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--gold);}
.fld textarea{min-height:80px;resize:vertical;line-height:1.5;}
.optrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.optrow input[type=radio]{width:auto;flex-shrink:0;accent-color:var(--terra);}
.optrow .ltr{font-family:var(--f-disp);font-weight:700;color:var(--gold-dk);width:20px;}
.optrow input[type=text]{flex:1;}
.form-actions{display:flex;gap:10px;margin-top:8px;}
.gate{position:fixed;inset:0;background:rgba(0,0,0,.55);display:grid;place-items:center;z-index:60;padding:20px;}
.gate-card{background:var(--paper);border:1px solid var(--hair);border-radius:14px;padding:34px 38px;max-width:400px;width:100%;text-align:center;box-shadow:0 30px 70px -20px rgba(0,0,0,.6);}
.gate-card .ic{font-size:42px;color:var(--terra);}
.gate-card h2{font-family:var(--f-disp);font-size:23px;font-weight:700;margin:8px 0 4px;color:var(--ink);}
.gate-card p{font-family:var(--f-quote);font-style:italic;font-size:16px;color:var(--ink-soft);margin-bottom:16px;}
.gate-card input{width:100%;font-family:var(--f-mono);font-size:15px;text-align:center;letter-spacing:.2em;background:var(--paper2);border:1px solid var(--hair-strong);border-radius:8px;padding:12px;color:var(--ink);outline:none;margin-bottom:12px;}
.hint{font-family:var(--f-mono);font-size:10.5px;color:var(--stone);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--bg);font-family:var(--f-ui);font-weight:600;font-size:13px;border-radius:30px;padding:11px 20px;z-index:80;transition:transform .3s;}
.toast.on{transform:translateX(-50%);}
</style>
</head>
<body class="dir-atlas istoria-body">
<div class="adm">
  <div class="adm-top">
    <div class="sk-badge" id="adm-badge"></div>
    <div><h1>Διαχείριση Περιεχομένου</h1><div class="ds">Πρόσθεσε & επεξεργάσου ύλη — ανά τάξη, ενότητα και τύπο.</div></div>
    <div class="adm-actions">
      <div class="dir-toggle"><button data-d="dir-atlas" onclick="admDir('dir-atlas')">ΑΤΛΑΣ</button><button data-d="dir-agon" onclick="admDir('dir-agon')">ΑΓΩΝ</button></div>
      <button class="minib" onclick="ADM.exportJSON()">↓ Εξαγωγή JSON</button>
      <label class="minib">↑ Εισαγωγή<input type="file" accept="application/json" style="display:none" onchange="ADM.importJSON(this.files[0])"></label>
      <button class="minib warn" onclick="ADM.resetAll()">↺ Επαναφορά</button>
    </div>
  </div>

  <div class="adm-grid">
    <aside class="side">
      <div class="lab">Τάξη</div>
      <div id="adm-courses"></div>
      <hr>
      <div class="lab">Ενότητα</div>
      <div id="adm-units"></div>
      <hr>
      <div class="lab">Τύπος περιεχομένου</div>
      <div id="adm-types"></div>
    </aside>
    <main class="panel">
      <div class="phead"><h2 id="adm-ptitle"></h2><span class="sub" id="adm-psub"></span></div>
      <div id="adm-list"></div>
      <div class="editor" id="adm-editor"></div>
    </main>
  </div>
</div>

<div class="gate" id="adm-gate">
  <div class="gate-card">
    <div class="ic ico" id="adm-gate-ic"></div>
    <h2>Είσοδος Διαχειριστή</h2>
    <p>Η διαχείριση είναι ορατή μόνο στον διαχειριστή του μαθήματος.</p>
    <input id="adm-pass" type="password" placeholder="κωδικός" onkeydown="if(event.key==='Enter')ADM.login()"/>
    <button class="btn primary" style="margin:0 auto;" onclick="ADM.login()">Είσοδος</button>
    <div class="hint" style="margin-top:12px;">demo: πληκτρολόγησε <b>admin</b></div>
  </div>
</div>
<div class="toast" id="adm-toast"></div>

<script src="js/sym-icons.js"></script>
<script src="js/content/g3.js"></script>
<script src="js/content/scaffolds.js"></script>
<script src="js/data-layer.js"></script>
<script src="js/admin.js"></script>
<script>
  function admDir(d){ document.body.classList.remove('dir-atlas','dir-agon'); document.body.classList.add(d);
    document.querySelectorAll('.dir-toggle button').forEach(b=>b.classList.toggle('on', b.dataset.d===d));
    try{ localStorage.setItem('istoria-dir', d); }catch(e){} }
  admDir(ISTORIA.getDir('dir-atlas'));
  document.getElementById('adm-badge').innerHTML = SYM.icon('owl');
  document.getElementById('adm-gate-ic').innerHTML = SYM.icon('column');
  ADM.boot();
</script>
</body>
</html>
