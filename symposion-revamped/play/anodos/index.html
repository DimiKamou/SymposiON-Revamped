<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>SymposiON · ΑΝΟΔΟΣ — The Ascent</title>
  <meta name="description" content="ΑΝΟΔΟΣ — a Slay-the-Spire-style climb through the games of SymposiON."/>
  <!-- Chrome-free shell: no site header/footer. A slim back bar sits above a
       full-viewport iframe that loads the self-contained game. The iframe keeps
       the game's fixed-position layout + in-browser Babel (needs unsafe-eval)
       isolated from the parent site's CSS/JS. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      /* dvh so the mobile address bar can't trigger body scroll */
      height: 100dvh;
      background: #0D0B09;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }
    .backbar {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 12px;
      padding: 8px max(12px, env(safe-area-inset-left)) 8px max(12px, env(safe-area-inset-left));
      padding-top: max(8px, env(safe-area-inset-top));
      background: #181412;
      border-bottom: 1px solid rgba(200,120,48,0.16);
      font: 600 13px/1 'Inter', system-ui, -apple-system, sans-serif;
      color: #EFE9DC;
    }
    .backbar a.back {
      display: inline-flex; align-items: center; gap: 7px;
      color: #C87830; text-decoration: none;
      letter-spacing: .4px;
      padding: 7px 12px; border-radius: 7px;
      border: 1px solid rgba(200,120,48,0.38);
      transition: background .18s, border-color .18s;
    }
    .backbar a.back:hover { background: rgba(200,120,48,0.12); border-color: #C87830; }
    .backbar .title {
      font-family: 'Cinzel', 'Cormorant Garamond', serif;
      letter-spacing: 2px; font-size: 14px; color: #E09E52;
    }
    .backbar .title b { color: #D96B30; }
    iframe.game {
      flex: 1 1 auto;
      width: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div class="backbar">
    <a class="back" href="../../" aria-label="Πίσω στο SymposiON">← Πίσω</a>
    <span class="title">ΑΝΟΔΟΣ · <b>The Ascent</b></span>
  </div>
  <iframe
    id="anodos-game"
    class="game"
    src="Anodos-standalone.html"
    title="ΑΝΟΔΟΣ — The Ascent"
    allow="fullscreen"
    referrerpolicy="no-referrer"></iframe>

  <!-- Shared content bridge: auto-generates the true/false volley from the
       game's trivia and appends admin riddles/rewards. On this SDK-less page we
       read the world-readable config/anodos doc via the Firestore REST API. -->
  <script src="anodos-content.js?v=1"></script>
  <script>
    (function () {
      var frame = document.getElementById('anodos-game');
      // Public web credentials (same values shipped in js/firebase-config.js).
      var cfgPromise = (typeof ANODOS_fetchConfig === 'function')
        ? ANODOS_fetchConfig('educational-site-b57e6', 'AIzaSyAJ_lGYUXLd-7pUkVHE3xCsFYHPmTqafNI')
        : Promise.resolve({});
      frame.addEventListener('load', function () {
        if (typeof ANODOS_applyWhenReady !== 'function') return;
        cfgPromise.then(function (config) {
          // No study material on the direct page → built-in trivia drives the
          // auto-generated true/false; admin riddles + rewards are appended.
          ANODOS_applyWhenReady(frame, { config: config || {} });
        });
      });
    })();
  </script>
</body>
</html>
