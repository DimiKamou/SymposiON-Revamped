  <!-- right branch leaves (mirrored) -->
  <path d="M 122 38 Q 130 30 140 34 Q 132 42 122 38 M 136 48 Q 144 40 154 45 Q 146 53 136 48 M 148 60 Q 155 52 164 58 Q 156 65 148 60" stroke-opacity="0.85"></path>
