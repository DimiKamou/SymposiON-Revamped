<div id="epic-puzzle-overlay" class="game-overlay">

    <button class="overlay-back" onclick="closeEpicPuzzle()" data-gr="← Επιλογή Παιχνιδιού" data-en="← Game Selection">← Επιλογή Παιχνιδιού</button>
    <div class="overlay-title" data-gr="Χρονολόγιο — Βάλε τα Γεγονότα στη Σειρά" data-en="Chronicle — Sequence the Events">Χρονολόγιο — Βάλε τα Γεγονότα στη Σειρά</div>
