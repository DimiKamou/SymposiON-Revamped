<div id="invaders-overlay" class="game-overlay inv-overlay" style="display:none;">
  <div class="inv-topbar overlay-topbar">
    <button class="overlay-back inv-back" onclick="closeInvaders()"><span class="inv-back-arw">←</span> Πίσω</button>

    <div class="inv-title-wrap">
      <div class="inv-title overlay-title" data-text="SPACE INVADERS">SPACE INVADERS</div>
      <div class="inv-subtitle">Γραμματική · Grammar Arcade</div>
    </div>

    <div class="inv-right">
      <button class="overlay-back inv-theme-btn" id="inv-theme-btn" title="Άλλαξε εικαστικό / Change skin" onclick="
        (function(){
          const t = window.INVADERS_THEMES, n = t[(t.indexOf(window.getInvadersTheme())+1)%t.length];
          window.setInvadersTheme(n);
          this.textContent = ({nyx:'✦ Νυκτομαχία',melan:'⚱ Μελανόμορφος',abyssos:'≈ Ἄβυσσος'})[n];
        }).call(this)">✦ Νυκτομαχία</button>
      <div id="invaders-score-display" class="inv-scorechip">Score: 0 | Lives: ♥♥♥</div>
    </div>
  </div>

  <div class="overlay-frame inv-frame" id="invaders-wrap">
    <canvas id="invaders-canvas"></canvas>
    <div class="inv-scanlines" aria-hidden="true"></div>
    <div class="inv-vignette" aria-hidden="true"></div>
  </div>

  <!-- Touch controls — shown on touch devices via openInvaders() -->
  <div id="invaders-touch" style="display:none;">
    <button class="inv-t-btn" data-tc="left"  aria-label="Κινήσου αριστερά">◀<span>ΑΡΙΣΤ</span></button>
    <button class="inv-t-btn inv-t-fire-btn" data-tc="fire" aria-label="Πυρ">⚡<span>ΠΥΡΑ</span></button>
    <button class="inv-t-btn" data-tc="right" aria-label="Κινήσου δεξιά">▶<span>ΔΕΞΙΑ</span></button>
  </div>
</div>
