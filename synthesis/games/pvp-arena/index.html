<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SymposiON · Ο Ἀγών — PvP Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto+Condensed:wght@500;600;700&family=Fira+Sans:wght@500;600;700&family=Montserrat:wght@600;700;800&family=Alegreya:ital,wght@0,500;0,600;1,500;1,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/brand.css">
<link rel="stylesheet" href="css/pvp.css">
</head>
<body>

<div class="pvp" id="pvp-root">

  <!-- ════ topbar ════ -->
  <div class="pvp-top">
    <div style="display:flex;align-items:center;gap:14px">
      <a class="pvp-brand" href="../../index.html"><span class="mark">Σ</span>Symposi<span class="on">ON</span><span class="vs">PVP · ΑΓΩΝ</span></a>
    </div>
    <div class="pvp-top-right">
      <button class="pvp-back" id="pvp-back" hidden>‹ ΠΙΣΩ</button>
      <button class="pvp-chip" id="pvp-chip" title="Άλλαξε ταυτότητα / Edit identity">
        <span class="seal">Σ</span>
        <span class="who"><span class="nm">ΕΣΥ</span><span class="rk">· 1200</span></span>
      </button>
    </div>
  </div>

  <!-- ════ stage ════ -->
  <div class="pvp-stage">
    <section class="pvp-screen on" data-screen="hub"></section>
    <section class="pvp-screen" data-screen="content"></section>
    <section class="pvp-screen" data-screen="room"></section>
    <section class="pvp-screen" data-screen="match"></section>
    <section class="pvp-screen" data-screen="results"></section>
  </div>

  <!-- ════ launch overlay ════ -->
  <div class="pvp-launch" id="pvp-launch">
    <div class="lc" id="pvp-launch-c">3</div>
    <div class="lt">Ο ΑΓΩΝ ΑΡΧΙΖΕΙ · THE AGON BEGINS</div>
  </div>

  <!-- ════ modal host ════ -->
  <div class="pvp-modal-bg" id="pvp-modal-bg"></div>

</div>

<script src="js/questions.js"></script>
<!-- Bridge: when launched from the SymposiON app (launchPvPArena), the live
     shared library window.SYM_QUESTIONS is handed across via localStorage.
     Prefer it over the bundled js/questions.js sample when present. -->
<script>
(function(){
  try {
    var raw = localStorage.getItem('SYM_QUESTIONS');
    if (raw) {
      var q = JSON.parse(raw);
      if (Array.isArray(q) && q.length) window.SYM_QUESTIONS = q;
    }
  } catch (e) {}
})();
</script>
<script src="js/pvp-data.js"></script>
<script src="js/pvp-game-art.js"></script>
<script src="js/pvp-chess.js"></script>
<script src="js/pvp-skaki.js"></script>
<script src="js/pvp-erinyes.js"></script>
<script src="js/pvp.js"></script>
<script>PvP.init();</script>

</body>
</html>
