    { lemma:'Διττῆς δὴ τῆς ἀρετῆς οὔσης, τῆς μὲν διανοητικῆς τῆς δὲ ἠθικῆς', note:'Ο Αριστοτέλης διακρίνει δύο είδη αρετής: τη διανοητική (που ανήκει στο «λόγον ἔχον» μέρος της ψυχής — π.χ. σοφία, σύνεση, φρόνηση) και την ηθική (που ανήκει στο «ἐπιθυμητικόν», το μετέχον λόγου μέρος — π.χ. ανδρεία, σωφροσύνη, δικαιοσύνη). Η λέξη «ἀρετή» στα αρχαία δεν είχε καθαρά ηθικό περιεχόμενο· γι’ αυτό εδώ προσδιορίζεται με τα επίθετα «διανοητική» και «ηθική».' },
    { lemma:'ἡ μὲν διανοητικὴ τὸ πλεῖον ἐκ διδασκαλίας ἔχει καὶ τὴν γένεσιν καὶ τὴν αὔξησιν', note:'Η διανοητική αρετή γεννιέται και αυξάνεται κατά κύριο λόγο μέσα από τη διδασκαλία· γι’ αυτό απαιτεί εμπειρία και χρόνο, ενώ κύρια ευθύνη για τη μετάδοσή της έχει ο δάσκαλος. Η λέξη «αὔξησις» δηλώνει ότι η διανοητική αρετή δεν ολοκληρώνεται ποτέ οριστικά, αλλά αποτελεί μια πορεία διαρκούς καλλιέργειας της διάνοιας.' },
    { lemma:'ἡ δ’ ἠθικὴ ἐξ ἔθους περιγίνεται, ὅθεν καὶ τοὔνομα ἔσχηκε … ἀπὸ τοῦ ἔθους', note:'Η ηθική αρετή κατακτάται με τον εθισμό, τη συνήθεια που διαμορφώνεται με την επανάληψη μιας ενέργειας. Ο Αριστοτέλης χρησιμοποιεί ετυμολογικό/γραμματικό ορισμό: το «ἦθος» (χαρακτήρας) είναι εκτεταμένος τύπος του «ἔθος» (συνήθεια) και συνδέεται μαζί του με σχέση αιτίου–αποτελέσματος. Πίστευε στην ταυτότητα «λέγεσθαι = εἶναι», ότι δηλαδή τα πράγματα είναι όπως τα δηλώνουν οι λέξεις.' },
    { lemma:'οὐδεμία τῶν ἠθικῶν ἀρετῶν φύσει ἡμῖν ἐγγίνεται', note:'Αποφατικό συμπέρασμα από τον ετυμολογικό ορισμό: αφού η ηθική συνδέεται με το ἔθος, δηλαδή με τον εθισμό και την επανάληψη, οι ηθικές αρετές είναι επίκτητες και όχι έμφυτες. Η θέση αυτή αντιτίθεται στην παλιά αριστοκρατική αντίληψη, που θεωρούσε την αρετή δώρο της φύσης ή των θεών, προνόμιο των «ἀρίστων».' },
    { lemma:'οἷον ὁ λίθος φύσει κάτω φερόμενος … οὐδὲ τὸ πῦρ κάτω', note:'Δύο παραδείγματα από τον χώρο της φύσης στηρίζουν επαγωγικά τη θέση: η πέτρα κινείται πάντα προς τα κάτω (βαρύ στοιχείο) και η φωτιά πάντα προς τα πάνω (ελαφρύ στοιχείο)· οι φυσικοί νόμοι είναι σταθεροί και αμετάβλητοι, όσο κι αν προσπαθήσει κανείς. Οι ηθικές αρετές όμως μεταβάλλονται και καλλιεργούνται — άρα δεν είναι έμφυτες.' },
    { lemma:'Οὔτ’ ἄρα φύσει οὔτε παρὰ φύσιν … πεφυκόσι μὲν … τελειουμένοις δὲ διὰ τοῦ ἔθους', note:'Οι αρετές δεν είναι ούτε έμφυτες ούτε αντίθετες προς τη φύση: ο άνθρωπος έχει «δυνάμει» από τη φύση την προδιάθεση («πεφυκόσι») να τις δεχτεί, αλλά τελειοποιείται σε αυτές («τελειουμένοις») με τον εθισμό και εφόσον το επιλέξει. Η λέξη «τελειουμένοις» παραπέμπει στο «τέλος», την ολοκλήρωση και την κατάκτηση της ευδαιμονίας· η κατάκτηση της αρετής εξαρτάται από την προαίρεση.' },
    { lemma:'Ἔτι ὅσα μὲν φύσει ἡμῖν παραγίνεται, τὰς δυνάμεις … πρότερον κομιζόμεθα, ὕστερον δὲ τὰς ἐνεργείας', note:'Νέο επιχείρημα («ἔτι» = μεταβατικό/προσθετικό): για όσα έχουμε εκ φύσεως (π.χ. οι αισθήσεις) προηγείται η δύναμη (δυνατότητα) και ακολουθεί η ενέργεια — πρώτα έχουμε την όραση και την ακοή και έπειτα τις χρησιμοποιούμε. Το «πρότερον–ὕστερον» δηλώνει τη χρονική (όχι λογική/οντολογική) προτεραιότητα της δύναμης στα φυσικά γνωρίσματα.' },
    { lemma:'τὰς δ’ ἀρετὰς λαμβάνομεν ἐνεργήσαντες πρότερον, ὥσπερ καὶ ἐπὶ τῶν ἄλλων τεχνῶν', note:'Στις αρετές η πορεία είναι αντίστροφη: προηγείται η ενέργεια (η άσκηση, η επανάληψη) και ακολουθεί η κατάκτηση. Ακολουθεί αναλογία με τις τέχνες («ὥσπερ … ἐπὶ τῶν ἄλλων τεχνῶν»): όπως οικοδόμος γίνεται κανείς χτίζοντας και κιθαριστής παίζοντας κιθάρα, έτσι γινόμαστε δίκαιοι, σώφρονες και ανδρείοι κάνοντας αντίστοιχες πράξεις.' },
    { lemma:'οὕτω δὴ καὶ τὰ μὲν δίκαια πράττοντες δίκαιοι γινόμεθα …', note:'Τρία παραδείγματα από τον χώρο της ηθικής (δικαιοσύνη, σωφροσύνη, ανδρεία) γενικεύουν το συμπέρασμα: η ηθική αρετή αποκτάται με την έμπρακτη ενεργοποίηση και τον εθισμό σε ενάρετες πράξεις. Η χρήση α΄ πληθυντικού («γινόμεθα») εντάσσει και τον ίδιο τον Αριστοτέλη σε γνωρίσματα που αφορούν όλους τους ανθρώπους.' },

  /* ── ΑΣΚΗΣΕΙΣ · Α. Ερμηνευτικές ── */
  ermineytikes:[
    { q:'Σχολιάστε την εγκυρότητα των επιχειρημάτων της πέτρας και της φωτιάς που χρησιμοποιεί ο Αριστοτέλης, για να αποδείξει ότι όσα υπάρχουν εκ φύσεως δεν μπορούν μέσω του εθισμού να αποκτήσουν άλλες ιδιότητες.',
      answer:'Τα δύο παραδείγματα είναι παρμένα από τα απλά δεδομένα της εμπειρίας: η πέτρα, ως φύσει βαρύ σώμα, κινείται πάντοτε προς τα κάτω, ενώ η φωτιά, ως ελαφρύ στοιχείο, πάντοτε προς τα πάνω — και καμιά επανάληψη («οὐδ’ ἂν μυριάκις») δεν μπορεί να αντιστρέψει αυτή τη φυσική τους ροπή. Ο Αριστοτέλης συνάγει επαγωγικά ένα καθολικό συμπέρασμα: ό,τι έχει σταθερή φυσική συμπεριφορά δεν αλλάζει με τον εθισμό. Το επιχείρημα είναι έγκυρο ως προς τον σκοπό του: αφού οι ηθικές αρετές, αντίθετα, μεταβάλλονται και καλλιεργούνται με τη συνήθεια, αποδεικνύεται εξ αντιδιαστολής ότι δεν είναι έμφυτες. Ισχύει βέβαια στο πλαίσιο της αριστοτελικής φυσικής (φυσική κίνηση βαρέων/ελαφρών σωμάτων), αλλά η αποδεικτική του δύναμη στηρίζεται στη σαφή αντίθεση σταθερής φύσης / μεταβλητού έθους.' },
    { q:'Ποια είδη της αρετής διακρίνει ο Αριστοτέλης, σε ποιο μέρος της ψυχής ανήκει κάθε είδος και από ποιους παράγοντες εξαρτάται η ανάπτυξη καθενός;',
      answer:'Ο Αριστοτέλης διακρίνει δύο είδη: (α) τις διανοητικές αρετές (σοφία, σύνεση, φρόνηση), που ανήκουν στο καθαρά λογικό μέρος της ψυχής, το «λόγον ἔχον»· η γένεση και η αύξησή τους οφείλονται κατά κύριο λόγο στη διδασκαλία, γι’ αυτό απαιτούν εμπειρία και χρόνο, με κύρια ευθύνη τον δάσκαλο. (β) Τις ηθικές αρετές (δικαιοσύνη, σωφροσύνη, ανδρεία), που ανήκουν στο «ἐπιθυμητικόν», στο μετέχον λόγου μέρος της ψυχής (τμήμα και του «λόγον ἔχον» και του «ἄλογον»)· κατακτώνται με το ἔθος, τον εθισμό και την επανάληψη ενάρετων πράξεων, με κύρια ευθύνη τον ίδιο τον άνθρωπο και την προαίρεσή του. Οι διανοητικές είναι μεταδόσιμες και έχουν γένεση και αύξηση, ενώ οι ηθικές είναι επίκτητες και προϋποθέτουν φυσική προδιάθεση.' },
    { q:'Ο Αριστοτέλης χαρακτηρίζεται πρακτικός νους που καταφεύγει συχνά στην πραγματικότητα, για να τεκμηριώσει τις απόψεις του, τις οποίες παρουσιάζει σε απλό και λιτό ύφος. Ποια στοιχεία του αποσπάσματος θα μπορούσαν να επιβεβαιώσουν αυτές τις κρίσεις;',
      answer:'Ο εμπειρικός/πρακτικός χαρακτήρας φαίνεται από τα παραδείγματα που αντλεί από την καθημερινή εμπειρία: την κίνηση της πέτρας και της φωτιάς (φύση), τη λειτουργία της όρασης και της ακοής (αισθήσεις), την εκμάθηση του οικοδόμου και του κιθαριστή (τέχνες). Στηρίζει τις θέσεις του με επαγωγικό συλλογισμό, ξεκινώντας από συγκεκριμένα δεδομένα και καταλήγοντας σε γενικό συμπέρασμα. Το λιτό, σαφές και ακριβές ύφος φαίνεται από την αποφυγή του ποιητικού λόγου, τη χρήση αντιθέσεων και αναλογιών, τις έναρθρες δομές και τη συσσώρευση αρνήσεων που δίνει επιστημονική αυστηρότητα. Στοιχεία προφορικού λόγου (π.χ. το περιττό «καὶ» στο «ὥσπερ καὶ ἐπὶ τῶν ἄλλων τεχνῶν») μαρτυρούν ότι πρόκειται για σημειώσεις παραδόσεων.' },
    { q:'Να σχολιάσετε τα παραδείγματα που φέρνει ο Αριστοτέλης και να εξηγήσετε τη σκοπιμότητά τους. Ποια συλλογιστική μέθοδο ακολουθεί εδώ ο φιλόσοφος και σε ποια γενίκευση καταλήγει ύστερα από τα παραδείγματα;',
      answer:'Ο Αριστοτέλης χρησιμοποιεί τρεις ομάδες παραδειγμάτων: από τη φύση (πέτρα – φωτιά), για να δείξει ότι τα φυσικά γνωρίσματα δεν αλλάζουν με τον εθισμό· από τις αισθήσεις (όραση – ακοή), για να δείξει ότι σε όσα έχουμε εκ φύσεως προηγείται η δύναμη και ακολουθεί η ενέργεια· και από τις τέχνες (οικοδόμοι – κιθαριστές), για να δείξει ότι δεξιότητες αποκτώνται με την άσκηση. Η μέθοδος είναι επαγωγική: από συγκεκριμένα, γνωστά δεδομένα της εμπειρίας οδηγείται σε καθολικό συμπέρασμα. Η γενίκευση στην οποία καταλήγει είναι ότι οι ηθικές αρετές δεν είναι έμφυτες αλλά επίκτητες: όπως γίνεται κανείς τεχνίτης ασκούμενος, έτσι γίνεται και δίκαιος, σώφρων ή ανδρείος κάνοντας αντίστοιχες πράξεις.' },
    { q:'τὰς δυνάμεις κομιζόμεθα, τὰς ἐνεργείας ἀποδίδομεν: α) Ποιο είναι το περιεχόμενο των εννοιών δύναμις και ἐνέργεια στην αριστοτελική φιλοσοφία; β) Ποια από τις δύο έννοιες θεωρεί ο φιλόσοφος πιο αξιόλογη;',
      answer:'α) Δύναμις είναι η δυνατότητα ενός όντος να γίνει ή να κάνει κάτι, να περάσει από μια κατάσταση σε άλλη φτάνοντας στην τελείωσή του (π.χ. ο χαλκός είναι δυνάμει ανδριάντας)· ἐνέργεια είναι η μεταγενέστερη πραγμάτωση αυτής της δυνατότητας. Η διάκριση είναι θεμελιώδης και συχνά αντιθετική στη φιλοσοφία του. β) Πιο αξιόλογη θεωρεί την ἐνέργεια: αυτή αποδίδει συνθετότερη έννοια (συνδέεται με την πλήρη ύπαρξη του πράγματος), αποτελεί τον σκοπό (οὗ ἕνεκα) του όντος και έχει οντολογική προτεραιότητα, ενώ ταυτίζεται με την ύπαρξη, το ον· επιπλέον εξαρτάται από την προσωπική προσπάθεια και προαίρεση του ανθρώπου, ενώ η δύναμις σχετίζεται με τη φύση και υπάρχει ανεξάρτητα από αυτόν.' },
    { q:'Νομίζετε ότι υπάρχουν κοινά σημεία ανάμεσα στους λόγους του Περικλή και στην άποψη του Αριστοτέλη όσον αφορά στη σχέση ηθικής πράξης και ηθικής αρετής; Να στηρίξετε τις απόψεις σας σε χωρία των δύο κειμένων.',
      passage:'Και όσον αφορά την ευεργετική διάθεση, είμαστε αντίθετοι με τον πολύ κόσμο. Γιατί αποκτούμε φίλους όχι ευεργετούμενοι, αλλά ευεργετώντας. Γιατί ο ευεργέτης είναι πιο σταθερός φίλος, εφόσον επιδιώκει να παραμένει η ευγνωμοσύνη του ευεργετημένου, με τη συμπάθεια που δείχνει σ’ αυτόν. Ο ευεργετημένος αντίθετα, είναι πιο απρόθυμος, γιατί ξέρει ότι θα ανταποδώσει την ευγνωμοσύνη σαν εξόφληση χρέους και όχι για να του χρωστούν ευγνωμοσύνη.\n— Θουκυδίδης, Περικλέους Ἐπιτάφιος (ΙΙ, 40, 4-5)',
      answer:'Ναι, υπάρχουν σαφή κοινά σημεία στη σχέση ηθικής πράξης και ηθικής αρετής. Ο Περικλής τονίζει ότι οι Αθηναίοι αποκτούν φίλους «όχι ευεργετούμενοι, αλλά ευεργετώντας» — δηλαδή η ευεργετική διάθεση (μια μορφή ηθικής ποιότητας) εκδηλώνεται και επιβεβαιώνεται μέσα από την ίδια την πράξη της ευεργεσίας. Αυτό συμπίπτει με τη θέση του Αριστοτέλη ότι «τὰς δ’ ἀρετὰς λαμβάνομεν ἐνεργήσαντες πρότερον» και ότι «τὰ μὲν δίκαια πράττοντες δίκαιοι γινόμεθα»: η ηθική αρετή δεν προϋπάρχει έμφυτη, αλλά κατακτάται και εκφράζεται με την έμπρακτη, επαναλαμβανόμενη ενάρετη πράξη. Και για τους δύο, δηλαδή, η ηθική ποιότητα του ανθρώπου βεβαιώνεται στην πράξη και όχι σε μια αφηρημένη προδιάθεση.' },

    { lemma:'πράττοντες γὰρ τὰ ἐν τοῖς συναλλάγμασι … οἳ μὲν δίκαιοι οἳ δὲ ἄδικοι', note:'Πρώτο παράδειγμα (κοινωνικές σχέσεις): ο τρόπος με τον οποίο μαθαίνει κανείς να συναλλάσσεται καθορίζει τον χαρακτήρα του. Όποιος μαθαίνει να είναι δίκαιος στις συναλλαγές του γίνεται δίκαιος, αλλιώς άδικος. Η διαμόρφωση του ήθους είναι υπόθεση του ίδιου του ανθρώπου, που φέρει την ευθύνη των πράξεών του.' },

      answer:'Κριτήριο διάκρισης είναι ο βαθμός επιτυχίας του έργου των νομοθετών: όσο πιο κοντά φτάνουν στον στόχο τους —να οδηγήσουν, μέσω του εθισμού και των σωστών νόμων, τους πολίτες στην ηθική αρετή και άρα στην ευδαιμονία— τόσο καλύτερο είναι το πολίτευμα. Γι’ αυτό ο Αριστοτέλης δεν μιλά για κακά πολιτεύματα αλλά για «λιγότερο καλά» (η «φαύλη» εδώ σημαίνει «κατώτερη», όχι «κακή»): κάθε πολίτευμα, εξ ορισμού, στοχεύει στο κοινό καλό. Το κριτήριο παραμένει εν μέρει επίκαιρο: αξιολογούμε και σήμερα ένα πολίτευμα από το κατά πόσο καλλιεργεί ενάρετους, υπεύθυνους πολίτες και προάγει την ευημερία τους. Θα το συμπληρώναμε όμως με σύγχρονα κριτήρια (σεβασμός ανθρωπίνων δικαιωμάτων, ελευθερίες, ισότητα, δημοκρατική συμμετοχή), και δεν θα δεχόμασταν εύκολα ότι δεν υπάρχουν πραγματικά κακά ή αδιάφορα προς την αρετή καθεστώτα.' },
    { q:'ἐκ τῶν αὐτῶν καὶ διὰ τῶν αὐτῶν καὶ γίνεται πᾶσα ἀρετὴ καὶ φθείρεται: α) Ποιο θεμελιώδες αντιθετικό ζεύγος φιλοσοφικών εννοιών υπόκειται στο χωρίο αυτό; β) Να δείξετε τη σχέση που έχουν τα αντιθετικά μέλη του ζεύγους με τον εθισμό και την ηθική πράξη, όπως φαίνεται στην Ενότητα.',
      answer:'α) Υπόκειται το θεμελιώδες δίπολο «γένεσις – φθορά» (γίνεται – φθείρεται), κεντρικό στην αρχαία φιλοσοφική σκέψη· για τον Αριστοτέλη πρόκειται για μια φυσική, μονόδρομη διαδικασία: γένεση → αύξηση → τελείωση → παρακμή → φθορά. β) Η ίδια η αρχή («ἐκ τῶν αὐτῶν») και τα ίδια μέσα («διὰ τῶν αὐτῶν») —δηλαδή ο εθισμός σε ανάλογες πράξεις— και γεννούν και φθείρουν την αρετή, ανάλογα με την ποιότητά τους. Ο καλός εθισμός, η επανάληψη σωστών («εὖ») ηθικών πράξεων, δομεί και τελειοποιεί την αρετή· ο κακός εθισμός, η επανάληψη λανθασμένων («κακῶς») πράξεων, την αποδομεί και τη φθείρει. Έτσι επιβεβαιώνεται ο επίκτητος χαρακτήρας της αρετής: δεν είναι έμφυτη, αλλά προϊόν της ηθικής πράξης και της άσκησης.' },
    { q:'εἰ γὰρ μὴ οὕτως εἶχε, οὐδὲ ἂν ἔδει τοῦ διδάξαντος. Η άποψη που εκφράζεται στο απόσπασμα συμφωνεί με όσα υποστήριξε ο Αριστοτέλης σχετικά με το ρόλο της διδασκαλίας στη γένεση και ανάπτυξη των αρετών (διανοητικών και ηθικών); Να δικαιολογήσετε την άποψή σας.',
      answer:'Συμφωνεί απόλυτα. Ο Αριστοτέλης διακρίνει τις διανοητικές αρετές, που «τὸ πλεῖον ἐκ διδασκαλίας ἔχει τὴν γένεσιν καὶ τὴν αὔξησιν» (γεννιούνται και αναπτύσσονται κυρίως με τη διδασκαλία), από τις ηθικές, που προκύπτουν «ἐξ ἔθους» (από τον εθισμό). Και στις δύο περιπτώσεις όμως η διδασκαλία είναι απαραίτητη: εδώ το υποθετικό επιχείρημα («εἰ … μὴ οὕτως εἶχεν, οὐδὲν ἂν ἔδει τοῦ διδάξοντος») δείχνει ότι, ακριβώς επειδή οι αρετές δεν είναι έμφυτες, χρειάζεται δάσκαλος για να υποδείξει τον ορθό εθισμό. Ο δάσκαλος (και, στο επίπεδο της πόλης, ο νομοθέτης) διδάσκει τους κανόνες της αρετής και τον σωστό τρόπο άσκησης· χωρίς αυτόν η ποιότητα της άσκησης θα ήταν τυχαία. Αν οι αρετές ήταν φυσικές, η διδασκαλία θα ήταν περιττή· η αναγκαιότητά της αποδεικνύει τον επίκτητο χαρακτήρα τους.' },
    { q:'Καὶ ἑνὶ δὴ λόγῳ ἐκ τῶν ὁμοίων ἐνεργειῶν αἱ ἕξεις γίνονται: Να εντοπίσετε τη νέα αριστοτελική έννοια που περιέχεται στο χωρίο και να δώσετε τον ορισμό της με τη βοήθεια του κειμένου της Ενότητας.',
      answer:'Η νέα έννοια είναι η «ἕξις». Ετυμολογικά παράγεται από το θέμα του μέλλοντα («ἕξω») του ρήματος «ἔχω» (σεχ- < hεχ- < ἑχ-) και την παραγωγική κατάληξη -σις που δηλώνει ενέργεια· αρχικά σημαίνει το να κατέχει κανείς μόνιμα κάτι που έχει αποκτήσει. Στον Αριστοτέλη η λέξη αποκτά ηθικό περιεχόμενο: ἕξεις είναι τα μόνιμα, σταθερά στοιχεία του χαρακτήρα μας, καλά ή κακά, που αποκτώνται με την επίμονη άσκηση και τη συστηματική επανάληψη όμοιων ενεργειών («ἐκ τῶν ὁμοίων ἐνεργειῶν»). Η χρήση του «γίνονται» δείχνει ότι η ἕξις δεν είναι έμφυτη, αλλά προκύπτει μέσα από μια βαθμιαία διαδικασία εθισμού· είναι ένα από τα «γινόμενα ἐν τῇ ψυχῇ» (μαζί με τα πάθη και τις δυνάμεις). Επειδή είναι ουδέτερη έννοια, η ποιότητα του εθισμού που την προκαλεί καθορίζει και τη δική της ποιότητα — γι’ αυτό «δεῖ τὰς ἐνεργείας ποιὰς ἀποδιδόναι».' },
    { q:'Ο Περικλής στον Ἐπιτάφιο αναφέρεται στην ἀρετή (= ανδρεία) του Αθηναίου πολίτη ως εξής: «ριχνόμαστε πρόθυμοι στον κίνδυνο με ανδρεία που δεν πηγάζει τόσο από την επιβολή του νόμου όσο από τον τρόπο της ζωής μας» (Θουκ. ΙΙ, 39, 4). Να συγκρίνετε την άποψη αυτή με τη θέση του Αριστοτέλη για το ρόλο του νόμου στην καλλιέργεια της ηθικής αρετής. Πού οφείλεται, κατά τη γνώμη σας, η διαφορά του πολιτικού από τον φιλόσοφο;',
      passage:'«…καὶ ἐν τοῖς κινδύνοις οὐδὲν ἧσσον … ριχνόμαστε πρόθυμοι στον κίνδυνο με ανδρεία που δεν πηγάζει τόσο από την επιβολή του νόμου όσο από τον τρόπο της ζωής μας.» — Θουκυδίδης, Περικλέους Ἐπιτάφιος (ΙΙ, 39, 4)',
      answer:'Για τον Αριστοτέλη ο νόμος και ο νομοθέτης έχουν κεντρικό, καθοριστικό ρόλο: με τον συστηματικό εθισμό των πολιτών σε ενάρετες πράξεις οι νομοθέτες τους κάνουν αγαθούς, και σε αυτόν τον σκοπό αποβλέπει η βούληση κάθε νομοθέτη. Η αρετή, άρα, καλλιεργείται θεσμικά, μέσω της αγωγής που επιβάλλει η πόλη. Ο Περικλής, αντίθετα, εξαίρει την ανδρεία των Αθηναίων ως προϊόν όχι τόσο του νομικού καταναγκασμού όσο του ελεύθερου τρόπου ζωής και του ήθους τους: η αρετή πηγάζει από την εσωτερική διάθεση και την παράδοση, όχι από την επιβολή. Η διαφορά οφείλεται στη σκοπιά και στον ρόλο του καθενός: ο Περικλής είναι πολιτικός ηγέτης που, σε έναν επιτάφιο-εγκώμιο, θέλει να εξυμνήσει το φιλελεύθερο αθηναϊκό πνεύμα και να τονώσει το φρόνημα, γι’ αυτό υπογραμμίζει την αυθόρμητη, «ελεύθερη» αρετή. Ο Αριστοτέλης είναι φιλόσοφος που αναλύει ψύχραιμα τον μηχανισμό γένεσης της αρετής και εντοπίζει την αναγκαιότητα του εθισμού και της παιδευτικής λειτουργίας του νόμου. Στην ουσία οι δύο θέσεις δεν αναιρούνται: ο «τρόπος ζωής» που επικαλείται ο Περικλής είναι κι αυτός καρπός μακρόχρονου εθισμού μέσα στην πόλη — απλώς ο πολιτικός τον παρουσιάζει ως φυσική αρετή, ενώ ο φιλόσοφος αποκαλύπτει την επίκτητη, εθιστική του βάση.' },
    { q:'Όσο μπορείς (Κ. Π. Καβάφης): «Κι αν δεν μπορείς να κάμεις την ζωή σου όπως την θέλεις, / τούτο προσπάθησε τουλάχιστον / όσο μπορείς: μην την εξευτελίζεις / μες στην πολλή συνάφεια του κόσμου…». Μπορείτε να εντοπίσετε κάποιο κοινό σημείο ανάμεσα στο ποίημα του Καβάφη και τη θέση του Αριστοτέλη «Διὸ δεῖ τὰς ἐνεργείας ποιὰς ἀποδιδόναι»;',
      passage:'Όσο Μπορείς\nΚι αν δεν μπορείς να κάμεις την ζωή σου όπως την θέλεις,\nτούτο προσπάθησε τουλάχιστον\nόσο μπορείς: μην την εξευτελίζεις\nμες στην πολλή συνάφεια του κόσμου,\nμες στες πολλές κινήσεις κι ομιλίες.\nΜην την εξευτελίζεις πηαίνοντάς την,\nγυρίζοντας συχνά κ’ εκθέτοντάς την\nστων σχέσεων και των συναναστροφών\nτην καθημερινήν ανοησία,\nώς που να γίνει σα μια ξένη φορτική.\n— Κ. Π. Καβάφης',
      answer:'Κοινό σημείο είναι η έμφαση στην ποιότητα των καθημερινών ενεργειών και συναναστροφών ως παράγοντα που διαμορφώνει τη ζωή και τον χαρακτήρα. Ο Αριστοτέλης λέει ότι «δεῖ τὰς ἐνεργείας ποιὰς ἀποδιδόναι»: δεν αρκεί απλώς να πράττουμε, αλλά οι πράξεις μας πρέπει να έχουν συγκεκριμένη —σωστή— ποιότητα, γιατί από αυτές προκύπτουν οι έξεις, τα μόνιμα στοιχεία του χαρακτήρα. Ο Καβάφης, αντίστοιχα, προειδοποιεί να μην «εξευτελίζουμε» τη ζωή μας στην «πολλή συνάφεια του κόσμου», στις άσκοπες κινήσεις, ομιλίες και επιφανειακές σχέσεις που την κάνουν «ξένη» και «φορτική». Και οι δύο, δηλαδή, θεωρούν ότι η καθημερινή συμπεριφορά και η φύση των σχέσεών μας (η αριστοτελική «συνάφεια» / «συναλλάγματα») δεν είναι ουδέτερη: η κακή, ανούσια «άσκηση» φθείρει, ενώ η επιλογή ποιοτικών ενεργειών διαφυλάσσει την αξία της ζωής και του ήθους. Η διαφορά είναι ότι ο Αριστοτέλης δίνει μια θετική, οικοδομητική οδηγία (καλλιέργησε καλές έξεις), ενώ ο Καβάφης μια αμυντική, προστατευτική (μην αφήνεις τη ζωή σου να ευτελιστεί).' },
  ],

      answer:'Για να αποδοθούν σε ένα πράγμα οι έννοιες «πλεῖον», «ἔλαττον» και «ἴσον», ο Αριστοτέλης απαιτεί δύο θεμελιώδη γνωρίσματα: το πράγμα να είναι «συνεχές» και «διαιρετό». Συνεχές είναι αυτό που αποτελεί ενιαίο μέγεθος (χωρίς κενά/ασυνέχειες) και διαιρετό αυτό που μπορεί να χωριστεί, μάλιστα επ’ άπειρον. Μόνο σε ένα τέτοιο μέγεθος έχει νόημα να μιλήσουμε για μεγαλύτερο, μικρότερο και ίσο μέρος, και επομένως να αναζητήσουμε το «μέσον», δηλαδή το σημείο που το χωρίζει σε δύο ίσα τμήματα. Χωρίς τη συνέχεια και τη διαιρετότητα οι τρεις αυτές ποσοτικές έννοιες δεν μπορούν να εφαρμοστούν. Ο Αριστοτέλης προσθέτει ότι η διαίρεση αυτή γίνεται με δύο κριτήρια: αντικειμενικά («κατ’ αὐτὸ τὸ πρᾶγμα») ή υποκειμενικά («πρὸς ἡμᾶς»).' },

      answer:'Η ενότητα στηρίζει τη θέση ότι καμία ηθική αρετή δεν είναι έμφυτη. Η αρετή ορίζεται ως μεσότητα προσδιοριζόμενη με υποκειμενικά κριτήρια («πρὸς ἡμᾶς»)· άρα το «σωστό» μέτρο μεταβάλλεται από άνθρωπο σε άνθρωπο και από περίσταση σε περίσταση. Αν όμως η αρετή ήταν έμφυτο χαρακτηριστικό, θα ήταν σταθερή και αμετάβλητη, ίδια για όλους — κάτι που αντιφάσκει με τη σχετικότητα του υποκειμενικού μέσου. Επιπλέον, η αρετή είναι προϊόν ελεύθερης επιλογής («αἱρεῖται») και προϋποθέτει λογική διεργασία («ἐπιστήμων … ζητεῖ»), δηλαδή προσπάθεια, εθισμό και άσκηση· αν ήταν φυσική, δεν θα χρειαζόταν ο εθισμός, ούτε θα είχαν νόημα οι προσπάθειες των νομοθετών να καταστήσουν τους πολίτες ενάρετους. Άρα η αρετή αποκτάται, δεν γεννιέται μαζί μας.' },

  theme:'Στο ερώτημα πώς ορίζεται η μετρημένη στάση, με ποιο κριτήριο θα αποφασίσει ο άνθρωπος τα όρια του ηθικού μέτρου και του δέοντος, ο Αριστοτέλης απάντησε ότι δεν υπάρχει αντικειμενικός τρόπος. Η μεσότητα είναι προσωπική υπόθεση· άλλη είναι η μεσότητα-ανδρεία για εκείνον που εκ χαρακτήρος τείνει προς την έλλειψη-δειλία και άλλη για εκείνον που τείνει προς την υπερβολή-θράσος. Το υποκειμενικό μέσο δεν ισαπέχει από τα άκρα της υπερβολής και της έλλειψης, οπότε η εύρεσή του παραμένει ζητούμενο σε κάθε περίσταση· ζητούμενο που απαιτεί σταθερή προσήλωση και διανοητική εγρήγορση. Η αρετή, λοιπόν, ταυτίζεται με τη μεσότητα, αλλά δεν πρέπει να την εκλάβουμε ως κάτι ουδέτερο και μετριοπαθές, χλιαρό και άχρωμο. Μπορεί να πραγματώνει το μέτρο ανάμεσα στα άκρα της υπερβολής και της έλλειψης, αλλά ως στάση ζωής η αρετή είναι ἀκρότης, δυσεπίτευκτη κορύφωση ενός αγώνα που κρατάει ολόκληρη ζωή.',

  text:[

    { gr:'Ἡ δ’ ἀρετὴ περὶ πάθη καὶ πράξεις ἐστίν, ἐν οἷς ἡ μὲν ὑπερβολὴ ἁμαρτάνεται καὶ ψέγεται καὶ ἡ ἔλλειψις, τὸ δὲ μέσον ἐπαινεῖται καὶ κατορθοῦται· ταῦτα δ’ ἄμφω τῆς ἀρετῆς.',

    { gr:'Μεσότης τις ἄρα ἐστὶν ἡ ἀρετή, στοχαστική γε οὖσα τοῦ μέσου. […]',

    { gr:'Μεσότης δὲ δύο κακιῶν, τῆς μὲν καθ’ ὑπερβολὴν τῆς δὲ κατ’ ἔλλειψιν· καὶ ἔτι τῷ τὰς μὲν ἐλλείπειν τὰς δ’ ὑπερβάλλειν τοῦ δέοντος ἔν τε τοῖς πάθεσι καὶ ἐν ταῖς πράξεσι, τὴν δ’ ἀρετὴν τὸ μέσον καὶ εὑρίσκειν καὶ αἱρεῖσθαι.',

  fakelos:[
    { src:'φοβηθῆναι, θαρρῆσαι, …, λυπηθῆναι (Φάκελος Υλικού, σελ. 139)', paras:[
      'Ο Αριστοτέλης προτιμά εδώ να αναφερθεί στα πάθη μέσω απαρεμφάτων. Θέλει να τονίσει ότι στην περίπτωση της ηθικής δεν έχει τόσο σημασία το συναίσθημα που αναπτύσσει ο άνθρωπος στην ψυχή του, αλλά η έμπρακτη εκδήλωσή του. Η αρετή και η κακία κρίνονται πάντα στις σχέσεις μεταξύ των ανθρώπων.'
    ]},
    { src:'ψόγος–ἔπαινος (Φάκελος Υλικού, σελ. 139)', paras:[
      'Ο ἔπαινος και ο ψόγος [: επίκριση, αποδοκιμασία], που αποδίδονται από την κοινωνία στα μέλη της, αποτελούν το χαρακτηριστικότερο δείγμα του πολιτικού χαρακτήρα της αριστοτελικής ηθικής. Οι καθιερωμένες αξίες της κοινωνίας αποτελούν ένα αντικειμενικό δεδομένο για τον εκάστοτε πολίτη. Εξισορροπείται έτσι ο προσωπικός-υποκειμενικός χαρακτήρας της ηθικής.'
    ]},
    { src:'προαίρεσις (Φάκελος Υλικού, σελ. 139)', paras:[
      'Η λέξη προαίρεσις [: έλλογη προτίμηση] δεν δηλώνει μια άλογη και αδικαιολόγητη επιθυμία. Είναι δομικά συνδεμένη με τη διανοητική ικανότητα του ανθρώπου, τη σκέψη και την κρίση του. Αποτελεί επιλογή ανάμεσα στο καλό και το κακό και επιδίωξη του ενός ή του άλλου. Στο πλαίσιο της ηθικής διδασκαλίας του Αριστοτέλη ανατίθεται καθοριστικός ρόλος στην προαίρεση. Ο λόγος είναι ότι αποτελεί ελεύθερη και συνειδητή επιλογή του ενός ή του άλλου τρόπου ζωής, επιλογή που οδηγεί σε συγκεκριμένες αποφάσεις σε κάθε μία επιμέρους περίπτωση. Δίκαιος δεν είναι αυτός που τυχαίνει να κάνει κάποιες δίκαιες πράξεις, αλλά αυτός που συνειδητά επέλεξε τη δικαιοσύνη ως στάση ζωής και ακολουθεί στις επιμέρους επιλογές του την αντίστοιχη σταθερή πορεία.'
    ]},
    { src:'μεσότης (Φάκελος Υλικού, σελ. 139)', paras:[
      'Όπως είδαμε, ο άνθρωπος διαμορφώνει στο πεδίο της ηθικής ορισμένες ἕξεις, παγιωμένα γνωρίσματα του χαρακτήρα και της συμπεριφοράς του. Άλλες από αυτές αποτελούν υπερβολές και ελλείψεις, δηλαδή κακίες, και άλλες μεσότητες, δηλαδή αρετές. Στον ορισμό της αρετής ο Σταγειρίτης επισημαίνει ότι η αρετή δεν αποτελεί μια αντικειμενική και υποχρεωτική για όλους εκδοχή της μεσότητας αλλά είναι η υποκειμενική και προσωπική αντίληψή της. Αυτή καθορίζεται από τον ορθό λόγο, όπως αυτός εκφράζεται από τον φρόνιμον πολίτη.'
    ]},
    { src:'φρόνιμος (Φάκελος Υλικού, σελ. 139)', paras:[
      'Ο άνθρωπος που διαθέτει φρόνηση αποτελεί συμβολικό ή και ένσαρκο ηθικό πρότυπο μέσα στην κοινωνία και με τις τεκμηριωμένες επιλογές του γίνεται ο γνώμονας (κανών) της ηθικής-πολιτικής αρετής: Ἔτι δὲ τίς ἡμῖν κανὼν ἢ τίς ὅρος ἀκριβέστερος τῶν ἀγαθῶν πλὴν ὁ φρόνιμος; ὅσα γὰρ ἂν οὗτος ἕλοιτο κατὰ τὴν ἐπιστήμην αἱρούμενος, ταῦτ’ ἐστὶν ἀγαθὰ καὶ κακὰ δὲ τὰ ἐναντία τούτοις [: Κι άλλωστε ποιο κριτήριο θα ήταν πιο έγκυρο ή ποιος θα ήταν καλύτερος οδηγός μας για τα αγαθά από τον φρόνιμο, που όσα εκείνος θα όριζε, κρίνοντας με βάση την τέλεια γνώση του αγαθού, αυτά θα ήταν αγαθά, όπως τα αντίθετά τους φαύλα – Προτρεπτικός, 39.1-3, μετάφραση Λ. Μπενάκης]. Το κοινωνικό πρότυπο του φρονίμου είναι επίσης ένα σχετικά αντικειμενικό δεδομένο που μετριάζει τον προσωπικό-υποκειμενικό χαρακτήρα της αριστοτελικής ηθικής.'
    ]},

  /* ── ΕΡΜΗΝΕΥΤΙΚΗ ΠΡΟΣΕΓΓΙΣΗ (κριτική επεξεργασία) ── */
  ermineutiki:[
    { lemma:'Οἷον καὶ φοβηθῆναι … ἀμφότερα οὐκ εὖ', note:'Με επαγωγικό τρόπο ο Αριστοτέλης δίνει ενδεικτικά παραδείγματα παθών (ευχάριστων και δυσάρεστων), για να αποδείξει ότι σ’ αυτά υπάρχει υπερβολή, έλλειψη και το μέσον. Τα βιώνουμε «καὶ μᾶλλον καὶ ἧττον»: το «μᾶλλον» (σε μεγαλύτερο βαθμό) οδηγεί στην υπερβολή, το «ἧττον» (σε μικρότερο βαθμό) στην έλλειψη· κανένα από τα δύο «οὐκ εὖ», γιατί απομακρύνει από τη μεσότητα. Μετά τα επιρρήματα εννοείται η γενική συγκριτική «τοῦ δέοντος», που προσδίδει δεοντολογικό χαρακτήρα.' },
    { lemma:'φοβηθῆναι, θαρρῆσαι, …, λυπηθῆναι (απαρέμφατα)', note:'Η προτίμηση απαρεμφάτων αντί ουσιαστικών δείχνει ότι στην ηθική δεν μετράει τόσο το συναίσθημα καθαυτό όσο η έμπρακτη εκδήλωσή του· αρετή και κακία κρίνονται πάντα μέσα στις σχέσεις των ανθρώπων.' },
    { lemma:'τὸ δ’ ὅτε δεῖ … ὡς δεῖ', note:'Πέντε δεοντολογικές προϋποθέσεις της μεσότητας, με πολυσύνδετο σχήμα που δίνει έμφαση: ὅτε δεῖ (η σωστή στιγμή), ἐφ’ οἷς (τα πράγματα/συνθήκες), πρὸς οὓς (οι άνθρωποι), οὗ ἕνεκα (ο λόγος), ὡς δεῖ (ο τρόπος). Η συνεχής επανάληψη ή εννόηση του «δεῖ» κατευθύνει προς την ηθικά ορθή πράξη· η τήρησή τους απαιτεί μόχθο και επίπονη προσπάθεια.' },
    { lemma:'Πώς καθορίζεται η ηθικά ορθή συμπεριφορά', note:'Στους αρχαίους Έλληνες τα κριτήρια εντάσσονται στο πλαίσιο της πόλης-κράτους (ο πολίτης λειτουργεί ως μέλος του συνόλου): (α) οι γραπτοί νόμοι της πόλης, (β) η παράδοση/άγραφοι νόμοι και τα πρότυπα προς μίμηση ή αποφυγή, (γ) η λογική, δηλαδή ο ορθός λόγος του φρόνιμου. Τα κριτήρια μεταβάλλονται ανάλογα με την κοινωνία, την εποχή, τον τόπο· έτσι την ευθύνη για την κατάκτηση της αρετής την έχει ο ίδιος ο άνθρωπος.' },
    { lemma:'μέσον τε καὶ ἄριστον', note:'Η αρετή δεν είναι το ίδιο το συναίσθημα, αλλά προκύπτει από μια λογική επέμβαση του ανθρώπου στο συναίσθημα, σύμφωνα με τις πέντε συνθήκες του «δεῖ». Ως προς την ουσία της είναι μεσότητα, ως προς το «ἄριστον» όμως είναι ἀκρότης που συμπίπτει με το υπέρτατο αγαθό. Φαινομενικά οξύμωρο (μέσον = άριστο): το «ἄριστον» είναι η τελειότητα, ο ανώτατος βαθμός που ούτε ξεπερνιέται ούτε υπολείπεται· έτσι η αντίφαση αίρεται. Η αντωνυμία «ὅπερ» αναφέρεται στο «ἄριστον» και συσχετίζει ετυμολογικά «ἄριστον» και «ἀρετῆς».' },
    { lemma:'Ὁμοίως δὲ καὶ περὶ τὰς πράξεις …', note:'Ό,τι ισχύει για τα συναισθήματα ισχύει και για τις πράξεις: και σ’ αυτές υπάρχει υπερβολή, έλλειψη και μέσον, με τις ίδιες προϋποθέσεις. Η αναλογία δηλώνεται με το επίρρημα «ὁμοίως».' },
    { lemma:'Ἡ δ’ ἀρετὴ περὶ πάθη καὶ πράξεις … ταῦτα δ’ ἄμφω τῆς ἀρετῆς', note:'Οι ακρότητες (υπερβολή–έλλειψη) στα πάθη και τις πράξεις είναι ανεπιθύμητες («ἁμαρτάνεται καὶ ψέγεται»), η μεσότητα επιθυμητή («ἐπαινεῖται καὶ κατορθοῦται»). Οι τύποι «ψέγεται/ἐπαινεῖται» και τα «δεῖ» αναδεικνύουν τον κοινωνικό χαρακτήρα της αρετής: η κοινή γνώμη-κοινωνία ψέγει ή επαινεί και ορίζει το σωστό. Η αριστοτελική αρετή είναι ανθρώπινη, κατακτητή με λογική και μόχθο, σε αντίθεση με την πλατωνική που τοποθετείται σε νοητό-μεταφυσικό κόσμο.' },
    { lemma:'Μεσότης τις ἄρα ἐστὶν ἡ ἀρετή', note:'Στο συμπέρασμα η αρετή ορίζεται ως «κάποια» (τις) μεσότητα, διατηρώντας τον υποκειμενικό χαρακτήρα του προσδιορισμού της. Η χρήση οριστικής έγκλισης («ἐστὶν») μετά από λογικό έλεγχο με παραδείγματα δείχνει βεβαιότητα, αλλά και επιστημονική στάση: ο φιλόσοφος μένει ανοιχτός σε περαιτέρω διερεύνηση, απέχοντας από τον δογματισμό.' },
    { lemma:'Ἔστιν ἄρα ἡ ἀρετὴ ἕξις προαιρετική … (πλήρης ορισμός)', note:'Ο πλήρης ορισμός. Οριστέα έννοια: αρετή. Έννοια γένους: ἕξις (< μέλλ. «ἕξω» του «ἔχω») = μόνιμο στοιχείο του χαρακτήρα από συνήθεια/άσκηση. Ειδοποιός διαφορά: «ἐν μεσότητι οὖσα τῇ πρὸς ἡμᾶς» = μεσότητα με υποκειμενικά κριτήρια, σχετική για τον κάθε άνθρωπο. Η μεσότητα «ὡρισμένη λόγῳ καὶ ᾧ ἂν ὁ φρόνιμος ὁρίσειεν»: αντικειμενικό κριτήριο ο ορθός λόγος, και μάλιστα η λογική του φρόνιμου ανθρώπου. «προαιρετική»: η αρετή προϋποθέτει ελεύθερη, έλλογη εκλογή — μαζί με τη συνείδηση της πράξης («εἰδὼς») και τη σταθερότητα («βεβαίως καὶ ἀμετακινήτως»).' },
    { lemma:'Μεσότης δὲ δύο κακιῶν …', note:'Ορισμός της μεσότητας: βρίσκεται ανάμεσα σε δύο κακίες, τη μία κατά την υπερβολή, την άλλη κατά την έλλειψη. Άλλες κακίες υπολείπονται και άλλες υπερβαίνουν «τοῦ δέοντος», στα πάθη και στις πράξεις· η αρετή αντίθετα και «εὑρίσκει» και «αἱρεῖται» το μέσον — απαιτεί δηλαδή και διανοητική εύρεση και ελεύθερη επιλογή.' },

  ermineytikes:[
    { q:'Σε ποια πάθη αναφέρεται στην ενότητα ο Αριστοτέλης και ποιες γενικότερες συναισθηματικές καταστάσεις τα συνοδεύουν;',
      answer:'Ο Αριστοτέλης απαριθμεί ενδεικτικά, με επαγωγικό τρόπο και μέσω απαρεμφάτων, τα εξής πάθη: φόβος (φοβηθῆναι), θάρρος (θαρρῆσαι), επιθυμία (ἐπιθυμῆσαι), οργή (ὀργισθῆναι) και οίκτος/ευσπλαχνία (ἐλεῆσαι). Τις επιμέρους αυτές συγκινήσεις τις εντάσσει σε δύο γενικότερες συναισθηματικές καταστάσεις που τις συνοδεύουν: την ευχαρίστηση (ἡσθῆναι) και τη δυσαρέσκεια/λύπη (λυπηθῆναι). Η διάκριση αυτή (ευχάριστα – δυσάρεστα) δείχνει ότι σε όλα τα πάθη υπάρχει το «μᾶλλον» (υπερβολή) και το «ἧττον» (έλλειψη), και ζητούμενο είναι το μέσον. Η χρήση απαρεμφάτων υπογραμμίζει ότι σημασία δεν έχει το συναίσθημα καθαυτό, αλλά η έμπρακτη, μετρημένη εκδήλωσή του μέσα στις σχέσεις των ανθρώπων.' },
    { q:'Όπως είδαμε σε προηγούμενη ενότητα, η μεσότητα που έχει σχέση με την ηθική αρετή ορίζεται με κριτήριο το υποκείμενό της (πρὸς ἡμᾶς). Ποια κριτήρια προσθέτει εδώ ο φιλόσοφος, ώστε να οριστεί πληρέστερα η έννοια της «μεσότητας»;',
      answer:'Δίπλα στο υποκειμενικό κριτήριο («τῇ πρὸς ἡμᾶς») ο Αριστοτέλης προσθέτει ένα αντικειμενικό ρυθμιστικό κριτήριο που περιορίζει την υποκειμενικότητα: η μεσότητα είναι «ὡρισμένη λόγῳ», δηλαδή καθορίζεται από τη λογική, τον ορθό λόγο. Και προχωρεί ακόμη αυστηρότερα: δεν αρκεί η κοινή ανθρώπινη λογική, αλλά χρειάζεται η λογική «ᾧ ἂν ὁ φρόνιμος ὁρίσειεν», δηλαδή του φρόνιμου ανθρώπου, εκείνου που «βουλεύεται εὖ». Ταυτόχρονα, από τα προηγούμενα, η μεσότητα εξειδικεύεται με τις πέντε δεοντολογικές προϋποθέσεις του «δεῖ» (ὅτε δεῖ, ἐφ’ οἷς, πρὸς οὓς, οὗ ἕνεκα, ὡς δεῖ). Έτσι το υποκειμενικό μέσο κερδίζει σε αντικειμενικότητα, χωρίς όμως να γίνεται ένα και το αυτό για όλους.' },
    { q:'Ο Α. Lesky γράφει για τα Ἠθικά Νικομάχεια ότι «είναι μια ανάλυση του ηθικού, όπως αυτό εμφανίζεται κάτω από τις διάφορες συνθήκες της πραγματικότητας», και προσθέτει «ο Αριστοτέλης, σε πολύ ανώτερο βαθμό από τον Πλάτωνα, λαμβάνει υπόψη του την επικαιρικότητα της ανθρώπινης συμπεριφοράς». Να δείξετε την αλήθεια αυτών των απόψεων με τη βοήθεια χωρίων της ενότητας.',
      answer:'Ο Αριστοτέλης δεν ορίζει την αρετή αφηρημένα, αλλά όπως εμφανίζεται μέσα στις συγκεκριμένες συνθήκες της ζωής. Οι πέντε προϋποθέσεις του «δεῖ» («ὅτε δεῖ καὶ ἐφ’ οἷς καὶ πρὸς οὓς καὶ οὗ ἕνεκα καὶ ὡς δεῖ») εξαρτούν την ηθική συμπεριφορά από την περίσταση: τη χρονική στιγμή, τα πράγματα, τους ανθρώπους, τον λόγο και τον τρόπο — δηλαδή από την επικαιρικότητα κάθε πράξης. Επιπλέον η μεσότητα ορίζεται «πρὸς ἡμᾶς», σχετική για τον καθένα και μεταβλητή ανάλογα με τις ανάγκες, τις περιστάσεις, την εποχή και τον τόπο, ενώ κριτής της είναι ο φρόνιμος άνθρωπος μέσα στη συγκεκριμένη κοινωνία. Αντίθετα, η πλατωνική αρετή τοποθετείται σε έναν νοητό, μεταφυσικό κόσμο, έξω από την πρακτική ζωή. Έτσι επιβεβαιώνεται ότι ο Αριστοτέλης, πολύ περισσότερο από τον Πλάτωνα, αναλύει το ηθικό μέσα στην κινούμενη πραγματικότητα.' },
    { q:'Πώς φαίνεται μέσα στο κείμενο η κοινωνική διάσταση της αρετής; Συμφωνούν οι απόψεις του Αριστοτέλη και του Πλάτωνα ως προς αυτό το σημείο;',
      answer:'Η κοινωνική διάσταση φαίνεται κυρίως από τα ρήματα «ψέγεται» και «ἐπαινεῖται» (και τα «ἁμαρτάνεται – κατορθοῦται»): ο ψόγος και ο έπαινος αποδίδονται από την κοινωνία, άρα είναι η κοινή γνώμη-πόλη που κρίνει τι είναι σωστό και τι λάθος. Το ίδιο δηλώνουν τα επαναλαμβανόμενα ή εννοούμενα «δεῖ» και η γενική «τοῦ δέοντος», που παραπέμπουν σε κοινωνικά αποδεκτούς κανόνες. Κριτής και πρότυπο είναι ο «φρόνιμος» ως γνώμονας της ηθικής-πολιτικής αρετής μέσα στην πόλη. Η αρετή για τον Αριστοτέλη είναι ανθρώπινη ιδιότητα, κατακτητή από τον καθένα που ενεργεί με λογική και μόχθο μέσα στο κοινωνικό σύνολο. Ο Πλάτων δεν συμφωνεί σε αυτό: για εκείνον η αρετή είναι γνώση που τοποθετείται σε έναν νοητό, μεταφυσικό κόσμο, έξω από την πρακτική-κοινωνική ζωή· επομένως οι δύο φιλόσοφοι διαφωνούν ως προς την κοινωνική/πρακτική θεμελίωση της αρετής.' },
    { q:'Ποια σημασία έχει η προαίρεσις και ειδικά το γεγονός ότι η αρετή χαρακτηρίζεται ως ἕξις προαιρετική; Για να κατανοήσετε τη σημασία της σκεφθείτε αν θα μπορούσε να χαρακτηρίζεται από αντίθετες προς την προαίρεσιν έννοιες-γνωρίσματα.',
      answer:'Η «προαίρεσις» είναι η ελεύθερη και έλλογη εκλογή/βούληση, η συνειδητή επιλογή ανάμεσα στο καλό και το κακό. Ονομάζοντας την αρετή «ἕξιν προαιρετικήν», ο Αριστοτέλης τονίζει ότι δεν αρκεί κανείς να πράττει τυχαία κάτι σωστό· πρέπει να το επιλέγει ελεύθερα και συνειδητά, με σκέψη και κρίση (μαζί με τη συνείδηση της πράξης, «εἰδὼς», και τη σταθερότητα, «βεβαίως καὶ ἀμετακινήτως»). Έτσι την ευθύνη για την αρετή την έχει ο ίδιος ο άνθρωπος. Αν, αντίθετα, η αρετή χαρακτηριζόταν από έννοιες αντίθετες προς την προαίρεση —καταναγκασμό, άγνοια, τύχη, αστάθεια— τότε θα έχανε κάθε ηθική αξία: μια ενάρετη πράξη επιβεβλημένη ή τυχαία δεν θα άξιζε έπαινο, γιατί δεν θα ήταν πράγματι δική μας. Επομένως η προαίρεσις είναι απαραίτητος όρος ύπαρξης της αρετής.' },
    { q:'Με βάση το διδαγμένο κείμενο και το παρακάτω απόσπασμα που προέρχεται, επίσης, από τα «Ηθικά Νικομάχεια» να σχολιάσετε την άποψη του Αριστοτέλη ότι η αρετή «ἐστι περὶ πάθη καὶ πράξεις» και ότι το «μέσον τε καὶ ἄριστον» σχετίζεται με την αρετή.',
      passage:'Εν πάση περιπτώσει η θεωρία αυτή της μεσότητας δε βρίσκει εφαρμογή σε κάθε πράξη και σε κάθε πάθος· υπάρχουν, πράγματι, πάθη που ήδη η λέξη που τα δηλώνει φέρνει στο μυαλό μας κάτι αρνητικό και τιποτένιο, π.χ. επιχαιρεκακία, αδιαντροπιά, φθόνος, και στην περίπτωση των πράξεων: μοιχεία, κλεψιά, φόνος· γιατί όλα αυτά –και όσα άλλα τέτοια– τα λέμε με τη βεβαιότητα ότι είναι αρνητικά και τιποτένια τα ίδια και όχι η υπερβολή ή η έλλειψή τους. Δεν υπάρχει, λοιπόν, περίπτωση να κάνει ποτέ κανείς το σωστό σε σχέση με αυτά· αυτό είναι πάντοτε λάθος. […] Όπως όμως δεν υπάρχει υπερβολή και έλλειψη στις περιπτώσεις της σωφροσύνης και της ανδρείας επειδή το μέσον στις περιπτώσεις αυτές είναι κατά κάποιον τρόπο άκρον, έτσι ακριβώς δεν υπάρχει μέσον, ούτε υπερβολή ή έλλειψη, και στις περιπτώσεις που αναφέραμε πρωτύτερα.\n— Ἀριστοτέλης, Ἠθικὰ Νικομάχεια',
      answer:'Στο διδαγμένο κείμενο ο Αριστοτέλης θεμελιώνει ότι η αρετή αναφέρεται «περὶ πάθη καὶ πράξεις»: και στα δύο πεδία υπάρχει υπερβολή, έλλειψη και μέσον, και η αρετή είναι το «μέσον τε καὶ ἄριστον», δηλαδή η μετρημένη στάση σύμφωνα με τις πέντε προϋποθέσεις του «δεῖ». Το παράθεμα όμως θέτει ένα ουσιώδες όριο: η θεωρία της μεσότητας δεν εφαρμόζεται σε κάθε πάθος και πράξη. Υπάρχουν πάθη (επιχαιρεκακία, αδιαντροπιά, φθόνος) και πράξεις (μοιχεία, κλοπή, φόνος) που είναι καθαυτά κακά· εκεί δεν υπάρχει «σωστό» μέτρο, γιατί το ίδιο το πράγμα, όχι η υπερβολή ή η έλλειψή του, είναι το κακό. Έτσι φωτίζεται και το «μέσον τε καὶ ἄριστον» της ενότητας: το μέσον δεν είναι ένα άχρωμο ενδιάμεσο, αλλά συμπίπτει με το άριστο, με τον υπέρτατο βαθμό τελειότητας — γι’ αυτό στην ανδρεία ή τη σωφροσύνη το μέσον είναι «κατά κάποιον τρόπο άκρον». Επομένως η μεσότητα ισχύει μόνο εκεί όπου το πάθος ή η πράξη είναι ηθικά ουδέτερα και επιδέχονται διαβάθμιση, όχι στα εγγενώς φαύλα.' },

    { q:'Να συνθέσετε τον ορισμό της πόλης όπως συνάγεται από την πρώτη παράγραφο του κειμένου. Ποια είναι η έννοια του προσεχούς γένους της πόλης και ποια η ειδοποιός της διαφορά;',
      answer:'Ορισμός: η πόλη είναι η ανώτερη μορφή κοινωνικής συνύπαρξης («ἡ πασῶν κυριωτάτη»), που εμπεριέχει όλες τις άλλες κοινότητες («πάσας περιέχουσα τὰς ἄλλας») και αποβλέπει στο ανώτερο από όλα τα αγαθά («τοῦ κυριωτάτου πάντων»), δηλαδή στην ευδαιμονία των πολιτών· είναι «ἡ κοινωνία ἡ πολιτική», η πολιτειακά οργανωμένη κοινότητα με αυτάρκεια, θεσμούς και πολίτευμα. Στον ορισμό διακρίνουμε: (α) προσεχές γένος = «κοινωνία» («κοινωνίαν τινὰ οὖσαν»), η ευρύτερη κατηγορία στην οποία εντάσσεται η πόλη· (β) ειδοποιός διαφορά = το ανώτερο αγαθό στο οποίο αποβλέπει, η ευδαιμονία του συνόλου των πολιτών — ενώ οι άλλες κοινωνίες επιδιώκουν ένα επιμέρους αγαθό για τα μέλη τους.' },
    { q:'Έχοντας υπόψη ότι τελεολογική σκέψη ονομάζουμε αυτή που αναζητεί τελικά αίτια (τέλος = σκοπός) για την εξήγηση των πραγμάτων: α) να γράψετε τις φράσεις της Ενότητας που δηλώνουν τελικό αίτιο και β) να τις αναλύσετε με απλά λόγια.',
      answer:'Τελικό αίτιο δηλώνουν: (1) «πᾶσαν κοινωνίαν ἀγαθοῦ τινος ἕνεκεν συνεστηκυῖαν» και «πᾶσαι μὲν ἀγαθοῦ τινος στοχάζονται» — κάθε κοινωνία έχει συσταθεί και υπάρχει για την επίτευξη ενός σκοπού/αγαθού. (2) «τοῦ γὰρ εἶναι δοκοῦντος ἀγαθοῦ χάριν πάντα πράττουσι πάντες» — κάθε ανθρώπινη πράξη είναι σκόπιμη, γίνεται για κάποιο αγαθό (όχι απαραίτητα ηθικά ορθό)· δεν υπάρχει κοινωνική συμβίωση χωρίς κοινή επιδίωξη. (3) «μάλιστα δὲ καὶ τοῦ κυριωτάτου πάντων ἡ πασῶν κυριωτάτη» — η πόλη, ως ανώτερη κοινωνία, στοχεύει στο ανώτερο αγαθό, την ευδαιμονία. (4) «γινομένη μὲν τοῦ ζῆν ἕνεκεν, οὖσα δὲ τοῦ εὖ ζῆν» — τελικός σκοπός της πόλης είναι η καλή ζωή. Έτσι ο χαρακτήρας κάθε όντος αναζητείται στο τέλος/σκοπό του, όχι στην προέλευσή του.' },
    { q:'Να εξηγήσετε τη σύνδεση ηθικής και πολιτικής στη σκέψη του Αριστοτέλη με βάση το κείμενο της Ενότητας.',
      answer:'Ο Αριστοτέλης συνδέει τον άνθρωπο-πολίτη με την πόλη μέσω της φράσης «πάντα πράττουσι πάντες»: η επιδίωξη του αγαθού ως σκοπού όλων των ανθρώπων ταυτίζεται με την επιδίωξη του αγαθού ως σκοπού της πόλης. Το κυριότερο αγαθό, η ευδαιμονία, έχει διπλό περιεχόμενο — ηθικό (αφορά τον άνθρωπο ως άτομο) και πολιτικό (είναι ο προορισμός της πόλης, αφορά τον άνθρωπο ως πολίτη). Ο άνθρωπος κατακτά με τις ηθικές του ενέργειες τόσο την ατομική ευδαιμονία όσο και την ευδαιμονία μέσα στην πόλη, συνυπάρχοντας αρμονικά με τους άλλους πολίτες. Έτσι οι πράξεις του είναι πολιτικές πράξεις με πολιτικές συνέπειες, και επιβεβαιώνεται ότι η ηθική φιλοσοφία αποτελεί μέρος της πολιτικής φιλοσοφίας.' },

      answer:'α) Το υπέρτατο αγαθό υποδηλώνεται με τη φράση «τοῦ κυριωτάτου πάντων» (το κυριότερο απ’ όλα τα αγαθά), στο οποίο στοχεύει «ἡ πασῶν κυριωτάτη» κοινωνία, η πόλη· έμμεσα και με το «οὖσα δὲ τοῦ εὖ ζῆν». β) Ο Αριστοτέλης δέχεται την απόλυτη σύμπτωση του υπέρτατου αγαθού του ατόμου με το υπέρτατο αγαθό της πόλης. Στον ηθικό βίο η ευδαιμονία είναι το «ἀκρότατον» αγαθό που ο άνθρωπος κατακτά με τις ενάρετες πράξεις του. Για την πόλη, η ευδαιμονία είναι ο προορισμός της, το «τέλος» της, που αφορά «ἅπαντα τὸν βίον» του συνόλου των πολιτών· επιτυγχάνεται μέσω της αυτάρκειας και του «εὖ ζῆν». Όπως η ατομική ευδαιμονία πραγματώνεται με τις πράξεις του ατόμου, έτσι και της πόλης με τις πράξεις των πολιτών.' },
    { q:'Να συγκρίνετε τις απόψεις της ενότητας των Πολιτικών σχετικά με τον άπολιν άνθρωπο, με το απόσπασμα του Επιταφίου του Περικλή.',
      passage:'«..Εμείς οι ίδιοι φροντίζουμε και για τις ιδιωτικές μας υποθέσεις και για τα πολιτικά πράγματα (αυτά δηλαδή που αφορούν την πόλη). Κι ενώ ο καθένας μας κοιτάζει τη δουλειά του, δεν ασχολούμαστε λιγότερο με τα πολιτικά. Γιατί είμαστε οι μόνοι που όποιον δεν παίρνει μέρος καθόλου στα πολιτικά δεν τον θεωρούμε έναν ήσυχο άνθρωπο αλλά “άχρηστο”...»\n— Θουκυδίδης, Περικλέους Επιτάφιος',
      answer:'Οι δύο απόψεις συγκλίνουν. Και για τον Αριστοτέλη και για τον Περικλή η ζωή του ανθρώπου νοηματοδοτείται μέσα στην πόλη και μέσα από τη συμμετοχή στα κοινά. Στα Πολιτικά η πόλη υπάρχει «φύσει» και είναι το «τέλος» του ανθρώπου, ο οποίος πραγματώνει την ευδαιμονία του μόνο ως πολίτης· έξω από την πόλη είναι ατελής («ἄπολις»). Ο Περικλής, ανάλογα, θεωρεί «άχρηστο» —όχι απλώς ήσυχο— όποιον δεν συμμετέχει στα πολιτικά: ο Αθηναίος συνδυάζει ιδιωτική και δημόσια ζωή. Και στους δύο η πολιτική συμμετοχή δεν είναι πάρεργο αλλά ουσιώδης όρος της ολοκλήρωσης του ανθρώπου· ο άπολις/απολίτικος άνθρωπος θεωρείται ελλιπής.' },

      'Ο Αριστοτέλης χαρακτηρίζει τη δημοκρατία παρέκβαση (ατελή και υποδεέστερη μορφή) του ορθού πολιτεύματος που ο ίδιος ονομάζει πολιτεία (Πολιτικὰ 1279a28-31): όταν ασκούν την εξουσία ο ένας ή οι ολίγοι ή οι πολλοί αποβλέποντας στο κοινό συμφέρον, τότε τα πολιτεύματα αυτά υποχρεωτικά είναι ορθά. Αντίθετα είναι παρεκβατικά, όταν η άσκηση της εξουσίας αποβλέπει στο ατομικό συμφέρον του ενός ή των λίγων ή των πολλών. Τόσο η πολιτεία όσο και η δημοκρατία κυβερνώνται με βάση την αρχή της πλειοψηφίας· η διαφορά τους έγκειται στο ότι η πολιτεία μεριμνά για το συμφέρον του συνόλου των πολιτών, ενώ η δημοκρατία για το πλῆθος, την πλειονότητά τους.'

  ermineytikes:[
    { q:'Ποια είναι τα χαρακτηριστικά γνωρίσματα της δημοκρατίας κατά τον Αριστοτέλη;',
      answer:'Το πρώτο και ανώτερο είδος δημοκρατίας που περιγράφει ο Αριστοτέλης θεμελιώνεται σε τρεις αρχές. (α) Η ισότητα («κατὰ τὸ ἴσον»): όλοι οι πολίτες, φτωχοί και πλούσιοι, έχουν ίσα δικαιώματα και προνόμια, καμία ομάδα δεν κυριαρχεί στην άλλη, όλοι μετέχουν «ὁμοίως» στη διακυβέρνηση και στα αξιώματα. Πρόκειται για ισότητα κατά τον αριθμό και όχι κατ’ αξίαν. (β) Η ελευθερία, πολιτική (όλοι «ἐν μέρει» άρχουν και άρχονται, εναλλάσσονται στα αξιώματα) και ατομική (ο καθένας ζει «ὡς βούλεται»). (γ) Η πλειοψηφία: «κύριον» είναι «τὸ δόξαν τοῖς πλείοσιν», οι αποφάσεις των πολλών, αφού ο δῆμος είναι η πλειονότητα. Έτσι κατοχυρώνεται η λαϊκή κυριαρχία.' },
    { q:'Η μορφή δημοκρατίας στην οποία αναφέρεται ο Αριστοτέλης προϋποθέτει την ελευθερία και την ισότητα. Ποιο είναι το ακριβές περιεχόμενό τους στο συγκεκριμένο κείμενο;',

    { q:'Ποια ουσιώδης διαφορά υφίσταται κατά τον Αριστοτέλη μεταξύ της δημοκρατίας που περιγράφει στο Κείμενο Αναφοράς και στο παρακάτω Παράλληλο Κείμενο;',
      passage:'Μια άλλη μορφή δημοκρατίας είναι αυτή στην οποία ισχύουν όλα τα προηγούμενα, η υπέρτατη όμως αρχή είναι τώρα ο λαός, όχι ο νόμος· είναι η περίπτωση κατά την οποία τα ψηφίσματα έχουν μεγαλύτερη ισχύ από τον νόμο· αυτό συμβαίνει όταν στην πόλη υπάρχουν και δρουν δημαγωγοί. Στις δημοκρατικές πόλεις που κυβερνιούνται κατά τον νόμο, δεν κάνει ποτέ την εμφάνισή του δημαγωγός, αλλ’ είναι οι άριστοι πολίτες που έχουν την πρωτοκαθεδρία. Οι δημαγωγοί κάνουν την εμφάνισή τους εκεί όπου οι νόμοι δεν αποτελούν την υπέρτατη αρχή.\n— Αριστοτέλης, Πολιτικά, Δ 26',
      answer:'Η ουσιώδης διαφορά έγκειται στη σχέση του πολιτεύματος με τον νόμο. Στο Κείμενο Αναφοράς η ισότητα και η ελευθερία είναι «διασφαλισμένες από τον νόμο»: υπέρτατη αρχή παραμένει ο νόμος και η δημοκρατία λειτουργεί εντός του πλαισίου του — γι’ αυτό είναι η ανώτερη και πιο σημαντική μορφή. Στο Παράλληλο Κείμενο, αντίθετα, υπέρτατη αρχή γίνεται ο ίδιος ο λαός και όχι ο νόμος: τα ψηφίσματα (οι στιγμιαίες αποφάσεις του πλήθους) υπερισχύουν των νόμων. Αυτή η εκφυλισμένη μορφή γεννά τους δημαγωγούς, οι οποίοι εμφανίζονται όπου οι νόμοι δεν είναι κυρίαρχοι· όπου κυβερνά ο νόμος, την πρωτοκαθεδρία έχουν οι άριστοι πολίτες. Έτσι το πρώτο είδος (νομιμοφροσύνη) αντιδιαστέλλεται προς τη χειρότερη, «λαοκρατική» εκδοχή όπου κυριαρχεί η ασυγκράτητη βούληση του πλήθους.' },

  ermineutiki:[
    { lemma:'Σκέψαι τίς εἶ', note:'Η εναρκτήρια φράση είναι προτρεπτική προστακτική σε β΄ ενικό πρόσωπο· αποκαλύπτει τον επικοινωνιακό, εξομολογητικό χαρακτήρα του λόγου. Ο Επίκτητος δεν στοχάζεται αφηρημένα, αλλά απευθύνεται πρώτα στον ίδιο τον εαυτό του (εσωτερικός μονόλογος, ημερολογιακός-βιωματικός τόνος) και ταυτόχρονα στον κάθε αναγνώστη, προτρέποντάς τον να αναλογιστεί ποιος είναι. Η ρητορική/πλάγια ερώτηση επιτυγχάνει αφύπνιση και προβληματισμό. Η φιλοσοφία εδώ δεν είναι πια η αφηρημένη ενασχόληση των κλασικών χρόνων, αλλά πρακτικός βοηθός του ανθρώπου που ψάχνει πνευματική καθοδήγηση.' },
    { lemma:'Τὸ πρῶτον ἄνθρωπος … οὐδὲν ἔχων κυριώτερον προαιρέσεως', note:'Στο ερώτημα «ποιος είσαι;» ο Επίκτητος απαντά: «είσαι άνθρωπος», και ως πρωταρχικό γνώρισμα της ανθρώπινης ύπαρξης ορίζει την προαίρεση — την ελεύθερη, έλλογη επιλογή. Δεν είναι αυτονόητη απάντηση: οι περισσότεροι ζουν μηχανικά, χωρίς να συνειδητοποιούν την ειδοποιό διαφορά τους. Η προαίρεση καλύπτει τόσο την ηθική βούληση όσο και τη λογική· χάρη σ’ αυτήν ο άνθρωπος διακρίνει το καλό από το κακό, κρίνει αυτόβουλα και καταξιώνεται ως ηθικό ον. Γι’ αυτό είναι σύμφυτη με την ελευθερία και το «κυριώτερο» στοιχείο της φύσης του. (Η θέση προσιδιάζει στον Αριστοτέλη, που θεωρεί την προαίρεσιν κύριο στοιχείο της αρετής.)' },
    { lemma:'ταύτῃ τὰ ἄλλα ὑποτεταγμένα, αὐτὴν δ’ ἀδούλευτον καὶ ἀνυπότακτον', note:'Η προαίρεσις είναι το μόνο στοιχείο του ανθρώπου που δεν υποτάσσεται σε καμία άλλη δύναμη· όλα τα υπόλοιπα χαρακτηριστικά αξιολογούνται ως κατώτερά της και εξαρτώνται από αυτήν. Τα επίθετα ὑποτεταγμένα / ἀδούλευτον / ἀνυπότακτον και η αντίθεση «τὰ ἄλλα # αὐτήν» τονίζουν τον ηγετικό, καθοδηγητικό της ρόλο. Χάρη στην προαίρεση δεν ετεροκαθοριζόμαστε, αλλά γινόμαστε ενεργητικοί ηθικοί παράγοντες: οι επιλογές μας είναι πάντα δικές μας.' },
    { lemma:'Σκόπει οὖν, τίνων κεχώρισαι κατὰ λόγον … θηρίων … προβάτων', note:'Ο συμπερασματικός σύνδεσμος «οὖν» συνδέει λόγο και προαίρεση: ο λόγος είναι στοιχείο της προαιρέσεως. Ο λόγος (=ομιλία και ικανότητα λογικής σκέψης) είναι η ειδοποιός διαφορά του ανθρώπου από τα άλλα έμβια όντα. Η τριπλή επανάληψη «κεχώρισαι» δίνει έμφαση σε αυτή τη διάκριση. Για τους Στωικούς ο λόγος λειτουργεί σε δύο επίπεδα (ανθρώπινος λόγος – κοσμικός Λόγος): ζώντας «κατὰ λόγον», ο άνθρωπος εναρμονίζεται με τη φύση και συνειδητοποιεί ότι είναι μέρος του κοσμικού γίγνεσθαι.' },
    { lemma:'Ἐπὶ τούτοις πολίτης εἶ τοῦ κόσμου … οὐχ … ὑπηρετικῶν, ἀλλὰ … προηγουμένων', note:'Ο άνθρωπος είναι «πολίτης του κόσμου»: όχι με κυριολεκτική πολιτειακή σημασία (δεν υπήρχε παγκόσμιο κράτος), αλλά με στωική — ο κόσμος είναι ένα ενιαίο σύνολο που διέπεται από τον φυσικό νόμο και τη λογικότητα, κοινή «πόλη» θεών και ανθρώπων. Η κοσμοπολίτικη συνείδηση έρχεται να καλύψει το κενό της παρακμασμένης πόλης-κράτους και έχει θεραπευτική λειτουργία απέναντι στην αγωνία της εποχής. Ο άνθρωπος δεν είναι απλό, «υπηρετικό» μέρος αλλά «ηγεμονικό» (προηγούμενον): επειδή διαθέτει λογική, κατέχει ιεραρχικά ανώτερη, πλεονεκτική θέση.' },
    { lemma:'παρακολουθητικὸς γὰρ εἶ τῇ θείᾳ διοικήσει καὶ τοῦ ἑξῆς ἐπιλογιστικός', note:'Ο αιτιολογικός «γάρ» δικαιολογεί γιατί ο άνθρωπος είναι ηγετικό μέρος: έχει από τη φύση του την ικανότητα να κατανοεί τη θεϊκή διακυβέρνηση (διοίκησιν) του κόσμου και να αξιολογεί («ἐπιλογιστικός») τις συνέπειές της. Ο λόγος εδώ ταυτίζεται με τον θεό, και προβάλλεται η αισιόδοξη στωική θέση ότι ο κόσμος κυβερνάται από τη θεϊκή πρόνοια (εἱμαρμένην). Αν ο άνθρωπος δεν μπορεί να αλλάξει την πορεία των γεγονότων, μπορεί να μεταβάλει τη στάση του απέναντί τους.' },
    { lemma:'Τίς οὖν ἐπαγγελία πολίτου; Μηδὲν ἔχειν ἰδίᾳ συμφέρον …', note:'Το ρητορικό ερώτημα θέτει τον προβληματισμό για το χρέος του κοσμοπολίτη. Το «ἐπαγγελία» αποδίδεται ως «αποστολή» (όχι «υπόσχεση»), ώστε να αναδειχθεί ο ενεργητικός ρόλος του πολίτη. Χρέος του είναι να μην προτάσσει το ατομικό του συμφέρον και να μην αποφασίζει «ὡς ἀπόλυτον», σαν αποστασιοποιημένο, μεμονωμένο άτομο, αλλά να συνειδητοποιεί ότι είναι οργανικό τμήμα μιας παγκόσμιας κοινότητας. Έτσι εναρμονίζει τη θέλησή του με τον κοσμικό λόγο και εξασφαλίζει την ευδαιμονία του.' },
    { lemma:'ὥσπερ … εἰ ἡ χεὶρ ἢ ὁ ποὺς λογισμὸν εἶχον … ἐπανενεγκόντες ἐπὶ τὸ ὅλον', note:'Παρομοίωση με το ανθρώπινο σώμα: όπως το χέρι ή το πόδι, αν είχαν λογική, δεν θα επιθυμούσαν ποτέ τίποτε παρά μόνο ανάγοντάς το στο σύνολο του σώματος, έτσι και ο άνθρωπος οφείλει να ανάγει κάθε επιλογή του στο «ὅλον» (τον κόσμο). Το ρήμα «ὠρέχθησαν» παραπέμπει στην ανάγκη ελέγχου των επιθυμιών: οι άλογες ορέξεις που «επαναστατούν» πρέπει να τιθασεύονται από το λογικό-ηγεμονικό μέρος της ψυχής, γιατί συγκρούονται με την κοσμική τάξη. Η αναλογία στηρίζεται στη στωική θέση για τον «φυσικό λόγο» που ρυθμίζει τα πάντα.' },

  /* ── ΑΣΚΗΣΕΙΣ · Α. Ερμηνευτικές ── */
  ermineytikes:[
    { q:'Ποιός είναι ο ρόλος του ανθρώπου ως κοσμοπολίτη μέσα στο κείμενο αναφοράς του Επίκτητου λαμβάνοντας υπόψιν και το ιστορικό πλαίσιο της εποχής;',
      answer:'Στην ελληνιστική και ρωμαϊκή εποχή η πόλη-κράτος έχει παρακμάσει· ο άνθρωπος γίνεται υπήκοος μεγάλων βασιλείων ή της Ρωμαϊκής Αυτοκρατορίας, οι δεσμοί του με τη γενέθλια πόλη χαλαρώνουν και κυριαρχεί η ανασφάλεια. Μέσα σε αυτό το κλίμα ο Επίκτητος προτείνει στον άνθρωπο να αισθανθεί «πολίτης του κόσμου»: όχι πολίτης μιας συγκεκριμένης πόλης, αλλά μέλος μιας ενιαίας κοσμικής κοινότητας που διέπεται από τον φυσικό/θεϊκό λόγο. Ο ρόλος του δεν είναι υπηρετικός αλλά ηγετικός (τῶν προηγουμένων): επειδή διαθέτει λόγο, μπορεί να κατανοεί τη θεία διοίκηση του κόσμου και να αξιολογεί τις συνέπειές της. Χρέος του (ἐπαγγελία) είναι να μην προτάσσει το ατομικό του συμφέρον και να μην αποφασίζει σαν μεμονωμένο άτομο, αλλά να ανάγει κάθε πράξη στο σύνολο. Έτσι η κοσμοπολίτικη συνείδηση λειτουργεί θεραπευτικά, δίνοντας ασφάλεια και νόημα εκεί όπου η παρακμή της πόλης άφησε κενό.' },
    { q:'Τί βαρύτητα αποδίδει ο Επίκτητος στις επιθυμίες του ανθρώπου; Πώς θεωρεί ότι πρέπει να τις αντιμετωπίζει καθένας μας;',
      answer:'Ο Επίκτητος θεωρεί ότι οι επιθυμίες συχνά «επαναστατούν», διεκδικώντας μια ισορροπία διαφορετική από εκείνη της κοσμικής τάξης· γι’ αυτό συγκρούονται με τον παγκόσμιο λόγο. Το ρήμα «ὠρέχθησαν» υπογραμμίζει ακριβώς αυτόν τον κίνδυνο των άλογων, ενστικτωδών ορέξεων. Καθένας οφείλει να τις τιθασεύει με το λογικό και ηγεμονικό μέρος της ψυχής, ασκώντας εγκράτεια και αυτοκυριαρχία. Το μέτρο είναι η αναγωγή στο «ὅλον»: όπως το χέρι ή το πόδι, αν είχαν λογική, δεν θα επιθυμούσαν τίποτε παρά ανάγοντάς το στο σύνολο του σώματος, έτσι κι ο άνθρωπος πρέπει να εναρμονίζει τις επιθυμίες του με τον κοσμικό λόγο. Μόνο έτσι αποφεύγονται οι συγκρούσεις και εξασφαλίζεται η ευδαιμονία και η αταραξία.' },
    { q:'Να εντοπίσετε την ειδοποιό διαφορά του ανθρώπου από τα ζώα και να παρουσιάσετε την άποψη του φιλοσόφου για τη λειτουργικότητα αυτού του εφοδίου.',
      answer:'Η ειδοποιός διαφορά του ανθρώπου είναι ο λόγος — η ομιλία και η ικανότητα λογικής σκέψης («κατὰ λόγον … κεχώρισαι θηρίων … προβάτων»), στενά συνδεδεμένος με την προαίρεσιν. Ενώ τα ζώα ενεργούν αποκλειστικά σύμφωνα με τη φύση/το ένστικτό τους, ο άνθρωπος, πριν πράξει, σκέπτεται, αποφασίζει, επιλέγει και απορρίπτει συνειδητά. Αυτό το εφόδιο τον καταξιώνει ως ηθικό ον: μπορεί να διακρίνει το καλό από το κακό και να κρίνει αυτόβουλα. Επιπλέον, ο λόγος τον συνδέει με τον κοσμικό Λόγο που διέπει το σύμπαν: του επιτρέπει να κατανοεί τη θεία διοίκηση του κόσμου, να αξιολογεί τις συνέπειές της και να συντονίζει τη δράση του με τους «ρυθμούς» της φύσης. Έτσι ο λόγος θεμελιώνει τόσο την ελευθερία (προαίρεσις) όσο και την ηγεμονική θέση του ανθρώπου ανάμεσα στα όντα.' },
    { q:'Συνδυαστική ερώτηση με τη διδακτική ενότητα 15: Να παρουσιάσετε με συντομία την έννοια της προαίρεσης στον Αριστοτέλη και στον Επίκτητο.',
      answer:'Και για τους δύο η προαίρεσις είναι η έλλογη, ελεύθερη επιλογή και θεμελιώδες στοιχείο του ηθικού χαρακτήρα. Στον Αριστοτέλη (εν. 15) η προαίρεσις είναι κύριο γνώρισμα της αρετής και του ήθους: η βουλευτική όρεξη, η επιλογή μέσων ύστερα από σκέψη, που αφορά τα «ἐφ’ ἡμῖν». Στον Επίκτητο τα βασικά αυτά στοιχεία (ελεύθερη βούληση, συνειδητή-έλλογη επιλογή) έχουν αριστοτελική προέλευση, αλλά η προαίρεσις γίνεται το κέντρο ολόκληρης της ηθικής: είναι το «κυριώτερο» της ανθρώπινης φύσης, αδούλωτη και ανυπότακτη, το Αγαθό και ο δρόμος για την εσωτερική ελευθερία. Προϋποθέτει τη διαίρεση των πραγμάτων σε αυτά που εξαρτώνται από εμάς (τα ἐφ’ ἡμῖν) και σε αυτά που δεν εξαρτώνται (τα ἀδιάφορα). Έτσι, ενώ ο Αριστοτέλης εντάσσει την προαίρεσιν στη θεωρία της αρετής, ο Επίκτητος την κάνει το θεμέλιο μιας πρακτικής ηθικής της αυτοκυριαρχίας.' },
    { q:'Να συγκρίνετε την έννοια του πολίτη, όπως ορίζεται από τον Αριστοτέλη στο παρακάτω απόσπασμα των Πολιτικών, με αυτήν του πολίτη στο κείμενο αναφοράς του Επίκτητου, λαμβάνοντας υπ’ όψιν το κοινωνικοπολιτικό πλαίσιο που έδρασε καθένας από τους φιλοσόφους.',
      passage:'Με το πιο αυστηρό νόημα της λέξης τίποτε άλλο δεν ορίζει τόσο τον πολίτη όσο η συμμετοχή στις δικαστικές λειτουργίες και στα αξιώματα. Από αυτά γίνεται λοιπόν φανερό τι είναι ο πολίτης: αυτός που έχει τη δυνατότητα να μετέχει στην πολιτική και δικαστική εξουσία λέμε ότι είναι πολίτης πια αυτής της πόλης· πόλη είναι τότε, με την ακριβέστερη σημασία της λέξης, ένας αριθμός τέτοιων ατόμων αρκετός, ώστε να εξασφαλίζεται η αυτάρκεια στη ζωή τους.\n— Αριστοτέλους, Πολιτικά Γ 1, 3-4 /6/12',
      answer:'Ο Αριστοτέλης ορίζει τον πολίτη θεσμικά και με στενά όρια: πολίτης είναι όποιος μετέχει στη δικαστική και πολιτική εξουσία (αξιώματα) μιας συγκεκριμένης πόλης, και η πόλη είναι το αυτάρκες σύνολο τέτοιων ατόμων. Η ιδιότητα του πολίτη είναι δηλαδή προνόμιο δεμένο με μια συγκεκριμένη, αυτάρκη πόλη-κράτος των κλασικών χρόνων, όπου ο άνθρωπος βρίσκει πληρότητα. Ο Επίκτητος, αντίθετα, δρα όταν η πόλη-κράτος έχει παρακμάσει μέσα στη Ρωμαϊκή Αυτοκρατορία· γι’ αυτό διευρύνει την έννοια: ο άνθρωπος είναι «πολίτης του κόσμου», μέλος μιας οικουμενικής κοινότητας θεών και ανθρώπων που ενώνει ο κοινός λόγος, όχι η θεσμική συμμετοχή. Η ιδιότητα δεν στηρίζεται σε γλώσσα, καταγωγή ή αξιώματα, αλλά στη λογική φύση και στην ηθική στάση. Έτσι, από τον θεσμικό-τοπικό πολίτη του Αριστοτέλη περνάμε στον ηθικό-οικουμενικό κοσμοπολίτη του Επίκτητου, μια μετάβαση που αντανακλά ακριβώς τη μετάβαση από την πόλη-κράτος στην ελληνορωμαϊκή οικουμένη.' },
    { q:'Αφού μελετήσετε το παρακάτω απόσπασμα, να παρουσιάσετε αξιοποιώντας στοιχεία και από το Κείμενο Αναφοράς πώς αντιλαμβάνονται την έννοια του κόσμου οι Στωικοί φιλόσοφοι.',

    { src:'Α. Λίγα λόγια για τον Πλούταρχο', paras:[
      'Ο Πλούταρχος σπούδασε στην Ακαδημία και ταξίδεψε στην Αλεξάνδρεια και τη Ρώμη. Υπήρξε παραγωγικότατος, μελέτησε φιλοσοφία και επηρεάστηκε από τον Πλάτωνα και τον Αριστοτέλη. Θεωρούσε καθήκον όλων των ανθρώπων να ασχοληθούν με τη φιλοσοφία και την πολιτική, καθώς πίστευε ότι η φιλοσοφία βοηθά να επιτύχει κάποιος την αθανασία της ψυχής, στην οποία πίστευε βαθιά, αρκεί να εφαρμόσει τον έντιμο βίο και να σέβεται τις διαχρονικές ηθικές αξίες τις οποίες εποπτεύουν οι θεοί. Στόχος του Πλούταρχου, που δήλωνε βιογράφος, ήταν να φωτίσει την προσωπικότητα σπουδαίων ανδρών ώστε να παραδειγματιστούν από τα προτερήματά τους ή να διδαχθούν από τα ελαττώματα και τα λάθη εκείνων οι αναγνώστες του.',
      'Στο έργο του, Περὶ Ἀλεξάνδρου τύχης καὶ ἀρετῆς, φανερώνει τον ενθουσιασμό του για τις αρετές και το όραμα του Αλέξανδρου και υπερασπίστηκε με πάθος το έργο και την προσωπικότητά του. Στο συγκεκριμένο έργο, που αποτελείται από δύο λόγους, ο Πλούταρχος μάλλον επιδιώκει να απαντήσει σε επικρίσεις εναντίον του Μακεδόνα Αλέξανδρου, που δεν ήταν λίγες, καθώς πολλοί υποτιμούσαν το έργο του, θεωρώντας ότι ήταν οι συγκυρίες και η τύχη που τον ανέδειξαν σε μέγα στρατηλάτη. Η συγκεκριμένη ενότητα αντιπαραβάλλει το ιδανικό πολίτευμα του Ζήνωνα, με τον τρόπο που υλοποιήθηκε από τον Αλέξανδρο το Μέγα. Το έργο του ιδρυτή της στωικής φιλοσοφίας αποτελεί ένα εμβληματικό κείμενο, ηθικοπολιτικού περιεχομένου που δε σώζεται.'

      'Ο φιλόσοφος Ζήνων πίστευε ότι η πόλη-κράτος έπρεπε να αντικατασταθεί από μια έννοια ευρύτερη: μια οικουμενική πόλη χωρίς βία και διχόνοια. Διέκρινε τους ανθρώπους σε δύο κατηγορίες: στους «σπουδαίους», δηλαδή όσοι είναι σοφοί και ενάρετοι και στους «φαύλους», δηλαδή όσοι στερούνται τα παραπάνω. Οι πρώτοι είναι οι άριστοι πολίτες της κοσμοπολίτικης κοινωνίας και συμμετέχουν στη διακυβέρνησή της. Οι δεύτεροι αντιμετωπίζονται σαν μίασμα της πόλης, σαν πολιτική και κοινωνική ασθένεια.',
      'Παράλληλα, η Πολιτεία του Ζήνωνα αποτελεί μια απορριπτική στάση απέναντι στην Πολιτεία του Πλάτωνα, παρόλο που το πλατωνικό έργο αναμφίβολα λειτούργησε ως αφόρμηση με καταλυτικό τρόπο. Ενώ ο Πλάτων παρουσίασε λεπτομερώς στο έργο του ένα ιδανικό πολίτευμα που διοικούνταν από τους φιλοσόφους με γνώμονα το κοινωνικό συμφέρον, ο Ζήνων περιγράφει μία πολιτεία που περιλαμβάνει αρχικά μόνο τους σοφούς, προτείνοντας κοινοκτημοσύνη των γυναικών και κοινά ρούχα για άνδρες και γυναίκες ανεξαρτήτως φύλου. Έχουμε να κάνουμε με μία επαναστατική αποποίηση των δημοσίων θεσμών που συνοδεύει την οικονομική και κοινωνική αποδόμηση του ελληνικού κόσμου, όπως τον ξέραμε.'

<script>
/* ════════════════════════════════════════════════════════════════════
   study.js — engine for «Διδαγμένο Κείμενο», Αρχαία Γ' Λυκείου
   Consumes window.GNWSTO.units (each data/eNN.js pushes one unit).
   Features: ancient/modern translation toggle; verbatim book comments;

   both directions incl. "locate the cognate in the text"); refreshable

(function(){
  'use strict';
  const G = window.GNWSTO = window.GNWSTO || { units:[] };
  const $  = (s,r)=> (r||document).querySelector(s);

  const el = (tag,cls,html)=>{ const n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n; };
  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  /* lenient Greek comparison: strip diacritics/case, normalise final sigma */
  function norm(s){
    return String(s||'').toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,'')
      .replace(/ς/g,'σ')
      .replace(/[^Ͱ-Ͽἀ-῿a-z0-9]/g,'').trim();
  }
  const matches = (val, accept)=> (accept||[]).some(a => norm(a)===norm(val));

  /* random helpers (browser Math.random is fine here) */
  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  const sample = (a,n)=> shuffle(a).slice(0,n);

  const LAST_KEY  = 'gnwsto.last';

    let ov={};

      const o = ov[u.id]; if(!o) return;
      Object.keys(o).forEach(k=>{ u[k] = o[k]; });   // arrays/strings fully replace
    });
  }

  /* ── sidebar ── */
  function buildSidebar(){
    const nav = $('#nav'); nav.innerHTML='';
    // εξεταστέα-ύλη filter
    const ctrl = el('label','exam-filter');
    ctrl.innerHTML = `<span class="switch"><input type="checkbox" id="examTgl"><span class="track"></span></span> <span>Μόνο εξεταστέα ύλη <b>2026</b></span>`;
    nav.appendChild(ctrl);
    const tgl = $('#examTgl',ctrl); tgl.checked = examOnly;
    tgl.onchange = e=>{ examOnly=e.target.checked; try{localStorage.setItem(EXAM_KEY, examOnly?'1':'0')}catch(_){}; applyFilters(); };

    const arcs = [];
    G.units.forEach(u=>{
      let a = arcs.find(x=>x.name===(u.arc||'Ενότητες'));
      if(!a){ a={name:u.arc||'Ενότητες', units:[]}; arcs.push(a); }
      a.units.push(u);
    });
    arcs.forEach(a=>{
      const box = el('div','arc');
      box.appendChild(el('h2',null,esc(a.name)));
      a.units.forEach(u=>{

        b.dataset.id=u.id;
        b.dataset.exam = u.exam ? '1' : '0';
        if(!u.exam) b.classList.add('nonexam');
        b.dataset.search = norm((u.author||'')+(u.title||'')+(u.work||'')+(u.num||''));
        b.innerHTML = `<span class="n">${u.type==='intro'?'❧':esc(u.num)}</span><span class="tt">${esc(u.title)}<span class="au">${esc(u.author)}${u.work?' · '+esc(u.work):''}</span>${u.exam?'':'<span class="offscope">εκτός ύλης 2026</span>'}</span>`;
        b.onclick = ()=> show(u.id);
        box.appendChild(b);
      });
      nav.appendChild(box);
    });
    applyFilters();
  }
  function applyFilters(){
    $$('.unit-link').forEach(b=>{
      const hideSearch = searchQ && !b.dataset.search.includes(searchQ);
      const hideExam = examOnly && b.dataset.exam==='0';
      b.hidden = hideSearch || hideExam;
    });
    $$('.arc').forEach(a=> a.hidden = !$$('.unit-link:not([hidden])',a).length);
  }

  /* ── render a unit ── */
  function show(id){
    const u = G.units.find(x=>x.id===id) || G.units[0];
    if(!u){ $('#main').innerHTML='<p class="empty">Δεν βρέθηκαν ενότητες.</p>'; return; }
    try{ localStorage.setItem(LAST_KEY, u.id); }catch(e){}
    $$('.unit-link').forEach(b=> b.classList.toggle('active', b.dataset.id===u.id));

    const tabs = (u.type==='intro' ? [
      ['intro','Εισαγωγή',  ()=>renderIntro(u)],
      ['quiz','Κατανόηση',  ()=>renderQuiz(u)],
    ] : [
      ['text','Κείμενο & Μετάφραση', ()=>renderText(u)],
      ['intro','Εισαγωγικά Σχόλια',  ()=>renderIntro(u)],
      ['interp','Ερμηνευτική',       ()=>renderInterp(u)],
      ['ex','Ασκήσεις',              ()=>renderEx(u)],
      ['quiz','Κατανόηση',           ()=>renderQuiz(u)],
    ]).filter(t=>{
      if(t[0]==='intro')  return (u.eisagogika&&u.eisagogika.length)||(u.fakelos&&u.fakelos.length);
      if(t[0]==='interp') return (u.ermineutiki&&u.ermineutiki.length)||(u.domi&&u.domi.length)||(u.yfologika&&u.yfologika.length);
      if(t[0]==='ex')     return (u.ermineytikes&&u.ermineytikes.length)||(u.etymologika&&u.etymologika.length)||(u.etymBank&&u.etymBank.length);
      if(t[0]==='quiz')   return u.quiz&&u.quiz.length;
      return true;
    });

    const idx = G.units.indexOf(u);
    const prev = G.units[idx-1], next = G.units[idx+1];
    const main = $('#main'); main.innerHTML=''; main.dataset.unit=u.id;
    const head = el('header','doc-head');
    head.innerHTML = `
      <div class="cite">${esc(u.author)}${u.work?' — <span class="grk">'+esc(u.work)+'</span>':''}${u.ref?' · '+esc(u.ref):''}</div>
      <h2>${esc(u.title)}</h2>
      <div class="arc-tag">${u.type==='intro'?'Εισαγωγή':'Διδακτική Ενότητα '+esc(u.num)+(u.arc?' · '+esc(u.arc):'')} <span class="scope ${u.exam?'in':'out'}">${u.exam?'Εξεταστέα ύλη 2026':'Εκτός εξεταστέας ύλης 2026'}</span></div>`;
    main.appendChild(head);
    if(u.theme) main.appendChild(el('div','theme',esc(u.theme)));

    const bar = el('div','tabbar'); bar.setAttribute('role','tablist');
    const host = el('div','panel-host');
    tabs.forEach((t,i)=>{
      const btn = el('button','tab',esc(t[1]));
      btn.setAttribute('role','tab'); btn.dataset.accent = t[0];
      btn.onclick = ()=>{
        $$('.tab',bar).forEach(x=>x.setAttribute('aria-selected','false'));
        btn.setAttribute('aria-selected','true');
        host.innerHTML=''; host.dataset.accent=t[0]; host.appendChild(t[2]());
      };
      bar.appendChild(btn);
      if(i===0) setTimeout(()=>btn.click(),0);
    });
    main.appendChild(bar); main.appendChild(host);

    const pager = el('div','pager');
    const pb = el('button',null, prev?`<span class="lbl">Προηγούμενη</span>${esc(prev.num)}. ${esc(prev.title)}`:'');
    const nb = el('button',null, next?`<span class="lbl">Επόμενη</span>${esc(next.num)}. ${esc(next.title)}`:'');
    if(prev) pb.onclick=()=>show(prev.id); else pb.disabled=true;
    if(next) nb.onclick=()=>show(next.id); else nb.disabled=true;
    pager.append(pb,nb); main.appendChild(pager);
    window.scrollTo(0,0);
  }

  /* ── Κείμενο & Μετάφραση ── */
  function renderText(u){
    const wrap = el('div','panel'); wrap.removeAttribute('hidden');
    const seg = u.text||[];
    const tb = el('div','txt-toolbar');
    tb.innerHTML = `
      <label class="toggle"><span class="switch"><input type="checkbox" id="tgMod" checked><span class="track"></span></span> Μετάφραση</label>
      <div class="sep"></div>
      <label class="toggle"><span class="switch"><input type="checkbox" id="tgSelf"><span class="track"></span></span> Λειτουργία αυτοελέγχου</label>
      <div class="sep"></div>
      <span class="hint">Στον αυτοέλεγχο, κάνε κλικ σε μια μετάφραση για να αποκαλυφθεί.</span>`;
    wrap.appendChild(tb);
    const v = el('div','verse');
    seg.forEach(s=>{
      const row = el('div','seg');
      const g = el('div','gr grk'); g.innerHTML = esc(s.gr).replace(/\n/g,'<br>');
      const m = el('div','mod');   m.innerHTML = esc(s.mod).replace(/\n/g,'<br>');
      m.onclick = ()=>{ if(v.classList.contains('hide-mod')) m.classList.add('revealed'); };
      row.append(g,m); v.appendChild(row);
    });
    wrap.appendChild(v);
    if(u.translator) wrap.appendChild(el('div','trans-credit','μετάφραση: '+esc(u.translator)));
    $('#tgMod',tb).onchange = e=>{
      v.classList.toggle('mono', !e.target.checked);
      if(!e.target.checked){ v.classList.remove('hide-mod'); $('#tgSelf',tb).checked=false; $('#tgSelf',tb).disabled=true; }
      else $('#tgSelf',tb).disabled=false;
    };
    $('#tgSelf',tb).onchange = e=>{
      v.classList.toggle('hide-mod', e.target.checked);
      if(!e.target.checked) $$('.mod',v).forEach(m=>m.classList.remove('revealed'));
    };
    return wrap;
  }

  /* ── Εισαγωγικά Σχόλια (verbatim) ── */
  function block(blk){
    const note = el('div','book-note');
    if(blk.src) note.appendChild(el('span','src',esc(blk.src)));
    (blk.paras||[blk.text||'']).forEach(p=> note.appendChild(el('p',null,esc(p))));
    return note;
  }
  function renderIntro(u){
    const wrap = el('div','panel'); wrap.removeAttribute('hidden');
    if(u.type==='intro'){
      if(u.note) wrap.appendChild(el('div','intro-note',esc(u.note)));
    } else {
      wrap.appendChild(el('div','verbatim-flag','◆ Αυτούσια σχόλια από το βιβλίο / Φάκελο Υλικού'));
    }
    (u.eisagogika||[]).forEach(blk=> wrap.appendChild(block(blk)));
    if(u.fakelos&&u.fakelos.length){
      wrap.appendChild(el('h3','sec-h','Από τον Φάκελο Υλικού'));
      (u.fakelos||[]).forEach(blk=> wrap.appendChild(block(blk)));
    }
    return wrap;
  }

  /* ── Ερμηνευτική ── */
  function renderInterp(u){
    const wrap = el('div','panel'); wrap.removeAttribute('hidden');
    if(u.ermineutiki&&u.ermineutiki.length){
      wrap.appendChild(el('h3','sec-h','Ερμηνευτική προσέγγιση'));
      u.ermineutiki.forEach(x=>{
        const l = el('div','lemma');
        if(x.lemma) l.appendChild(el('span','l grk',esc(x.lemma)));
        l.appendChild(el('div','note',esc(x.note)));
        wrap.appendChild(l);
      });
    }
    if(u.domi&&u.domi.length){
      wrap.appendChild(el('h3','sec-h','Δομή του συλλογισμού'));
      const ol = el('ol','syllogism');
      u.domi.forEach(d=>{
        const li = el('li');
        if(typeof d==='string'){ li.innerHTML=esc(d); }
        else { if(d.tag) li.appendChild(el('span','tag',esc(d.tag))); li.appendChild(document.createTextNode(d.text||'')); }
        ol.appendChild(li);
      });
      wrap.appendChild(ol);
    }
    if(u.yfologika&&u.yfologika.length){
      wrap.appendChild(el('h3','sec-h','Αισθητικά — υφολογικά στοιχεία'));
      const box = el('div','chips');
      u.yfologika.forEach(y=>{
        const c = el('div','chip-note');
        c.innerHTML = (y.tag?'<b>'+esc(y.tag)+'</b> — ':'')+esc(y.note);
        box.appendChild(c);
      });
      wrap.appendChild(box);
    }
    return wrap;
  }

  /* refresh toolbar helper */
  function refreshBar(label, onClick){
    const bar = el('div','gen-bar');
    const btn = el('button','gen-btn',`<span class="ico">↻</span> ${esc(label)}`);
    btn.onclick = onClick;
    bar.appendChild(btn);
    return {bar, btn};
  }

  /* ── Ασκήσεις (interpretive + generated etymology) ── */
  function renderEx(u){
    const wrap = el('div','panel'); wrap.removeAttribute('hidden');

    /* Α. Ερμηνευτικές — random subset + refresh */
    if(u.ermineytikes&&u.ermineytikes.length){
      wrap.appendChild(el('h3','sec-h accent-interp','Α. Ερμηνευτικές'));
      const host = el('div');
      const N = Math.min(3, u.ermineytikes.length);
      let showAll=false;
      const {bar,btn} = refreshBar('Άλλες ερωτήσεις', ()=>roll());
      const allBtn = el('button','gen-btn ghost','Όλες οι ερωτήσεις');
      allBtn.onclick=()=>{ showAll=!showAll; allBtn.textContent = showAll?'Λιγότερες':'Όλες οι ερωτήσεις'; roll(); };
      bar.appendChild(allBtn);
      if(u.ermineytikes.length<=N){ bar.querySelector('.gen-btn').style.display='none'; }
      function roll(){
        host.innerHTML='';
        const list = showAll ? u.ermineytikes : sample(u.ermineytikes, N);
        list.forEach((q,i)=> host.appendChild(interpEx(q,i)));
      }
      wrap.append(bar, host); roll();
    }

    /* Β. Λεξιλογικά — Ετυμολογικά: generated (refreshable) + book */
    if((u.etymBank&&u.etymBank.length) || (u.etymologika&&u.etymologika.length)){
      wrap.appendChild(el('h3','sec-h accent-ex','Β. Λεξιλογικά — Ετυμολογικά'));
    }
    if(u.etymBank&&u.etymBank.length>=3){
      const genHost = el('div');
      const {bar} = refreshBar('Νέες ασκήσεις', ()=>rollEtym(u,genHost));
      bar.appendChild(el('span','gen-hint','Κάθε φορά δημιουργούνται νέες ασκήσεις από το ετυμολογικό λεξικό της ενότητας.'));
      wrap.append(bar, genHost); rollEtym(u,genHost);
    }
    if(u.etymologika&&u.etymologika.length){
      wrap.appendChild(el('h4','sub-h','Ασκήσεις από το βιβλίο'));
      u.etymologika.forEach((x,i)=> wrap.appendChild(etymEx(x,i)));
    }
    return wrap;
  }

  /* generate a fresh set of etymology exercises from etymBank */
  function rollEtym(u, host){
    host.innerHTML='';
    const bank = u.etymBank.filter(e=>e.gr && e.mods && e.mods.length);
    if(bank.length>=4)  host.appendChild(genLocate(bank));   // reverse: find cognate in text
    if(bank.length>=1)  host.appendChild(genOmorriza(bank)); // text → modern cognate
    if(bank.length>=4)  host.appendChild(genMatch(bank));    // matching
  }

  /* εντοπισμός: modern word → which text word is its cognate (MC) */
  function genLocate(bank){
    const entry = pick(bank);
    const modWord = pick(entry.mods);
    const distract = sample(bank.filter(e=>e.gr!==entry.gr), 3).map(e=>e.gr);
    const opts = shuffle([entry.gr, ...distract]);
    const x = {
      q:`Ποια λέξη του κειμένου είναι ετυμολογικά συγγενής με τη νεοελληνική λέξη «${modWord}»;`,
      opts, correct:opts.indexOf(entry.gr),
      explain: entry.gloss ? `Κοινή ρίζα: ${entry.gloss}.` : `Κοινή ετυμολογική ρίζα με το «${entry.gr}».`
    };
    const box = exBox('locate','Εντοπισμός στο κείμενο', x.q, 0);
    box.appendChild(mcBlock(x, true));   // greek options
    return box;
  }

  /* ομόρριζα: text word → give a modern cognate (input) */
  function genOmorriza(bank){
    const items = sample(bank, Math.min(4, bank.length));
    const x = { q:'Γράψε μία ομόρριζη / συγγενή λέξη της Νέας Ελληνικής για καθεμία λέξη του κειμένου.',
                items: items.map(e=>({ word:e.gr, accept:e.mods })) };
    const box = exBox('omorriza','Ομόρριζα / Παράγωγα', x.q, 0);
    box.appendChild(inputSet(x.items));
    return box;
  }

  /* αντιστοίχιση from bank */
  function genMatch(bank){
    const chosen = sample(bank, Math.min(5, bank.length));
    const x = { type:'match', q:'Αντιστοίχισε κάθε λέξη του κειμένου με μια ετυμολογικά συγγενή νεοελληνική λέξη.',
                pairs: chosen.map(e=>[e.gr, pick(e.mods)]) };
    const box = exBox('match','Αντιστοίχιση', x.q, 0);
    box.appendChild(matchBlock(x));
    return box;
  }

  /* shared exercise box with type accent */
  function exBox(type, kindLabel, q, qn){
    const box = el('div','ex ex--'+type);
    const chip = el('span','kind'); chip.textContent = kindLabel; box.appendChild(chip);
    if(q) box.appendChild(el('div','q', (qn?`<span class="qn">${qn}.</span>`:'')+esc(q)));
    return box;
  }

  function interpEx(q,i){
    const box = el('div','ex ex--interp');
    box.appendChild(el('span','kind','Ερμηνευτική ερώτηση'));
    box.appendChild(el('div','q',`<span class="qn">${i+1}.</span>${esc(q.q)}`));
    if(q.passage) box.appendChild(el('div','book-note','<p>'+esc(q.passage).replace(/\n/g,'</p><p>')+'</p>'));
    const btn = el('button','reveal-btn','Δες ενδεικτική απάντηση');
    const ans = el('div','model-ans'); ans.hidden=true;
    ans.innerHTML = '<span class="cap">Ενδεικτική απάντηση</span>'+esc(q.answer).replace(/\n/g,'<br>');
    btn.onclick = ()=>{ ans.hidden=!ans.hidden; btn.textContent = ans.hidden?'Δες ενδεικτική απάντηση':'Απόκρυψη'; };
    box.append(btn,ans);
    return box;
  }

  /* input set for omorriza/fill */
  function inputSet(items){
    const holder = el('div');
    const inputs = [];
    items.forEach(it=>{
      const r = el('div','fillrow');
      const promptHtml = it.prompt
        ? esc(it.prompt).replace(/___+/g,'<b>____</b>')
        : (it.word?'<span class="prompt"><span class="grk">'+esc(it.word)+'</span></span>':'');
      r.appendChild(el('span','prompt',promptHtml));
      const inp = el('input'); inp.type='text'; inp.setAttribute('aria-label','απάντηση');
      r.appendChild(inp);
      const acc = el('span','accepted'); acc.hidden=true; r.appendChild(acc);
      inputs.push({inp,acc,accept:it.accept||[]});
      holder.appendChild(r);
    });
    const check = el('button','check-btn','Έλεγχος');
    const score = el('div','scoreline'); score.hidden=true;
    check.onclick = ()=>{
      let ok=0;
      inputs.forEach(o=>{
        const good = o.inp.value.trim() && matches(o.inp.value,o.accept);
        o.inp.classList.toggle('right',good); o.inp.classList.toggle('wrong',!good && !!o.inp.value.trim());
        if(good) ok++;
        if(!good && o.accept.length){ o.acc.hidden=false; o.acc.textContent='π.χ. '+o.accept.slice(0,3).join(', '); }
        else o.acc.hidden=true;
      });
      score.hidden=false; score.textContent=`Σωστά: ${ok}/${inputs.length}`;
    };
    holder.append(check,score);
    return holder;
  }

  function matchBlock(x){
    const holder = el('div');
    const grid = el('div','match');
    const L=el('div','col'), R=el('div','col');
    const pairs = x.pairs.map((p,idx)=>({a:p[0],b:p[1],idx}));
    const rShuf = shuffle(pairs);
    let sel=null, done=0;
    const score = el('div','scoreline'); score.hidden=true;
    pairs.forEach(p=>{
      const it=el('button','item'); it.innerHTML='<span class="grk">'+esc(p.a)+'</span>'; it.dataset.idx=p.idx;
      it.onclick=()=>{ if(sel)sel.classList.remove('sel'); sel=it; it.classList.add('sel'); };
      L.appendChild(it);
    });
    rShuf.forEach(p=>{
      const it=el('button','item',esc(p.b)); it.dataset.idx=p.idx;
      it.onclick=()=>{
        if(!sel) return;
        if(sel.dataset.idx===it.dataset.idx){
          sel.classList.remove('sel'); sel.classList.add('done'); it.classList.add('done'); sel=null; done++;
          if(done===pairs.length){ score.hidden=false; score.textContent='Όλα σωστά! ✓'; }
        } else { it.classList.add('miss'); setTimeout(()=>it.classList.remove('miss'),320); }
      };
      R.appendChild(it);
    });
    grid.append(L,R); holder.append(grid,score);
    return holder;
  }

  /* fixed (book) etymology exercises */
  function etymEx(x,i){
    const type = x.type||'omorriza';
    const label = ({omorriza:'Ομόρριζα / Παράγωγα',fill:'Συμπλήρωση',match:'Αντιστοίχιση',mc:'Πολλαπλή επιλογή',open:'Παραγωγική άσκηση'})[type]||'Άσκηση';
    const box = el('div','ex ex--'+type);
    box.appendChild(el('span','kind',label));
    if(x.q) box.appendChild(el('div','q',`<span class="qn">${i+1}.</span>${esc(x.q)}`));
    if(type==='omorriza'||type==='fill') box.appendChild(inputSet(x.items||[x]));
    else if(type==='open'){
      (x.items||[x]).forEach(it=>{
        const r = el('div','fillrow');
        r.appendChild(el('span','prompt', it.word?'<span class="grk">'+esc(it.word)+'</span>':esc(it.prompt||'')));
        const btn = el('button','reveal-btn','Δες παράδειγμα');
        const ans = el('div','model-ans'); ans.hidden=true;
        ans.innerHTML = '<span class="cap">Ενδεικτικό παράδειγμα</span>'+esc(it.sample||'').replace(/\n/g,'<br>');
        btn.onclick=()=>{ ans.hidden=!ans.hidden; btn.textContent=ans.hidden?'Δες παράδειγμα':'Απόκρυψη'; };
        r.appendChild(btn); box.appendChild(r); box.appendChild(ans);
      });
    }
    else if(type==='match') box.appendChild(matchBlock(x));
    else if(type==='mc') box.appendChild(mcBlock(x));
    return box;
  }

  function mcBlock(x, greek){
    const holder = el('div');
    const opts = el('div','opts');
    const explain = el('div','explain'); explain.hidden=true;
    if(x.explain) explain.innerHTML=esc(x.explain);
    x.opts.forEach((o,idx)=>{
      const label = `<span class="mk">${'ΑΒΓΔΕ'[idx]||idx+1}</span><span${greek?' class="grk"':''}>${esc(o)}</span>`;
      const b = el('button','opt',label);
      b.onclick = ()=>{
        $$('.opt',opts).forEach(z=>{z.disabled=true;});
        if(idx===x.correct){ b.classList.add('correct'); }
        else { b.classList.add('incorrect'); const c=$$('.opt',opts)[x.correct]; if(c)c.classList.add('correct'); }
        explain.hidden=false;
      };
      opts.appendChild(b);
    });
    holder.append(opts,explain);
    return holder;
  }

  /* ── Κατανόηση (quiz) — random subset + refresh ── */
  function renderQuiz(u){
    const wrap = el('div','panel'); wrap.removeAttribute('hidden');
    wrap.appendChild(el('h3','sec-h accent-quiz','Έλεγχος κατανόησης'));
    const host = el('div');
    const N = Math.min(5, u.quiz.length);
    const {bar} = refreshBar('Νέες ερωτήσεις', ()=>roll());
    if(u.quiz.length<=N) bar.querySelector('.gen-btn').style.display='none';
    else bar.appendChild(el('span','gen-hint',`Τράπεζα ${u.quiz.length} ερωτήσεων — κάθε φορά ${N} τυχαίες.`));
    function roll(){
      host.innerHTML='';
      sample(u.quiz, N).forEach((q,i)=>{
        const box=el('div','ex ex--quiz');
        box.appendChild(el('div','q',`<span class="qn">${i+1}.</span>${esc(q.q)}`));
        box.appendChild(mcBlock(q));
        host.appendChild(box);
      });
    }
    wrap.append(bar, host); roll();
    return wrap;
  }

  /* ── boot ── */
  function initSearch(){ const s=$('#search'); if(s) s.oninput=e=>{ searchQ=norm(e.target.value); applyFilters(); }; }
  function boot(){
    if(!G.units.length){ $('#main').innerHTML='<p class="empty">Δεν έχουν φορτωθεί ενότητες.</p>'; return; }
    applyOverrides();
    G.units.sort((a,b)=> (a.num||0)-(b.num||0));
    G.units.forEach(u=> u.exam = (u.type==='intro') ? true : EXAM_2026.has(u.num));
    try{ examOnly = localStorage.getItem(EXAM_KEY)!=='0'; }catch(e){}  // default: exam-only
    buildSidebar(); initSearch();
    let start=null; try{ start=localStorage.getItem(LAST_KEY); }catch(e){}
    let u = (start && G.units.find(x=>x.id===start)) || G.units[0];
    if(examOnly && !u.exam) u = G.units.find(x=>x.exam) || u;
    show(u.id);
  }
  if(document.readyState!=='loading') boot();
  else document.addEventListener('DOMContentLoaded', boot);
})();

</script>
</body>
</html>
