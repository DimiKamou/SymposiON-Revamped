<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Διδαγμένο Κείμενο — Αρχαία Ελληνικά Γ' Λυκείου</title>
<meta name="description" content="Μελέτη & αυτοέλεγχος στο διδαγμένο κείμενο των Αρχαίων Ελληνικών Γ' Λυκείου: κείμενο & μετάφραση, εισαγωγικά σχόλια, ερμηνευτική προσέγγιση, λεξιλογικές-ετυμολογικές ασκήσεις."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=GFS+Didot&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════════════════
   study.css — «Διδαγμένο Κείμενο», Αρχαία Ελληνικά Γ' Λυκείου
   Self-contained study module. Adapts the SymposiON design language
   (--sym-* tokens with fallbacks) so it themes with the site when
   embedded, but stands alone when opened directly.
   ════════════════════════════════════════════════════════════════════ */
:root{
  --ok:#3aa76d; --ok-lt:#7fe0ab; --err:#d1553f; --err-lt:#f2a08d;
  --radius:14px; --radius-sm:9px;
  --serif:'Cinzel',Georgia,serif;                 /* display / headings   */
  --greek:'GFS Didot','Cormorant Garamond',Georgia,serif; /* ancient text  */
  --sans:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  --mono:'SFMono-Regular',ui-monospace,'Cascadia Mono',Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  /* creme / neutral light palette. --gold* kept as names but hold neutral
     stone / ink tones now (mid accent + deep ink). Override with --sym-* if embedded. */
  --bg:var(--sym-bg,#f3efe6);          /* warm cream page          */
  --panel:var(--sym-bg-card,#fbf9f3);  /* near-white cream surface  */
  --panel2:var(--sym-bg-raise,#ece5d7);/* raised / track            */
  --gold:var(--sym-gold,#928873);      /* neutral stone (mid accent)*/
  --gold-lt:var(--sym-gold-lt,#3c372e);/* deep warm ink (headings)  */
  --txt:var(--sym-fg,#332f28);
  --muted:var(--sym-fg-muted,#877e6d);
  --border:color-mix(in srgb,var(--gold) 40%,var(--panel));
  --border-soft:color-mix(in srgb,var(--gold) 22%,var(--panel));
  --fill:#463f34;                      /* deep neutral for filled buttons */
  --fill-ink:#f6f2e8;
  background:
    radial-gradient(130% 90% at 50% -12%, color-mix(in srgb,var(--gold) 9%,var(--bg)), transparent 62%),
    var(--bg);
  color:var(--txt); font-family:var(--sans);
  -webkit-font-smoothing:antialiased; min-height:100vh; line-height:1.58;
}
button{font-family:inherit; cursor:pointer; color:inherit}
a{color:var(--gold-lt); text-decoration:none}
::selection{background:color-mix(in srgb,var(--gold) 34%,transparent); color:var(--gold-lt)}
:focus-visible{outline:2px solid var(--gold-lt); outline-offset:2px; border-radius:6px}
.eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:2.4px; text-transform:uppercase; color:var(--muted)}
.grk{font-family:var(--greek)}

/* ─── layout shell ─── */
.app{display:grid; grid-template-columns:288px 1fr; min-height:100vh}
@media(max-width:880px){ .app{grid-template-columns:1fr} }

/* ─── sidebar ─── */
.side{
  border-right:1px solid var(--border-soft); background:color-mix(in srgb,var(--panel) 60%,var(--bg));
  padding:22px 0 40px; position:sticky; top:0; align-self:start; height:100vh; overflow:auto;
}
@media(max-width:880px){ .side{position:static; height:auto; border-right:none; border-bottom:1px solid var(--border-soft)} }
.brand{padding:0 22px 18px}
.brand h1{font-family:var(--serif); font-weight:600; font-size:20px; letter-spacing:.4px; margin:6px 0 2px; color:var(--gold-lt)}
.brand p{margin:0; font-size:12.5px; color:var(--muted)}
.side .search{margin:4px 18px 14px}
.side .search input{
  width:100%; padding:9px 12px; font-size:13px; color:var(--txt);
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm);
}
.arc{margin:14px 0 4px}
.arc>h2{
  font-family:var(--mono); font-size:10.5px; letter-spacing:1.8px; text-transform:uppercase;
  color:var(--gold); margin:0; padding:6px 22px; opacity:.85;
}
.unit-link{
  display:flex; gap:11px; align-items:baseline; width:100%; text-align:left;
  background:transparent; border:none; border-left:3px solid transparent;
  padding:9px 22px 9px 19px; color:var(--muted); font-size:13.5px; transition:.16s;
}
.unit-link:hover{color:var(--txt); background:color-mix(in srgb,var(--gold) 5%,transparent)}
.unit-link.active{
  color:var(--gold-lt); background:color-mix(in srgb,var(--gold) 9%,transparent);
  border-left-color:var(--gold);
}
.unit-link .n{font-family:var(--mono); font-size:11px; min-width:20px; color:var(--gold); opacity:.8}
.unit-link .tt{line-height:1.35}
.unit-link .au{display:block; font-size:11px; color:var(--muted); opacity:.8; margin-top:1px}
.unit-link[hidden]{display:none}

/* ─── main ─── */
.main{max-width:1000px; width:100%; margin:0 auto; padding:30px 30px 90px}
@media(max-width:560px){ .main{padding:20px 16px 70px} }
.doc-head{margin-bottom:8px}
.doc-head .cite{font-family:var(--mono); font-size:11.5px; letter-spacing:.6px; color:var(--gold); text-transform:uppercase}
.doc-head h2{font-family:var(--serif); font-weight:600; font-size:clamp(24px,4vw,34px); line-height:1.15; margin:8px 0 2px; color:var(--gold-lt)}
.doc-head .arc-tag{font-size:12.5px; color:var(--muted)}
.theme{
  margin:16px 0 4px; padding:15px 18px; border-radius:var(--radius);
  background:color-mix(in srgb,var(--gold) 5%,var(--panel)); border:1px solid var(--border-soft);
  color:var(--txt); font-size:14.5px;
}
.theme::before{content:'Θέμα ενότητας'; display:block; font-family:var(--mono); font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--gold); margin-bottom:5px}

/* ─── tabs ─── */
.tabbar{display:flex; flex-wrap:wrap; gap:6px; margin:24px 0 22px; border-bottom:1px solid var(--border); padding-bottom:0}
.tab{
  appearance:none; border:1px solid transparent; border-bottom:none; background:transparent;
  color:var(--muted); padding:12px 16px 11px; font-size:14px; font-weight:600;
  border-radius:11px 11px 0 0; position:relative; top:1px; transition:color .18s, background .18s;
  display:flex; align-items:center; gap:8px;
}
.tab:hover{color:var(--txt)}
.tab[aria-selected="true"]{
  color:var(--gold-lt); background:var(--panel); border-color:var(--border);
  box-shadow:0 -2px 0 var(--gold) inset;
}
.panel[hidden]{display:none}

/* ─── Κείμενο & Μετάφραση ─── */
.txt-toolbar{
  display:flex; flex-wrap:wrap; gap:10px 16px; align-items:center; margin-bottom:16px;
  padding:12px 15px; background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius);
}
.toggle{display:inline-flex; align-items:center; gap:9px; font-size:13px; color:var(--txt)}
.switch{--w:42px; --h:23px; position:relative; width:var(--w); height:var(--h); flex:none}
.switch input{position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer}
.switch .track{
  position:absolute; inset:0; border-radius:999px; background:var(--panel2);
  border:1px solid var(--border); transition:.2s;
}
.switch .track::after{
  content:''; position:absolute; top:2px; left:2px; width:calc(var(--h) - 6px); height:calc(var(--h) - 6px);
  border-radius:50%; background:var(--muted); transition:.2s;
}
.switch input:checked + .track{background:color-mix(in srgb,var(--gold) 40%,var(--panel2)); border-color:var(--gold)}
.switch input:checked + .track::after{transform:translateX(calc(var(--w) - var(--h))); background:var(--gold-lt)}
.txt-toolbar .sep{width:1px; align-self:stretch; background:var(--border-soft)}
.txt-toolbar .hint{font-size:12px; color:var(--muted)}

.verse{display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border-soft); border-radius:var(--radius); overflow:hidden}
.verse.mono{grid-template-columns:1fr}
.seg{display:contents}
.seg .gr, .seg .mod{
  padding:13px 18px; border-bottom:1px solid var(--border-soft); transition:background .15s;
}
.seg:last-child .gr, .seg:last-child .mod{border-bottom:none}
.seg .gr{
  font-family:var(--greek); font-size:19px; line-height:1.7; color:var(--txt);
  border-right:1px solid var(--border-soft); background:color-mix(in srgb,var(--gold) 3%,transparent);
}
.verse.mono .seg .gr{border-right:none}
.verse.mono .seg .mod{display:none}
.seg .mod{font-size:14.5px; color:color-mix(in srgb,var(--txt) 82%,var(--bg)); line-height:1.62}
.seg:hover .gr{background:color-mix(in srgb,var(--gold) 7%,transparent)}
.verse.hide-mod .seg .mod{
  filter:blur(6px); opacity:.35; cursor:pointer; user-select:none;
  background:repeating-linear-gradient(45deg, color-mix(in srgb,var(--gold) 6%,transparent) 0 8px, transparent 8px 16px);
}
.verse.hide-mod .seg .mod.revealed{filter:none; opacity:1; background:none; cursor:default}
.trans-credit{margin:10px 2px 0; font-size:12px; color:var(--muted); text-align:right}

/* ─── prose panels (Εισαγωγικά / Ερμηνευτική) ─── */
.book-note{
  border:1px solid var(--border-soft); border-left:3px solid var(--gold);
  background:color-mix(in srgb,var(--gold) 4%,var(--panel)); border-radius:0 var(--radius) var(--radius) 0;
  padding:14px 18px; margin:0 0 14px;
}
.book-note .src{display:block; font-family:var(--mono); font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--gold); margin-bottom:8px}
.book-note p{margin:0 0 9px; font-size:14.5px}
.book-note p:last-child{margin-bottom:0}
.verbatim-flag{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px;
  letter-spacing:1px; text-transform:uppercase; color:var(--gold-lt);
  border:1px solid var(--border); border-radius:999px; padding:3px 10px; margin-bottom:14px;
}
.sec-h{font-family:var(--serif); font-size:19px; color:var(--gold-lt); margin:26px 0 12px; font-weight:600}
.sec-h:first-child{margin-top:4px}

.lemma{margin:0 0 14px; padding:14px 16px; background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius)}
.lemma .l{font-family:var(--greek); font-size:16px; color:var(--gold-lt); margin:0 0 6px; display:block}
.lemma .note{font-size:14px; color:var(--txt)}
.chips{display:flex; flex-direction:column; gap:8px; margin:0}
.chip-note{padding:11px 14px; background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius-sm); font-size:13.8px}
.chip-note b{color:var(--gold-lt)}
.syllogism{list-style:none; margin:0; padding:0; counter-reset:s}
.syllogism li{padding:10px 14px; margin-bottom:8px; background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius-sm); font-size:14px}
.syllogism li .tag{font-family:var(--mono); font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:3px}

/* ─── Ασκήσεις ─── */
.ex{margin:0 0 20px; padding:16px 18px; background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius)}
.ex .q{font-size:14.8px; margin:0 0 12px}
.ex .q .qn{font-family:var(--mono); color:var(--gold); margin-right:8px}
.ex .kind{font-family:var(--mono); font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:9px}

/* interpretive reveal */
.reveal-btn{
  background:transparent; border:1px solid var(--border); color:var(--gold-lt);
  padding:8px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:600;
}
.reveal-btn:hover{background:color-mix(in srgb,var(--gold) 10%,transparent)}
.model-ans{margin-top:12px; padding:13px 15px; border-radius:var(--radius-sm); background:color-mix(in srgb,var(--gold) 5%,var(--bg)); border:1px dashed var(--border); font-size:14px}
.model-ans[hidden]{display:none}
.model-ans .cap{font-family:var(--mono); font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:7px}

/* input exercises */
.fillrow{display:flex; flex-wrap:wrap; gap:9px; align-items:center; margin:8px 0}
.fillrow .prompt{font-size:14px}
.fillrow .prompt .grk{color:var(--gold-lt)}
.ex input[type=text]{
  padding:8px 11px; font-size:14px; color:var(--txt); background:var(--bg);
  border:1px solid var(--border); border-radius:var(--radius-sm); min-width:150px; font-family:var(--greek);
}
.ex input.right{border-color:var(--ok); background:color-mix(in srgb,var(--ok) 12%,var(--bg))}
.ex input.wrong{border-color:var(--err); background:color-mix(in srgb,var(--err) 12%,var(--bg))}
.ex .accepted{font-size:12.5px; color:var(--ok-lt); margin-left:4px}
.ex .accepted[hidden]{display:none}

/* match exercise */
.match{display:grid; grid-template-columns:1fr 1fr; gap:20px}
@media(max-width:560px){ .match{grid-template-columns:1fr} }
.match .col{display:flex; flex-direction:column; gap:8px}
.match .item{
  padding:10px 13px; border:1px solid var(--border); border-radius:var(--radius-sm);
  background:var(--bg); font-size:14px; text-align:left; transition:.15s;
}
.match .item .grk{font-size:16px; color:var(--gold-lt)}
.match .item.sel{border-color:var(--gold); background:color-mix(in srgb,var(--gold) 12%,var(--bg))}
.match .item.done{border-color:var(--ok); color:var(--muted); pointer-events:none; opacity:.7}
.match .item.done::after{content:' ✓'; color:var(--ok-lt)}
.match .item.miss{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* mc quiz */
.opts{display:flex; flex-direction:column; gap:8px; margin:2px 0}
.opt{
  display:flex; gap:10px; align-items:flex-start; padding:11px 14px; text-align:left;
  border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); font-size:14px; transition:.14s;
}
.opt:hover{border-color:var(--gold)}
.opt .mk{font-family:var(--mono); color:var(--gold); flex:none}
.opt.correct{border-color:var(--ok); background:color-mix(in srgb,var(--ok) 13%,var(--bg))}
.opt.incorrect{border-color:var(--err); background:color-mix(in srgb,var(--err) 13%,var(--bg))}
.opt[disabled]{cursor:default}
.explain{margin-top:9px; font-size:13.5px; color:var(--muted); padding-left:4px}
.explain[hidden]{display:none}

.check-btn{
  margin-top:12px; background:var(--fill); color:var(--fill-ink); border:none; font-weight:700;
  padding:9px 18px; border-radius:var(--radius-sm); font-size:13.5px; letter-spacing:.3px;
}
.check-btn:hover{background:color-mix(in srgb,var(--fill) 82%,#000)}
.scoreline{margin-top:10px; font-size:13.5px; color:var(--gold-lt); font-weight:600}
.scoreline[hidden]{display:none}

/* footer nav */
.pager{display:flex; justify-content:space-between; gap:12px; margin-top:34px; padding-top:20px; border-top:1px solid var(--border-soft)}
.pager button{
  background:var(--panel); border:1px solid var(--border); color:var(--txt);
  padding:11px 16px; border-radius:var(--radius-sm); font-size:13.5px; max-width:48%;
}
.pager button:hover{border-color:var(--gold); color:var(--gold-lt)}
.pager button[disabled]{opacity:.35; pointer-events:none}
.pager .lbl{display:block; font-size:11px; color:var(--muted)}
.empty{color:var(--muted); font-size:14px; padding:20px 0}

/* ═══ colour differentiation ═══ */
:root{
  /* muted, desaturated accents for the cream theme (no amber/brown) */
  --a-text:#5f7c90;    /* dusty slate  */
  --a-intro:#8a7690;   /* soft plum    */
  --a-interp:#7671a0;  /* muted violet */
  --a-ex:#5f8a72;      /* sage green   */
  --a-quiz:#a5726c;    /* muted clay-rose */
  /* exercise-type accents */
  --k-omorriza:#5f8a72;
  --k-match:#5f7c90;
  --k-locate:#7671a0;
  --k-mc:#5c8d86;      /* teal   */
  --k-open:#a5726c;    /* clay   */
  --k-interp:#8a7690;  /* plum   */
  --k-quiz:#a5726c;
}
/* per-tab active accent (underline + label) */
.tab[data-accent="text"][aria-selected="true"]  {color:var(--a-text);   box-shadow:0 -2px 0 var(--a-text) inset}
.tab[data-accent="intro"][aria-selected="true"] {color:var(--a-intro);  box-shadow:0 -2px 0 var(--a-intro) inset}
.tab[data-accent="interp"][aria-selected="true"]{color:var(--a-interp); box-shadow:0 -2px 0 var(--a-interp) inset}
.tab[data-accent="ex"][aria-selected="true"]    {color:var(--a-ex);     box-shadow:0 -2px 0 var(--a-ex) inset}
.tab[data-accent="quiz"][aria-selected="true"]  {color:var(--a-quiz);   box-shadow:0 -2px 0 var(--a-quiz) inset}
/* small colour dot on each tab */
.tab::before{content:''; width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.55; flex:none}
.tab[data-accent="text"]::before{background:var(--a-text)}
.tab[data-accent="intro"]::before{background:var(--a-intro)}
.tab[data-accent="interp"]::before{background:var(--a-interp)}
.tab[data-accent="ex"]::before{background:var(--a-ex)}
.tab[data-accent="quiz"]::before{background:var(--a-quiz)}

/* coloured section headings */
.sec-h.accent-interp{color:var(--a-interp)}
.sec-h.accent-ex{color:var(--a-ex)}
.sec-h.accent-quiz{color:var(--a-quiz)}
.sub-h{font-family:var(--mono); font-size:11px; color:var(--muted); margin:22px 0 10px; font-weight:600; letter-spacing:1.6px; text-transform:uppercase}

/* exercise cards get a coloured left edge + coloured kind chip */
.ex{border-left:3px solid var(--border)}
.ex--omorriza{border-left-color:var(--k-omorriza)} .ex--omorriza .kind{color:var(--k-omorriza)}
.ex--match   {border-left-color:var(--k-match)}    .ex--match .kind{color:var(--k-match)}
.ex--locate  {border-left-color:var(--k-locate)}   .ex--locate .kind{color:var(--k-locate)}
.ex--mc      {border-left-color:var(--k-mc)}       .ex--mc .kind{color:var(--k-mc)}
.ex--open    {border-left-color:var(--k-open)}     .ex--open .kind{color:var(--k-open)}
.ex--interp  {border-left-color:var(--k-interp)}   .ex--interp .kind{color:var(--k-interp)}
.ex--quiz    {border-left-color:var(--k-quiz)}
.kind{font-family:var(--mono); font-size:10px; letter-spacing:1.4px; text-transform:uppercase; display:block; margin-bottom:9px; font-weight:600}

/* refresh / generate bar */
.gen-bar{display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin:2px 0 16px}
.gen-btn{
  display:inline-flex; align-items:center; gap:8px; background:color-mix(in srgb,var(--gold) 14%,var(--panel));
  border:1px solid var(--border); color:var(--gold-lt); padding:9px 15px; border-radius:var(--radius-sm);
  font-size:13px; font-weight:600; transition:.15s;
}
.gen-btn:hover{background:color-mix(in srgb,var(--gold) 24%,var(--panel)); border-color:var(--gold)}
.gen-btn .ico{font-size:15px; display:inline-block; transition:transform .4s}
.gen-btn:hover .ico{transform:rotate(180deg)}
.gen-btn.ghost{background:transparent; color:var(--muted)}
.gen-btn.ghost:hover{color:var(--txt); background:color-mix(in srgb,var(--gold) 8%,transparent)}
.gen-hint{font-size:12px; color:var(--muted)}

/* ═══ light-theme depth (soft paper shadows) ═══ */
.theme, .book-note, .ex, .lemma, .chip-note, .verse, .txt-toolbar,
.opt, .match .item, .gen-btn, .pager button, .side .search input, .ex input[type=text]{
  box-shadow:0 1px 2px rgba(60,50,35,.05);
}
.ex, .book-note, .lemma, .verse{ box-shadow:0 1px 3px rgba(60,50,35,.06), 0 6px 16px rgba(60,50,35,.03); }
.tabbar{border-bottom-color:var(--border)}
.opt:hover, .match .item:hover{ box-shadow:0 2px 6px rgba(60,50,35,.10); }
/* keep the ancient-text column subtly distinct on cream */
.seg .gr{ background:color-mix(in srgb,var(--gold) 6%,var(--panel)); }

/* ═══ εξεταστέα ύλη 2026 — filter & scope markers ═══ */
.exam-filter{display:flex; align-items:center; gap:9px; margin:2px 18px 16px; padding:9px 12px; font-size:12.5px; color:var(--txt); background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--radius-sm); box-shadow:0 1px 2px rgba(60,50,35,.05)}
.exam-filter b{color:var(--gold-lt)}
.unit-link.nonexam{opacity:.8}
.unit-link.nonexam .n{opacity:.5}
.offscope{display:block; font-family:var(--mono); font-size:9px; letter-spacing:.8px; text-transform:uppercase; color:var(--a-quiz); margin-top:2px}

      'Ο Επίκουρος (341-270 π.Χ.), γιος αθηναίου δασκάλου, γεννήθηκε στη Σάμο και είχε ήδη αρχίσει να διδάσκει στη Μυτιλήνη και στη Λάμψακο, προτού ιδρύσει, το 306, στην Αθήνα τη φιλοσοφική σχολή που ονομάστηκε Κῆπος. Η κοινότητα που ιδρύθηκε από το φιλόσοφο ήταν μία κοινωνία φίλων που ζούσαν μια αυστηρά οργανωμένη ζωή, με κοινές αρχές, αποτραβηγμένοι από τον δημόσιο βίο. Η φιλία, δεν είχε το πολιτικό περιεχόμενο που της έδινε ο Πλάτων και ο Αριστοτέλης, αλλά έχει ιδιαίτερη ηθική σημασία στον επικουρισμό. Αξιοσημείωτο είναι ότι δεν αποκλείονταν οι γυναίκες και οι δούλοι.',
      'Ο Επίκουρος υποστήριζε ότι ο καλύτερος τρόπος για να επιτευχθεί η ασφάλεια και η ευτυχία είναι να αποτραβηχτεί ο καθένας από το δημόσιο βίο, απολαμβάνοντας όλα τα ωραία πράγματα που προσφέρει η καθημερινότητα, με τη συνειδητοποίηση ότι χρειαζόμαστε ουσιαστικά πολύ λίγα πράγματα. Η επικούρεια φιλοσοφία πρεσβεύει πως η ευδαιμονία επιτυγχάνεται μέσα από την επιδίωξη της ηδονής, η οποία συνίσταται: αφενός στην εξουδετέρωση του πόνου μέσα από την ικανοποίηση των βασικών αναγκών του ατόμου όπως είναι η πείνα ή η δίψα και αφετέρου στην απομάκρυνση των φόβων που εμποδίζουν την απόλαυσή τους.',
      'Αν και ήταν πολυγραφότατος, καθώς τα συγγράμματά του υπολογίζονται σε 300, μόνο ένα μικρό τμήμα διασώθηκε. Μεταξύ αυτών, τρείς επιστολές, ένα γραμματειακό είδος που ήταν προσφιλές σε πολλούς στοχαστές προκειμένου να διατυπώσουν τις βασικές αρχές της διδασκαλίας τους. Οι επιστολές του Επίκουρου έχουν σαφή διδακτικό χαρακτήρα και ειδικότερα, το κείμενο αναφοράς, Επιστολή προς Μενοικέα, είναι ένας προτρεπτικός λόγος που εκθέτει, αν και κάπως υπεραπλουστευμένα την επικούρεια ηθική φιλοσοφία.'
    ]},
    { src:'Ηθική και ευδαιμονία στον Επίκουρο', paras:[
      'Ο Επίκουρος ταυτίζει την ευδαιμονία με μια ζωή, γεμάτη ηδονή που αποτελεί και το ύψιστο αγαθό, μια διαρκής ψυχική διάθεση ικανοποίησης και γαλήνης. Υποστηρίζει πως καμία ηδονή δεν μπορεί να είναι τίποτα άλλο εκτός από αγαθό. Αυτό σημαίνει ότι η αρετή είναι απαραίτητο στοιχείο για την ευδαιμονία. Οι άνθρωποι, διατείνεται ο Επίκουρος, όπως όλα τα έμβια όντα αποφεύγουμε τον πόνο και επιδιώκουμε την απόλαυση. Παράλληλα, έχουμε επιθυμίες πολλές και περίπλοκες, που είναι αδύνατο να ικανοποιηθούν, κάτι που μας προκαλεί θλίψη, ταραχή ή και πόνο.',
      'Αν, όμως, διακρίνουμε τις επιθυμίες μας και περιοριστούμε στην ικανοποίηση των αναγκαίων, εκείνων που θα μας εξασφαλίσουν την απουσία πόνου και ταραχής, γινόμαστε ευτυχισμένοι. Κάτι αντίστοιχο συμβαίνει και με τις ηδονές· σημασία έχουν οι πιο μόνιμες από αυτές, είτε αφορούν στο σώμα είτε στην ψυχή (καταστηματικαὶ ἡδοναί), αυτές που προκύπτουν από την σταθερή ικανοποίηση των αναγκαίων επιθυμιών. Μια μετρημένη ζωή, λοιπόν, μπορεί, κατά τον Επίκουρο, να εξασφαλίσει στον άνθρωπο την ευτυχία. Αυτό ακριβώς είναι το σημείο που χρειαζόμαστε τη γνώση (φρόνησις) με την οποία και υπολογίζουμε τον βαθμό της ηδονής ή του πόνου που μπορεί να προκαλέσει κάθε περίπτωση. Η τέλεια ευδαιμονία έρχεται σ’ εκείνον που χαίρεται όλα αυτά τα αγαθά απολαμβάνοντάς τα με ηρεμία χωρίς να τα επιδιώκει με πάθος.'
    ]},
  ],

  fakelos:[
    { src:'φιλοσοφεῖν (Φάκελος Υλικού, σελ. 31)', paras:[
      'Για τον Επίκουρο η φιλοσοφία είναι συνυφασμένη με τη μελέτη των φυσικών φαινομένων (φυσιολογία) και την άσκησή της στον ευρύτερο χώρο μιας κοινότητας φίλων (συμφιλοσοφεῖν). Ο σκοπός της είναι διπλός: θεραπευτικός, καθώς απαλλάσσει τον άνθρωπο από τον φόβο για τη φύση, τους θεούς, τον θάνατο και τον πόνο, και διδακτικός, καθώς μαθαίνει τον άνθρωπο να βρίσκει τα όρια του πόνου και της ηδονής.'
    ]},
    { src:'εὐδαιμονία (Φάκελος Υλικού, σελ. 31)', paras:[
      'Ευτυχία. Για τους περισσότερους φιλοσόφους της αρχαιότητας η εὐδαιμονία είναι ο τελικός σκοπός της ανθρώπινης ζωής, η επιδίωξη όλων των ανθρώπων, το απώτατο αγαθό –αλλά δίνουν διαφορετικό περιεχόμενο στην έννοια. Στην επικούρεια φιλοσοφία η εὐδαιμονία έχει κεντρική θέση, αποτελώντας ένα ιδανικό εφικτό σε όλους τους ανθρώπους, ανεξαρτήτως φυλετικής καταγωγής, φύλου, ηλικίας, κοινωνικής θέσης και οικονομικής κατάστασης. Η ἡδονὴ είναι το κεντρικό περιεχόμενο της ανθρώπινης ευδαιμονίας: τὴν ἡδονὴν ἀρχὴν καὶ τέλος λέγομεν εἶναι τοῦ μακαρίως ζῆν (Επιστολή στον Μενοικέα, 129). Συνίσταται στη, μέσα από νηφάλιο στοχασμό, μετρημένη απόλαυση φυσικών και πνευματικών αγαθών, που οδηγεί στην ἀπονία και στην ἀταραξία, την ψυχική γαλήνη. Ο ευδαίμων άνθρωπος, έχοντας απαλλαγεί από τον πόνο της ζωής αλλά και τον φόβο του θανάτου, παρομοιάζεται με τον θεό.'
    ]},
    { src:'μελετῶ (Φάκελος Υλικού, σελ. 31)', paras:[
      'φροντίζω για κάτι, δίνω προσοχή σε κάτι, το σπουδάζω. Αντίστοιχα μελέτη σημαίνει φροντίδα, επιμέλεια, άσκηση. Στον πλατωνικό διάλογο Φαίδων (81a) ο Σωκράτης αναφέρεται στη φιλοσοφική δραστηριότητα της ψυχής ως μελέτη θανάτου. Ο Επίκουρος συμβουλεύει τον άνθρωπο να θυμάται και να μελετά διαρκώς τις βασικές αρχές της (επικούρειας) φιλοσοφίας και αναλόγως να διαμορφώνει τη ζωή του.'
    ]},
    { src:'ὥρα (λεξιλογικό — ινδοευρ. ρίζα, πβ. αγγλ. year)', paras:[
      'α) ορισμένος χρόνος, χρονική περίοδος που ορίζεται από τους φυσικούς νόμους, περίοδος του έτους, του μήνα, της ημέρας· β) εποχή του έτους· η ακμή του έτους· μέρος της ημέρας. Επειδή η λέξη χρησιμοποιόταν ιδιαίτερα για να δηλώσει την καλύτερη εποχή του χρόνου, κατέληξε επίσης να σημαίνει, όπως η λέξη καιρός, την κατάλληλη ώρα, τη σωστή στιγμή, όπως ακόμα και την καλή στιγμή της ζωής του ανθρώπου, δηλαδή τη νεότητα. Έτσι προέκυψε και η απρόσωπη έκφραση ὥρα ἐστί: είναι ώρα, ο κατάλληλος καιρός για να γίνει κάτι. Και αντίστοιχα το επίθετο ὡραῖος δηλώνει αυτόν που γίνεται την κατάλληλη στιγμή, που βρίσκεται στην ακμή του, τον ώριμο.'
    ]},

  ermineutiki:[
    { lemma:'Μήτε νέος … μήτε γέρων … κοπιάτω φιλοσοφῶν', note:'Κεντρικό το μήνυμα ότι η φιλοσοφία είναι για όλους, ανεξαρτήτως ηλικίας. Δύο κύριες προτάσεις επιθυμίας (μήτε-μήτε) με προτρεπτική προστακτική (μελλέτω, κοπιάτω) που δίνουν δεοντολογικό-διδακτικό τόνο. Οι νέοι δεν πρέπει να αναβάλλουν, οι γέροντες δεν πρέπει να αποφεύγουν τη φιλοσοφία. Για τον Επίκουρο η φιλοσοφία δεν είναι θεωρητική γνώση, αλλά έμπρακτος τρόπος ζωής.' },
    { lemma:'οὔτε … ἄωρος … οὔτε πάρωρος πρὸς τὸ κατὰ ψυχὴν ὑγιαῖνον', note:'Διπλή αιτιολόγηση (γάρ) με έντονη άρνηση (οὔτε…οὔτε) που ακυρώνει κάθε πρόφαση ηλικιακής ασυμβατότητας. Κοινή επιδίωξη όλων των ηλικιών είναι η «ψυχική υγεία» — η ευδαιμονία. Τα ετυμολογικά συγγενή και αντίθετα επίθετα ἄωρος / πάρωρος τονίζουν ότι το ζητούμενο της ψυχικής υγείας δεν γνωρίζει ηλικία. Η φιλοσοφία λειτουργεί ιαματικά.' },
    { lemma:'Ὁ δὲ λέγων … ὅμοιός ἐστιν τῷ λέγοντι πρὸς εὐδαιμονίαν …', note:'Αναλογία που κάμπτει τις ενστάσεις: όποιος λέει ότι δεν είναι ο καιρός για φιλοσοφία μοιάζει με εκείνον που λέει ότι δεν είναι ο καιρός για ευτυχία. Το επιχείρημα αναδιατυπώνεται με όρους συνωνυμίας (ἄωρος = μήπω ὥραν / πάρωρος = παρεληλυθέναι τὴν ὥραν).' },
    { lemma:'Ὥστε φιλοσοφητέον … τῷ μὲν … τῷ δὲ …', note:'Συμπερασματική διατύπωση της κεντρικής θέσης (ρηματικό επίθετο φιλοσοφητέον = δεοντολογικός χαρακτήρας), με νέο, συμμετρικά διατυπωμένο επιχείρημα: η φιλοσοφία κάνει τον γέροντα να παραμένει «νέος» (ευγνωμοσύνη για τα γεγονότα) και τον νέο «ώριμο» (αφοβία για τα μέλλοντα). Προσφέρει σε κάθε ηλικία τα χαρακτηριστικά της άλλης.' },
    { lemma:'Μελετᾶν οὖν χρὴ τὰ ποιοῦντα τὴν εὐδαιμονίαν …', note:'Κατακλείδα (οὖν): προτροπή σε διαρκή «μελέτη» (φροντίδα/άσκηση) όσων φέρνουν την ευδαιμονία — τον απώτατο ανθρώπινο στόχο. Η επικούρεια θεώρηση είναι ανθρωποκεντρική: καμία πνευματική δραστηριότητα δεν έχει νόημα αν δεν αναφέρεται στην ευδαιμονία του ανθρώπου.' },
    { lemma:'Επίκουρος vs Πλάτων/Αριστοτέλης', note:'Στον Πλάτωνα/Αριστοτέλη ακρογωνιαίος λίθος της ευδαιμονίας είναι η αρετή· στον Επίκουρο η αρετή είναι απλώς μέσο για την αταραξία. Εκεί η ευδαιμονία συνδέεται με το σύνολο/την πόλη· εδώ είναι ατομική υπόθεση. Ο Πλάτων θεωρεί τη φιλοσοφία επιστέγασμα μακρόχρονης παιδείας για λίγους· ο Επίκουρος τη φέρνει στα μέτρα του μέσου ανθρώπου, ως στάση ζωής για όλους.' },

  ermineytikes:[
    { q:'Με ποιον τρόπο η φιλοσοφία θα ωφελήσει τα δύο ηλικιακά άκρα που αναφέρονται στο απόσπασμα;',
      answer:'Και τα δύο άκρα ωφελούνται συμμετρικά (τῷ μὲν … τῷ δὲ): (α) Ο ηλικιωμένος, «γηράσκων νεάζῃ»: καθώς γερνά παραμένει ψυχικά νέος, γιατί ανακαλεί με ευγνωμοσύνη («διὰ τὴν χάριν τῶν γεγονότων») τα αγαθά του παρελθόντος και αισθάνεται ότι η ζωή του δεν πέρασε μάταια. (β) Ο νέος, «νέος ἅμα καὶ παλαιὸς ᾖ»: αποκτά την ωριμότητα του γέροντα, γιατί απαλλάσσεται από τον φόβο για το άγνωστο μέλλον («διὰ τὴν ἀφοβίαν τῶν μελλόντων»). Η φιλοσοφία, δηλαδή, δίνει στον καθένα τα χαρακτηριστικά της άλλης ηλικίας.' },
    { q:'Να εντοπίσετε τα επιχειρήματα του φιλοσόφου και να τα παρουσιάσετε στην τυπική τους μορφή.',
      answer:'1ο επιχείρημα (1η περίοδος): 1η προκείμενη — η ψυχική υγεία αφορά όλους, νέους και γέρους (οὔτε ἄωρος … οὔτε πάρωρος). 2η προκείμενη (εννοείται) — η φιλοσοφία εξασφαλίζει την ψυχική υγεία. Συμπέρασμα — άρα όλοι πρέπει να φιλοσοφούν. 2ο επιχείρημα (3η περίοδος): προκείμενες — η φιλοσοφία ωφελεί τον γέροντα (νεότητα μέσω ευγνωμοσύνης) και τον νέο (ωριμότητα μέσω αφοβίας)· συμπέρασμα — «φιλοσοφητέον καὶ νέῳ καὶ γέροντι».' },
    { q:'Ποια χαρακτηριστικά αποδίδει ο Επίκουρος στην ευδαιμονία και πώς σχετίζεται με τη φιλοσοφία;',
      answer:'Η ευδαιμονία ταυτίζεται με το «κατὰ ψυχὴν ὑγιαῖνον», μια διαρκή ψυχική διάθεση ικανοποίησης και γαλήνης (ἀπονία, ἀταραξία). Είναι ο απώτατος στόχος («παρούσης … πάντα ἔχομεν»), εφικτός σε όλους ανεξαρτήτως ηλικίας/φύλου/τάξης, και επιτυγχάνεται με τη μετρημένη απόλαυση των αναγκαίων. Η φιλοσοφία είναι η προϋπόθεσή της: λειτουργεί θεραπευτικά (απαλλάσσει από φόβους και πάθη) και μας δίνει τη «φρόνησιν» με την οποία σταθμίζουμε ηδονή και πόνο. Γι’ αυτό πρέπει να «μελετᾶμε» διαρκώς όσα φέρνουν την ευδαιμονία.' },
    { q:'Να σχολιάσετε την εκφραστική δύναμη και τον λειτουργικό ρόλο των αντιθέσεων και του οξύμωρου σχήματος.',
      answer:'Οι αντιθέσεις (νέος–γέρων, τῷ μὲν–τῷ δὲ, τῶν γεγονότων–τῶν μελλόντων, παρούσης–ἀπούσης) και τα οξύμωρα («γηράσκων νεάζῃ», «νέος ἅμα καὶ παλαιὸς») λειτουργούν διπλά: αφενός δίνουν συμμετρία, ρυθμό και κομψότητα στον λόγο· αφετέρου γεφυρώνουν το ηλικιακό χάσμα, δείχνοντας παραστατικά πώς η φιλοσοφία συγκερνά τις ιδιότητες των δύο ηλικιών. Το οξύμωρο εντυπώνει στον αναγνώστη ότι, χάρη στη φιλοσοφία, νιότη και ωριμότητα μπορούν να συνυπάρξουν στον ίδιο άνθρωπο.' },
    { q:'Τι κοινό υπάρχει ανάμεσα στην ιατρική και στη φιλοσοφία;',
      answer:'Και οι δύο έχουν θεραπευτικό χαρακτήρα. Όπως η ιατρική θεραπεύει το σώμα, έτσι η φιλοσοφία θεραπεύει την ψυχή: απαλλάσσει τον άνθρωπο από τους φόβους (για τη φύση, τους θεούς, τον θάνατο) και τα βίαια πάθη που τον καθιστούν δυστυχισμένο, αποκαθιστώντας το «κατὰ ψυχὴν ὑγιαῖνον». Η φιλοσοφία, δηλαδή, νοείται ως ιατρική της ψυχής, με στόχο την υγεία της — την αταραξία και την ευδαιμονία.' },
    { q:'Ποιες αντιρρήσεις μπορεί να προφασιστεί ένας νέος για να μην ασχοληθεί με τη φιλοσοφία και πώς αυτές αναιρούνται;',
      answer:'Ο νέος μπορεί να προφασιστεί ότι η φιλοσοφία ταιριάζει στην ώριμη ηλικία και ότι έχει «άπλετο χρόνο» μπροστά του, οπότε μπορεί να την αναβάλει (μήπω … ὥραν). Ο Επίκουρος το αναιρεί με το επιχείρημα ότι η ψυχική υγεία δεν γνωρίζει ηλικία («οὔτε ἄωρος οὐδείς ἐστιν») και με την αναλογία προς την ευδαιμονία: όπως δεν αναβάλλουμε την ευτυχία, έτσι δεν αναβάλλουμε τη φιλοσοφία. Αντίθετα, φιλοσοφώντας νωρίς ο νέος κερδίζει την αφοβία για το μέλλον.' },
    { q:'Να συγκρίνετε την άποψη του Επίκουρου για την προσφορά της φιλοσοφίας με το απόσπασμα του Σπινόζα.',
      passage:'Αφού με δίδαξε η πείρα ότι όλα όσα συμβαίνουν συνήθως στην κοινή ζωή είναι μάταια και μηδαμινά και βλέποντας ότι όλα όσα φοβόμουν … δεν είχαν καθαυτά τίποτε καλό ούτε κακό, παρά μόνο στον βαθμό που με αναστάτωναν, αποφάσισα τελικά να αναζητήσω μήπως υπήρχε κάποιο πραγματικό και κοινωνήσιμο αγαθό … κάποιο πράγμα που η ανακάλυψη και η απόκτησή του θα μου πρόσφεραν για πάντα την ικανοποίηση μιας υπέρτατης και αδιάκοπης χαράς.\n— Μπαρούχ Σπινόζα, Πραγματεία για τη διόρθωση του νου',
      answer:'Υπάρχει σαφής σύγκλιση. Και οι δύο (α) απαξιώνουν τα «μάταια» αγαθά της κοινής ζωής και τα πάθη/φόβους που αναστατώνουν την ψυχή· (β) αναζητούν ένα σταθερό, ανώτερο αγαθό που εξασφαλίζει διαρκή, «αδιάκοπη» χαρά — για τον Επίκουρο η αταραξία/ευδαιμονία, για τον Σπινόζα η «υπέρτατη και αδιάκοπη χαρά»· (γ) βλέπουν τη φιλοσοφία ως έμπρακτη επιλογή ζωής και θεραπεία της ψυχής, όχι ως αφηρημένη θεωρία. Διαφορά: ο Σπινόζα φτάνει εκεί μέσα από προσωπική διανοητική «μεταστροφή», ενώ ο Επίκουρος διατυπώνει καθολική προτροπή προς κάθε άνθρωπο και ηλικία.' },
  ],

  etymologika:[
    { type:'omorriza',

    { src:'ὅσα πυρὶ καὶ γῇ κεράννυται — τα τέσσερα στοιχεῖα (φάκελος υλικού σελ. 45)', paras:[

  ermineutiki:[
    { lemma:'Ἦν γάρ ποτε χρόνος', note:'Τυπική αρχή μυθικής αφήγησης, με αόριστο χρονικό προσδιορισμό που θυμίζει το «μια φορά κι έναν καιρό» των παραμυθιών — λαϊκότροπο ύφος. Ο χρόνος προβάλλεται ως κυρίαρχο μέγεθος: πρώτα υπάρχουν οι θεοί (θεογονία) και μόνο αργότερα δημιουργούνται τα θνητά γένη. Χαρακτηριστικά, η αρχαιοελληνική μυθική σκέψη γνωρίζει θεογονία, όχι κοσμογονία.' },

    { lemma:'προσέταξαν Προμηθεῖ καὶ Ἐπιμηθεῖ', note:'Οι Τιτάνες αδελφοί λειτουργούν αντιθετικά και ετυμολογικά: ο Προμηθέας (πρό + μῆτις) σκέφτεται πριν πράξει — προνοητικός, διορατικός, συνετός· ο Επιμηθέας (ἐπί + μῆδος) σκέφτεται μετά — αστόχαστος, απερίσκεπτος, παρορμητικός. Η αντίθεσή τους εξυπηρετεί την οικονομία του μύθου.' },
    { lemma:'Προμηθέα δὲ παραιτεῖται Ἐπιμηθεύς … νέμει', note:'Η αντιστροφή των ρόλων: ο Επιμηθέας πείθει τον Προμηθέα να αναλάβει μόνος τη διανομή. Η απρονοησία του (εξαντλεί όλα τα εφόδια στα ζώα, αφήνοντας τον άνθρωπο ανυπεράσπιστο) κινητοποιεί τον Προμηθέα να κλέψει τη φωτιά και την «ἔντεχνον σοφίαν». Έτσι επιτυγχάνεται η μετάβαση από το επιμηθεϊκό (βιολογικό) στο προμηθεϊκό (πολιτισμικό) στάδιο.' },

  ermineytikes:[
    { q:'Να σκιαγραφήσετε την προσωπικότητα του Επιμηθέα και τον ρόλο του στη δημιουργία. Να λάβετε υπόψη σας και την ετυμολογία του ονόματός του.',
      answer:'Το όνομα Ἐπιμηθεύς (ἐπί + μῆδος) δηλώνει αυτόν που σκέφτεται μετά την πράξη και βρίσκεται αντιμέτωπος με τις συνέπειές της· γι’ αυτό χαρακτηρίζεται αστόχαστος, απερίσκεπτος, επιπόλαιος και παρορμητικός — αντίθετος από τον προνοητικό Προμηθέα (πρό + μῆτις). Στον μύθο πείθει τον αδελφό του να αναλάβει μόνος τη διανομή των εφοδίων. Δείχνει βέβαια επινοητικότητα, μοιράζοντας τις ιδιότητες αντισταθμιστικά και ισόρροπα (δύναμη/ταχύτητα, όπλα/φυγή, τρίχωμα/δέρμα, ολιγογονία/πολυγονία) ώστε «μή τι γένος ἀϊστωθείη». Ωστόσο, από απρονοησία εξαντλεί όλα τα εφόδια στα ζώα και αφήνει τον άνθρωπο γυμνό και ανυπεράσπιστο. Έτσι η απρονοησία του εξυπηρετεί την οικονομία του μύθου: προκαλεί την παρέμβαση του Προμηθέα και τη μετάβαση από το επιμηθεϊκό (βιολογικό) στο προμηθεϊκό (πολιτισμικό) στάδιο. Ο Επιμηθέας, εν κατακλείδι, μπορεί να επινοεί αλλά όχι να προνοεί.' },
    { q:'Ποιό ρόλο διαδραματίζει η μοίρα (εἱμαρμένη) στην ενότητα και πώς εξηγείται αυτός;',
      answer:'Η εἱμαρμένη (< μείρομαι = μοιράζω) είναι η μοίρα, δύναμη αναπότρεπτη και ισχυρότερη ακόμη και από τους θεούς, στην οποία υπακούουν και εκείνοι. Στην ενότητα ρυθμίζει τον χρόνο της δημιουργίας: με τη φράση «χρόνος ἦλθεν εἱμαρμένος γενέσεως» ορίζεται ότι η γέννηση των θνητών γενών δεν μπορούσε να γίνει ούτε νωρίτερα ούτε αργότερα από τη στιγμή που έγινε. Έτσι η δημιουργία δεν παρουσιάζεται ως προϊόν αυθαίρετης θεϊκής βούλησης, αλλά ως αναγκαίο, νομοτελειακό γεγονός. Το «καὶ τούτοις» δείχνει ότι η ειμαρμένη καθορίζει τον χρόνο και των θεών και των θνητών· η φράση αποδίδει «το πλήρωμα του χρόνου», το αναπόφευκτο πέρασμα από το ένα εξελικτικό στάδιο στο άλλο. Η αντίληψη αυτή απηχεί την αρχαιοελληνική πίστη (ήδη ομηρική) σε μια αμάχητη δύναμη που διέπει τον κόσμο.' },
    { q:'Να δείξετε ότι ο μύθος του Πρωταγόρα εξηγεί τελεολογικά τον νόμο της αναπλήρωσης.',
      answer:'«Νόμος της αναπλήρωσης» είναι η αρχή ότι κάθε αδυναμία ενός ζώου αναπληρώνεται από μια ικανότητα. Ο Πρωταγόρας τον εξηγεί τελεολογικά, δηλαδή με βάση τον σκοπό (τέλος) για τον οποίο δόθηκε κάθε ιδιότητα: όλα στη φύση υπηρετούν την επιβίωση, την αυτοσυντήρηση, τη διαιώνιση και την ισορροπία. Αυτό φαίνεται στην αντισταθμιστική κατανομή: όσα δεν έχουν δύναμη παίρνουν ταχύτητα, όσα είναι άοπλα παίρνουν άλλη «δύναμιν εἰς σωτηρίαν», τα μικρόσωμα φυγή ή υπόγεια κατοικία, τα μεγαλόσωμα το ίδιο το μέγεθός τους· ενάντια στον καιρό δίνονται τρίχωμα και δέρμα, και για την τροφική ισορροπία ολιγογονία στα σαρκοφάγα και πολυγονία στη βορά. Η τελεολογία είναι εμφανής και γλωσσικά: δείκτες σκοπού (εἰς σωτηρίαν, ὅπως ὑπάρχοι), ρήματα ισορροπίας (ἐπανισῶν) και επιβίωσης (ἔσῳζεν, σωτηρίαν, μή τι γένος ἀϊστωθείη). Στη φύση, δηλαδή, τίποτε δεν είναι τυχαίο — όλα έχουν σκοπό.' },
    { q:'Να εντοπίσετε το σημείο του κειμένου που αναφέρεται στην αντίληψη του αυτοχθονισμού και να εξηγήσετε τη σχέση της με την ανθρωπολογική θεωρία του πρωταγόρειου μύθου.',

    { src:'ἀκόσμητος (κοσμῶ, κόσμος) — Φάκελος Υλικού, σελ. 53', paras:[
      'ἀκόσμητος (κοσμῶ, κόσμος): Το ρήμα κοσμῶ σημαίνει τακτοποιώ, διευθετώ, αλλά και στολίζω, καλλωπίζω. Οι αρχαίοι Έλληνες, που θαύμαζαν ιδιαίτερα την τάξη, ισορροπία και αρμονία του σύμπαντος, το ονόμασαν κόσμον, δηλαδή στολίδι. O Πλάτων (Τίμαιος 40a) αποκαλεί τον οὐρανόν [: το σύμπαν] κόσμον ἀληθινὸν πεποικιλμένον καθ’ ὅλον [: αληθινό στολίδι που τον διακοσμεί απ’ άκρη σ’ άκρη]. Το επίθετο ἀκόσμητος, αναφερόμενο στον άνθρωπο, δηλώνει ότι αυτός δεν είναι εξοπλισμένος από τη φύση με αυτάρκεις σωματικές ιδιότητες και ικανότητες. Αντανακλάται, έτσι, η εμπειρική γνώση ότι ο άνθρωπος (και προφανέστερα το ανθρώπινο βρέφος) αδυνατεί να επιβιώσει αρκούμενος μόνο στις πενιχρές, συγκριτικά με διάφορα ζώα, σωματικές του ικανότητες.'
    ]},
    { src:'ἄλογα ζῷα, ἄνθρωπος — Φάκελος Υλικού, σελ. 53', paras:[
      'ἄλογα ζῷα, ἄνθρωπος: Συναντάται συχνά στην αρχαιότητα η θέση ότι ο άνθρωπος είναι ένα ζῷον, ένα ζωντανό ον που έχει πολλά κοινά με τα υπόλοιπα (π.χ. τρέφεται, αναπτύσσεται, αναπαράγεται, αισθάνεται), ενώ αυτό που τον διακρίνει από αυτά είναι ο λόγος, η λογική και η γλώσσα. Στον πλατωνικό Μενέξενο (237d-e) η αθηναϊκή γη επαινείται, διότι αυτή ἐξελέξατο τῶν ζῴων καὶ ἐγέννησεν ἄνθρωπον, ὃ συνέσει τε ὑπερέχει τῶν ἄλλων καὶ δίκην καὶ θεοὺς μόνον νομίζει [: διάλεξε από όλα τα ζώα και γέννησε τον άνθρωπο, που χάρη στη σύνεσή του υπερέχει όλων των άλλων και είναι το μόνο που πιστεύει στη δικαιοσύνη και τους θεούς].'
    ]},
    { src:'ἔντεχνος σοφία σὺν πυρί, ἔμπυρος τέχνη — Φάκελος Υλικού, σελ. 53', paras:[
      'ἔντεχνος σοφία σὺν πυρί, ἔμπυρος τέχνη: Με τις δύο αυτές νοηματικά ισοδύναμες εκφράσεις ο Πρωταγόρας αποτυπώνει κάτι άμεσα ρεαλιστικό: οι πρωταρχικές γνώσεις του ανθρώπινου είδους, η σοφία και η τέχνη με την οποία εξασφαλίζεται η επιβίωσή του, προϋποθέτουν τη χρήση της φωτιάς. Γι’ αυτό και ο σοφιστής αναφέρεται στη θεά της σοφίας Αθηνά και τον θεό της φωτιάς Ήφαιστο, παρουσιάζοντάς τους μάλιστα να εργάζονται σε οίκημα κοινό. Με την ἔντεχνον σοφίαν και την ἔμπυρον τέχνην ο άνθρωπος έγινε κατασκευαστής, δημιουργός (homo faber).'
    ]},
    { src:'ἔντεχνος σοφία — Φιλοσοφικός Λόγος, σελ. 69', paras:[
      'Διευκρίνιση του όρου «ἔντεχνος σοφία»: Το ουσιαστικό «σοφία» δηλώνει τη γνώση και το επίθετο «ἔντεχνος» αυτόν που είναι μέσα στα όρια της τέχνης (ἐν+τέχνη), τον επιδέξιο και έμπειρο σε μια τέχνη. Πρέπει να διευκρινισθεί, βέβαια, ότι η λέξη «τέχνη» σημαίνει την άσκηση μιας πρακτικής ενασχόλησης, ενός επαγγέλματος που απαιτεί τεχνικές γνώσεις και δεξιότητες. Έτσι, «ἔντεχνος σοφία» είναι η γνώση που εμπεριέχει την τέχνη, η σοφία που συμπορεύεται με την τέχνη, η δεξιότητα και η εμπειρία, οι τεχνικές γνώσεις, η τεχνογνωσία.',
      'Τί δεν είναι «ἔντεχνος σοφία»; Με τον προσδιορισμό «ἔντεχνος» ο Πρωταγόρας διευκρινίζει πως αυτού του είδους τη σοφία εννοεί και όχι αυτή που συνδέεται με τη γνώση των επιστημών και τη φιλοσοφία, δηλαδή τις θεωρητικές γνώσεις. Πρέπει επίσης να επισημανθεί ότι η «ἔντεχνος σοφία» σχετίζεται βέβαια με τις λεγόμενες καλές τέχνες (αρχιτεκτονική, γλυπτική, μουσική κλπ), όχι όμως με τη θεωρητική σύλληψη της ιδέας του καλλιτεχνικού έργου, αλλά με την κατασκευή του, τη χρήση δηλαδή των τεχνικών γνώσεων και εργαλείων που είναι απαραίτητα για τη δημιουργία του.'
    ]},
    { src:'περὶ τὸν βίον σοφία, πολιτικὴ τέχνη — Φάκελος Υλικού, σελ. 53', paras:[
      'περὶ τὸν βίον σοφία, πολιτική (τέχνη): Στη συγκεκριμένη έκφραση του Πρωταγόρα η λέξη σοφία δεν δηλώνει τις προχωρημένες, ολοκληρωμένες γνώσεις του σοφού ή επιστήμονα, αλλά τις πρακτικές γνώσεις που βοηθούν τον εκάστοτε άνθρωπο να επιβιώσει και να ρυθμίσει τη ζωή του σε ατομικό ή οικογενειακό επίπεδο. Στα ίδια συμφραζόμενα η πολιτικὴ τέχνη είναι το σύνολο των γνώσεων που επιτρέπουν στον άνθρωπο να λειτουργήσει ως μέλος της κοινωνίας.',
      'Στη διάκριση ανάμεσα σε γνώσεις που αξιοποιούνται σε επίπεδο οικίας και σε γνώσεις σε επίπεδο πόλεως είχε προβεί ο Πρωταγόρας, όταν ρωτήθηκε από τον Σωκράτη τι ακριβώς διδάσκει (Πρωταγόρας 318e-319a): «Τὸ δὲ μάθημά ἐστιν εὐβουλία περὶ τῶν οἰκείων, ὅπως ἂν ἄριστα τὴν αὑτοῦ οἰκίαν διοικοῖ, καὶ περὶ τῶν τῆς πόλεως, ὅπως τὰ τῆς πόλεως δυνατώτατος ἂν εἴη καὶ πράττειν καὶ λέγειν.» [: – Αυτό που διδάσκω είναι η σωφροσύνη για τα δικά του, πώς θα κυβερνά άριστα το σπίτι του, και για τις υποθέσεις της πόλεως, πώς θα γίνει ικανότατος να την κατευθύνει και με τις πράξεις και με τους λόγους του.] Ο Σωκράτης συνοψίζει με τον όρο πολιτικὴ τέχνη το περιεχόμενο των γνώσεων που διατείνεται ο Πρωταγόρας ότι κατέχει και διδάσκει· ο σοφιστής αποδέχεται τον όρο και τον χρησιμοποιεί.'
    ]},
    { src:'δίκη — Φιλοσοφικός Λόγος, σελ. 69', paras:[
      'Δίκη: η λέξη «δίκη» μπορεί να χρησιμοποιηθεί με τις εξής σημασίες: το ορθό, το δίκαιο, η συνήθεια που πηγάζει από την ορθή χρήση των πραγμάτων, το έθιμο· η καλή συνήθεια, η τάξη, η αρμονία, το δίκαιο· η κρίση, η γνώμη, η απόφαση· κάθε ενέργεια που αποσκοπεί στη διατήρηση και απονομή του νόμου· η δικαστική διαδικασία, η εκδίκαση μιας υπόθεσης· η δικαστική απόφαση, η τιμωρία, το πρόστιμο.'
    ]},

  /* ── ΕΡΜΗΝΕΥΤΙΚΗ ΠΡΟΣΕΓΓΙΣΗ (κριτική επεξεργασία) ── */
  ermineutiki:[
    { lemma:'οὐ πάνυ τι σοφὸς ὢν ὁ Ἐπιμηθεὺς … καὶ ἠπόρει ὅτι χρήσαιτο', note:'Λόγω της απρονοησίας του Επιμηθέα («οὐ πάνυ τι σοφὸς ὢν») ο άνθρωπος βρίσκεται σε φυσική ένδεια: εμφανίζεται τελευταίος και μένει «ἀκόσμητος», με τα λιγότερα φυσικά εφόδια από όλα τα ζώα. Η κατάστασή του αποδίδεται με την έννοια της «ἀ-πορίας» — φυσική αδυναμία και συνάμα ανάγκη εξεύρεσης «πόρων». Αξιοσημείωτη η τριπλή επανάληψη (ἠπόρει, ἀποροῦντι, ἀπορίᾳ), που τονίζει εμφατικά την ανθρώπινη κατάσταση.' },
    { lemma:'τὸ ἀνθρώπων γένος', note:'Ο όρος αναφέρεται στους ανθρώπους ως ενιαίο σύνολο, χωρίς διακρίσεις (ελεύθεροι/δούλοι, ευγενείς/ταπεινοί, Έλληνες/βάρβαροι). Ο Πρωταγόρας υπερασπίζεται τη θέση ότι οι άνθρωποι είναι φύσει ίσοι αλλά θέσει άνισοι: η φύση τους έπλασε ίσους· η κοινωνική συμβίωση και οργάνωση τους καθιστά άνισους. Ριζοσπαστική για την εποχή άποψη, κοινή σε σοφιστές (Αντιφών, Αλκιδάμας, Ιππίας).' },
    { lemma:'γυμνόν τε καὶ ἀνυπόδητον καὶ ἄστρωτον καὶ ἄοπλον … ἐκ γῆς εἰς φῶς', note:'Ο άνθρωπος βγαίνει στο φως χωρίς μέσα αυτοσυντήρησης και αυτοϋπεράσπισης. Ενώ τα άλογα ζώα έρχονται εφοδιασμένα με έτοιμες, φυσικές ικανότητες (από τον Επιμηθέα), ο άνθρωπος βγαίνει με τα εφόδια που του δωρίζει ο Προμηθέας ως αντιστάθμισμα των βιολογικών του ελλείψεων. Χάρη στον «λόγο» που τον διαφοροποιεί από τα «ἄ-λογα» όντα, περνά από την απλή βιολογική στην έλλογη, νοήμονα και αυτοπροσδιοριζόμενη ύπαρξη.' },
    { lemma:'ἡ εἱμαρμένη ἡμέρα', note:'Η «εἱμαρμένη» (< μείρομαι = μοιράζω) είναι η μοίρα, δύναμη αναπότρεπτη και ισχυρότερη ακόμη κι από τους θεούς. Με τη φράση «εἱμαρμένη ἡμέρα» προσδιορίζεται χρονικά η εξέλιξη της δημιουργίας των θνητών και αποδίδεται «το πλήρωμα του χρόνου», το αναγκαίο πέρασμα από ένα εξελικτικό στάδιο σε άλλο. Η αναγκαιότητα και η χρεία (< χρή) γίνονται κινητήρια δύναμη της εξέλιξης — όχι αυτόματης ούτε τυχαίας ούτε στιγμιαίας.' },
    { lemma:'κλέπτει … τὴν ἔντεχνον σοφίαν σὺν πυρί', note:'Η κλοπή των «δώρων» συμβολίζει το πέρασμα από το βιολογικό (επιμηθεϊκό) στάδιο στη δημιουργία του πολιτισμού (προμηθεϊκό). Είναι αποτέλεσμα θεϊκής φιλανθρωπίας: δεν παρουσιάζεται ως «ὕβρις», αλλά ως ευρηματική πράξη υπαγορευμένη από την αρχή της αναπλήρωσης στη φύση — τα προμηθεϊκά δώρα αναπληρώνουν τις βιολογικές αδυναμίες του ανθρώπου, ώστε να μην αφανιστεί το γένος.' },
    { lemma:'τὴν μὲν … περὶ τὸν βίον σοφίαν … τὴν δὲ πολιτικὴν οὐκ εἶχεν· ἦν γὰρ παρὰ τῷ Διί', note:'Η «περὶ τὸν βίον σοφία» (τεχνογνωσία) είναι ευεργετική αλλά κατώτερη· η «πολιτικὴ τέχνη» — η ικανότητα συγκρότησης οργανωμένων κοινωνιών με νόμους, θεσμούς και εξουσία — είναι ανώτερη, «θεϊκή», και ανήκει στον Δία. Οι άνθρωποι δεν είναι ακόμη σε θέση να τη λάβουν· θα την κατακτήσουν στο επόμενο στάδιο, μετά τη φιλάνθρωπη παρέμβαση του ίδιου του Δία.' },
    { lemma:'οὐκέτι ἐνεχώρει … αἱ Διὸς φυλακαὶ φοβεραὶ ἦσαν', note:'Δύο επισημάνσεις τονίζουν την ανωτερότητα της πολιτικής τέχνης: (α) ο Προμηθέας «δεν είχε τα χρονικά περιθώρια» (οὐκέτι ἐνεχώρει), δηλαδή ο άνθρωπος δεν είχε εξελιχθεί αρκετά για το ανώτερο στάδιο· (β) η πολιτική τέχνη φρουρείται στην ακρόπολη του Δία από «φοβερούς φρουρούς» (τη Βία και το Κράτος). Έτσι προβάλλεται η αξία της πολιτικής τέχνης, που ταυτίζεται με την εὐβουλία που υπόσχεται να διδάξει ο Πρωταγόρας.' },
    { lemma:'εἰς … τὸ κοινὸν οἴκημα … κλέψας … δίδωσιν ἀνθρώπῳ · εὐπορία … κλοπῆς δίκη μετῆλθεν', note:'Το κοινό εργαστήρι Αθηνάς (σοφία/τέχνες) και Ηφαίστου (φωτιά/μεταλλουργία) υποδηλώνει τη στενή σύνδεσή τους και έναν «καταμερισμό εργασίας» στην κοινότητα των θεών (ανθρωπομορφισμός). Τα δώρα μεταβάλλουν την «ἀπορία» σε «εὐπορία»: ο άνθρωπος κατασκευάζει κατοικίες, όπλα, εργαλεία, επινοεί τη γεωργία. Η τιμωρία του Προμηθέα για κλοπή —εξαιτίας του Επιμηθέα— υπενθυμίζει τη θεϊκή ανωτερότητα και τη διπλή διάσταση κάθε επιτεύγματος: επιτυχία και τίμημα.' },
  ],

  /* ── ΑΣΚΗΣΕΙΣ · Α. Ερμηνευτικές ── */
  ermineytikes:[
    { q:'Λαμβάνοντας υπόψη σας τις θεϊκές ιδιότητες της Αθηνάς και του Ηφαίστου, να προσδιορίσετε τι ακριβώς εννοεί ως έντεχνη σοφία ο Πρωταγόρας.',
      answer:'Η Αθηνά, θεά της σοφίας, των τεχνών και της χειροτεχνίας («Ἐργάνη» < ἔργον), αντιπροσωπεύει τη γνώση· ο Ήφαιστος, θεός της φωτιάς και της μεταλλουργίας, αντιπροσωπεύει τις πρακτικές/τεχνικές γνώσεις. Έντεχνη σοφία, λοιπόν, είναι η γνώση που εμπεριέχει την τέχνη — η τεχνογνωσία, η δεξιότητα και η εμπειρία που επιτρέπουν στον άνθρωπο να κατασκευάζει (κατοικίες, όπλα, εργαλεία), να επινοεί τη γεωργία και συμβολικά συστήματα (γλώσσα, γραφή), να αντιμετωπίζει τις υλικές αλλά και τις πνευματικές του ανάγκες. Δεν πρόκειται για θεωρητική/επιστημονική ή φιλοσοφική γνώση, ούτε για τη σύλληψη της ιδέας του καλλιτεχνικού έργου, αλλά για την πρακτική κατασκευή του με τη χρήση της φωτιάς (ἔμπυρος τέχνη). Με αυτήν ο άνθρωπος γίνεται δημιουργός, homo faber.' },
    { q:'Πώς υποκαθιστά ο άνθρωπος την έλλειψη οργάνων προσαρμογής;',
      answer:'Ο άνθρωπος γεννιέται «ἀκόσμητος», χωρίς επαρκή φυσικά όργανα προσαρμογής (γυμνός, ανυπόδητος, άστρωτος, άοπλος). Την έλλειψη αυτή την υποκαθιστά όχι με φυσικά αλλά με πολιτισμικά μέσα: χάρη στα δώρα του Προμηθέα (ἔντεχνος σοφία + φωτιά) και στον «λόγο», τη λογική σκέψη που τον διαφοροποιεί από τα «ἄλογα» ζώα, αναπτύσσει τεχνικές δεξιότητες. Κατασκευάζει κατοικίες, ρούχα, όπλα και εργαλεία, επινοεί τη γεωργία και τις τέχνες, οργανώνει την εργασία και μετατρέπει την «ἀπορία» του σε «εὐπορία». Έτσι απεξαρτάται από την ατελή βιολογική του ύπαρξη και δημιουργεί τον δικό του τεχνικό πολιτισμό ως αντιστάθμισμα της φυσικής του ένδειας.' },
    { q:'Γιατί ο Ήφαιστος και η Αθηνά αναφέρονται μαζί; Τι αντιπροσώπευαν και ποια σχέση είχαν με την Αθήνα;',
      answer:'Αναφέρονται μαζί, να εργάζονται σε κοινό οίκημα (οἴκημα τὸ κοινόν), γιατί οι πρωταρχικές τεχνικές γνώσεις (σοφία) είναι αδιαχώριστες από τη χρήση της φωτιάς (πῦρ): η ἔντεχνος σοφία χωρίς πυρ θα ήταν «ἀμήχανον … κτητὴν ἢ χρησίμην γενέσθαι». Η Αθηνά αντιπροσωπεύει τη σοφία, τις τέχνες και τη χειροτεχνία, ο Ήφαιστος τη φωτιά, τη μεταλλουργία και τις πρακτικές γνώσεις — μαζί συνθέτουν την «ἔντεχνον σοφίαν σὺν πυρί». Ο συνδυασμός τους υποδηλώνει και έναν καταμερισμό εργασίας στην κοινότητα των θεών. Ως προς την Αθήνα: και οι δύο ήταν πολιούχοι/λατρευόμενοι θεοί της πόλης, λατρεύονταν μαζί σε κοινές γιορτές, ενώ η Αθηνά υπήρξε παιδαγωγός του Εριχθονίου, γιου του Ηφαίστου, μυθικού γενάρχη των Αθηναίων.' },

      mod:'Και επειδή ο άνθρωπος κρατεί από θεϊκή μοίρα, πρώτα πρώτα ένεκα της συγγένειάς του προς τον θεό, μόνος από τα ζώα πίστεψε θεούς, και προσπαθούσε να ιδρύει και βωμούς και αγάλματα θεών.' },
    { gr:'ἔπειτα φωνὴν καὶ ὀνόματα ταχὺ διηρθρώσατο τῇ τέχνῃ, καὶ οἰκήσεις καὶ ἐσθῆτας καὶ ὑποδέσεις καὶ στρωμνὰς καὶ τὰς ἐκ γῆς τροφὰς ηὕρετο.',
      mod:'Έπειτα γρήγορα κατόρθωσε να διαρθρώσει με τη γνωστή τέχνη φωνή και λέξεις, και βρήκε κατοικίες και ενδύματα και υποδήματα και στρώματα και στρωσίδια και τις τροφές από τη γη.' },
    { gr:'Οὕτω δὴ παρεσκευασμένοι κατ’ ἀρχὰς ἄνθρωποι ᾤκουν σποράδην, πόλεις δὲ οὐκ ἦσαν· ἀπώλλυντο οὖν ὑπὸ τῶν θηρίων διὰ τὸ πανταχῇ αὐτῶν ἀσθενέστεροι εἶναι,',
      mod:'Έτσι εφοδιασμένοι οι άνθρωποι στην αρχή κατοικούσαν διασκορπισμένοι, δεν υπήρχαν όμως πόλεις. Καταστρέφονταν λοιπόν από τα θηρία, γιατί παντού και πάντα ήταν ασθενέστεροι απ’ αυτά,' },
    { gr:'καὶ ἡ δημιουργικὴ τέχνη αὐτοῖς πρὸς μὲν τροφὴν ἱκανὴ βοηθὸς ἦν, πρὸς δὲ τὸν τῶν θηρίων πόλεμον ἐνδεής — πολιτικὴν γὰρ τέχνην οὔπω εἶχον, ἧς μέρος πολεμική — ἐζήτουν δὴ ἀθροίζεσθαι καὶ σῴζεσθαι κτίζοντες πόλεις·',
      mod:'και οι τεχνικές τους δεξιότητες ήταν καλός βοηθός για τον πορισμό τροφής, υστερούσαν όμως στον πόλεμο με τα θηρία· γιατί δεν είχαν ακόμη την πολιτική τέχνη, που μέρος της είναι η πολεμική· επιδίωκαν λοιπόν να συγκεντρωθούν πολλοί μαζί και να εξασφαλίσουν τη σωτηρία τους χτίζοντας πόλεις·' },
    { gr:'ὅτ’ οὖν ἀθροισθεῖεν, ἠδίκουν ἀλλήλους ἅτε οὐκ ἔχοντες τὴν πολιτικὴν τέχνην, ὥστε πάλιν σκεδαννύμενοι διεφθείροντο.',
      mod:'όταν όμως μαζεύονταν, αδικούσαν ένας τον άλλον, γιατί δεν είχαν την πολιτική τέχνη, ώστε πάλι σκορπίζονταν εδώ και κει και καταστρέφονταν.' },
    { gr:'Ζεὺς οὖν δείσας περὶ τῷ γένει ἡμῶν μὴ ἀπόλοιτο πᾶν, Ἑρμῆν πέμπει ἄγοντα εἰς ἀνθρώπους αἰδῶ τε καὶ δίκην, ἵν’ εἶεν πόλεων κόσμοι τε καὶ δεσμοὶ φιλίας συναγωγοί.',
      mod:'Ο Ζευς τότε, επειδή φοβήθηκε για το γένος μας, μήπως ολότελα εξαφανιστεί, στέλνει τον Ερμή να φέρει στους ανθρώπους την αιδώ και τη δικαιοσύνη, για να υπάρξει αρμονία στις πόλεις και δεσμοί φιλίας δημιουργοί.' },
    { gr:'Ἐρωτᾷ οὖν Ἑρμῆς Δία τίνα οὖν τρόπον δοίη δίκην καὶ αἰδῶ ἀνθρώποις· «Πότερον ὡς αἱ τέχναι νενέμηνται, οὕτω καὶ ταύτας νείμω; νενέμηνται δὲ ὧδε· εἷς ἔχων ἰατρικὴν πολλοῖς ἱκανὸς ἰδιώταις, καὶ οἱ ἄλλοι δημιουργοί· καὶ δίκην δὴ καὶ αἰδῶ οὕτω θῶ ἐν τοῖς ἀνθρώποις, ἢ ἐπὶ πάντας νείμω;» «Ἐπὶ πάντας», ἔφη ὁ Ζεύς, «καὶ πάντες μετεχόντων·',
      mod:'Ρωτά λοιπόν ο Ερμής τον Δία με τι τρόπο να δώσει τη δικαιοσύνη και την αιδώ στους ανθρώπους: «Να τις μοιράσω κι αυτές έτσι όπως έχουν μοιραστεί οι τέχνες; Τούτες έτσι έχουν μοιραστεί· ένας που ξέρει την ιατρική είναι αρκετός για πολλούς που δεν την ξέρουν, έτσι και οι άλλοι τεχνίτες. Και τη δικαιοσύνη λοιπόν και την αιδώ έτσι να τις βάλω μέσα στους ανθρώπους, ή να τις μοιράσω σε όλους;» «Σε όλους», είπε ο Ζευς, «και όλοι να έχουν το μερδικό τους·' },
    { gr:'οὐ γὰρ ἂν γένοιντο πόλεις, εἰ ὀλίγοι αὐτῶν μετέχοιεν ὥσπερ ἄλλων τεχνῶν· καὶ νόμον γε θὲς παρ’ ἐμοῦ τὸν μὴ δυνάμενον αἰδοῦς καὶ δίκης μετέχειν κτείνειν ὡς νόσον πόλεως».',
      mod:'γιατί δε θα μπορούσαν να υπάρχουν πόλεις, αν λίγοι μόνο μετείχαν σ’ αυτά, όπως στις άλλες τέχνες· και να βάλεις νόμο από μέρους μου να σκοτώνουν όποιον δεν είναι ικανός να μετέχει στη δικαιοσύνη και την εντροπή, σαν αρρώστια για την πόλη».' },
    { gr:'Οὕτω δή, ὦ Σώκρατες, καὶ διὰ ταῦτα οἵ τε ἄλλοι καὶ Ἀθηναῖοι, ὅταν μὲν περὶ ἀρετῆς τεκτονικῆς ᾖ λόγος ἢ ἄλλης τινὸς δημιουργικῆς, ὀλίγοις οἴονται μετεῖναι συμβουλῆς, καὶ ἐάν τις ἐκτὸς ὢν τῶν ὀλίγων συμβουλεύῃ, οὐκ ἀνέχονται, ὡς σὺ φῄς — εἰκότως, ὡς ἐγώ φημι —',
      mod:'Έτσι λοιπόν, Σωκράτη, και γι’ αυτούς τους λόγους και οι άλλοι και οι Αθηναίοι, όταν πρόκειται για τεκτονική ή καμιά άλλη τεχνική ικανότητα, νομίζουν ότι λίγοι έχουν το δικαίωμα να δίνουν γνώμη, κι αν κάποιος όντας έξω από τους λίγους επιχειρεί να δίνει γνώμη, δεν τον ανέχονται, όπως συ υποστηρίζεις — με το δίκιο τους, όπως λέγω εγώ —' },
    { gr:'ὅταν δὲ εἰς συμβουλὴν πολιτικῆς ἀρετῆς ἴωσιν, ἣν δεῖ διὰ δικαιοσύνης πᾶσαν ἰέναι καὶ σωφροσύνης, εἰκότως ἅπαντος ἀνδρὸς ἀνέχονται, ὡς παντὶ προσῆκον ταύτης γε μετέχειν τῆς ἀρετῆς ἢ μὴ εἶναι πόλεις. Αὕτη, ὦ Σώκρατες, τούτου αἰτία.',
      mod:'όταν όμως έρχονται να ζητήσουν γνώμη σε θέμα που αναφέρεται σε πολιτική ικανότητα, γνώμη που ολόκληρη πρέπει να περνά από τη δικαιοσύνη και τη σωφροσύνη, τότε σωστά δέχονται να ακούν κάθε άνδρα, με τη σκέψη ότι στον καθένα ταιριάζει να έχει μέρος σ’ αυτή την αρετή, αλλιώς δε θα υπάρχουν πόλεις. Τούτη είναι, Σωκράτη, η αιτία αυτού του πράγματος.' },
  ],

  /* Αποσπάσματα Φακέλου Υλικού — αυτούσια (με τις παραπομπές του βιβλίου) */
  fakelos:[
    { src:'θεία μοῖρα (Φάκελος Υλικού, σελ. 61)', paras:[
      'θεία μοῖρα: Εδώ η λέξη έχει την πρώτη της σημασία: μέρος, μερίδιο. Με την έκφραση θεία μοῖρα ο Πρωταγόρας αναφέρεται στη φωτιά και την έλλογη ικανότητα της χρήσης της (ἔμπυρος τέχνη), που ο άνθρωπος είχε πάρει από τους θεούς Ήφαιστο και Αθηνά. Υπονοείται η αρχαιοελληνική αντίληψη ότι η –ανεξήγητη κατά τα άλλα– ανθρώπινη λογικότητα ανάγεται στον θεό ή είναι ο θεός μέσα μας. Μια τέτοια αναγωγή κάνει ο Πλάτων: «Πρέπει όμως να καταλάβουμε ότι το κυρίαρχο είδος της ψυχής, που δώρισε ο Θεός στον καθένα μας, είναι ένας δαίμων. Είναι αυτό που, όπως είπαμε, κατοικεί στην κορυφή του σώματος και μας ανυψώνει από τη Γη προς τον συγγενικό μας ουρανό, γιατί η αλήθεια είναι ότι είμαστε φυτά όχι της Γης αλλά του ουρανού» (Τίμαιος 90a, μετάφραση Β. Κάλφας). Ο Αριστοτέλης υποστηρίζει: «Μπορούμε, δηλαδή, να πούμε ότι κινεί τα πάντα μέσα μας ένας θεός εσωτερικός. Και του λογικού στοιχείου ακόμα, αρχή δεν είναι το λογικό στοιχείο, αλλά κάτι ανώτερο. Τι άλλο, λοιπόν, θα είναι ανώτερο και από την επιστήμη και από τον νου, παρά ο θεός;» (Ἠθικὰ Εὐδήμια 1248a26-29, μετάφραση Β. Μπετσάκος).'
    ]},
    { src:'φωνὴ καὶ ὀνόματα (Φάκελος Υλικού, σελ. 61)', paras:[
      'φωνὴ καὶ ὀνόματα: Ο Πρωταγόρας αναφέρεται στη γλώσσα, τον έναρθρο λόγο (διηρθρώσατο, διά + ἄρθρον = μέλος). Η φωνὴ είναι καταρχάς ο άναρθρος ήχος που παράγεται από τον λάρυγγα, τις φωνητικές χορδές και τη στοματική κοιλότητα είτε των ζώων είτε των ανθρώπων. Η αρθρωμένη φωνὴ αποτελείται σε πρώτο επίπεδο από διακριτούς ήχους (φθόγγους), που από μόνοι τους δεν έχουν νοηματικό φορτίο· κατά τον Πλάτωνα: ὧν γε τὰ ἐναργέστατα αὐτὰ τὰ ἑπτὰ [τα φωνήεντα] φωνὴν μόνον ἔχει, λόγον δὲ οὐδ’ ὁντινοῦν (Θεαίτητος 203b). Νοηματικό φορτίο έχουν τα σύνολα φθόγγων, τα ὀνόματα, δηλαδή οι λέξεις.'
    ]},
    { src:'αἰδώς (Φάκελος Υλικού, σελ. 62)', paras:[
      'αἰδώς: Το αίσθημα σεβασμού ενός μέλους της κοινότητας έναντι των υπολοίπων, όλες οι ηθικές αναστολές και φόβοι που προφυλάσσουν τον άνθρωπο από αντικοινωνική συμπεριφορά (με άλλα λόγια: ο αυτοσεβασμός, η ντροπή που νιώθει ο άνθρωπος όταν έχει προβεί σε τέτοια συμπεριφορά). Σε ένα λεξικό με τον τίτλο Ὅροι, το οποίο ανάγεται στην πλατωνική Ακαδημία, η αἰδώς ορίζεται ως «εκούσια υποχώρηση από απερίσκεπτη συμπεριφορά, σύμφωνα με το δίκαιο και αυτό που φαίνεται καλύτερο· εκούσια κατανόηση του καλύτερου· προσοχή για αποφυγή της δικαιολογημένης επίκρισης» (412c). Το δίπολο των αρετών αἰδὼς καὶ δίκη ισοδυναμεί με το σωφροσύνη καὶ δικαιοσύνη, το οποίο χρησιμοποιεί ο Πρωταγόρας στο επιμύθιο του λόγου του.'
    ]},
    { src:'δίκη (Φάκελος Υλικού, σελ. 62)', paras:[
      'δίκη: Στο συγκεκριμένο απόσπασμα η λέξη δίκη δεν χρησιμοποιείται με τη σημασία της δικαστικής διαδικασίας. Βρίσκεται κοντά στην αρχική της σημασία· δίκη: το ορθό, το δίκαιο. Κατά προέκταση, η δίκη δηλώνει εδώ την έμφυτη αντίληψη για το σωστό, το κοινό περί δικαίου αίσθημα. Βλ. και τη χρήση της λέξης στην επόμενη (7η) Διδακτική Ενότητα από τα Πολιτικὰ του Αριστοτέλη.'
    ]},
    { src:'δημιουργικὴ τέχνη — δημιουργός — ἰδιώτης (Φάκελος Υλικού, σελ. 61 / Φιλοσοφικός λόγος, σελ. 73)', paras:[
      'δημιουργικὴ τέχνη: Στην προηγούμενη (5η) Διδακτική Ενότητα είχαν χρησιμοποιηθεί με ανάλογη σημασία οι εκφράσεις ἔντεχνος σοφία σὺν πυρὶ και ἔμπυρος τέχνη. Καθώς, όμως, στην πορεία του πρωταγόρειου μύθου αναπτύσσεται ο πολιτισμός της ανθρωπότητας, δεν είναι πλέον αναγκαία η παρουσία της φωτιάς σε κάθε δραστηριότητα, και έτσι γίνεται κυρίαρχο το δημιουργικό στοιχείο της ανθρώπινης λογικότητας.',
      'Ο δημιουργός (< δῆμος + ἔργον) είναι αυτός που παράγει ένα έργο ωφέλιμο στον δήμο, στον λαό· στην κατηγορία των δημιουργών ανήκαν κατά τους ομηρικούς χρόνους οι μάντεις, οι γιατροί, οι κήρυκες, οι οικοδόμοι.',
      'ἰδιώτης: α) ο πολίτης ως άτομο σε αντίθεση προς την πόλη· β) ο κοινός άνθρωπος· γ) ο τρόπος ζωής των ανθρώπων που αφορά την προσωπική και όχι τη δημόσια δραστηριότητά τους· δ) ο αγύμναστος, άπειρος άνθρωπος, ο αδίδακτος, ο αμαθής [από την έννοια αυτή του ἰδιώτης προκύπτουν το αγγλικό idiot και το γαλλικό idiot, που σημαίνουν ανόητος].'
    ]},
  ],

  /* ── ΕΡΜΗΝΕΥΤΙΚΗ ΠΡΟΣΕΓΓΙΣΗ (κριτική επεξεργασία) ── */
  ermineutiki:[
    { lemma:'Ἐπειδὴ δὲ ὁ ἄνθρωπος θείας μετέσχε μοίρας', note:'Το προμηθεϊκό στάδιο. Η «θεία μοῖρα» είναι η ἔντεχνος σοφία και η φωτιά που ο άνθρωπος πήρε (χάρη στον Προμηθέα) από την Αθηνά και τον Ήφαιστο. Είναι «θεϊκή» γιατί ως τότε την κατείχαν μόνο οι θεοί, ο άνθρωπος την απέκτησε με παρέμβαση θεού και, χρησιμοποιώντας την, ενήργησε σαν δημιουργός-θεός: απέκτησε μια μορφή «πνευματικής συγγένειας» με το θείο.' },
    { lemma:'πρῶτον μὲν … θεοὺς ἐνόμισεν … βωμούς τε ἱδρύεσθαι καὶ ἀγάλματα θεῶν', note:'Η θρησκεία ως πρώτη (αξιολογικά ανώτερη) κατάκτηση. Ο Πρωταγόρας ξεκινά από το θρησκευτικό συναίσθημα/πίστη («θεοὺς ἐνόμισεν») και τη θρησκευτική λατρεία/τέχνη (βωμοί, αγάλματα). Η θρησκεία προτάσσεται γιατί δείχνει ότι ο άνθρωπος απέκτησε ανώτερους μεταφυσικούς προβληματισμούς για το θείο, την προέλευση του κόσμου, τη θνητότητά του.' },
    { lemma:'ἔπειτα φωνὴν καὶ ὀνόματα … διηρθρώσατο τῇ τέχνῃ', note:'Η γλώσσα (έναρθρος λόγος). Δημιουργός της γλώσσας είναι ο ίδιος ο άνθρωπος «τῇ τέχνῃ» (νόμῳ, όχι φύσει): μετέτρεψε τους άναρθρους φθόγγους σε έναρθρη φωνή, τους συνδύασε σε λέξεις (ὀνόματα) και προτάσεις. Το «ταχύ» δηλώνει ότι πλάστηκε νωρίς. Γλώσσα και σκέψη συνυφαίνονται (λόγος = ομιλία και λογική σκέψη).' },
    { lemma:'καὶ οἰκήσεις … καὶ τὰς ἐκ γῆς τροφὰς ηὕρετο', note:'Ο υλικός-τεχνικός πολιτισμός (κατοικίες, ρούχα, υποδήματα, στρωσίδια, τροφή από τη γη). Η σειρά θρησκεία → γλώσσα → υλικά επιτεύγματα είναι αξιολογική και όχι χρονική (κατιούσα: από το πνευματικά υψηλότερο στο υλικά κατώτερο). Το «τὰς ἐκ γῆς τροφὰς» σημαίνει τη μετάβαση από το τροφοσυλλεκτικό στο γεωργικό (τροφοπαραγωγικό) στάδιο.' },
    { lemma:'ᾤκουν σποράδην, πόλεις δὲ οὐκ ἦσαν', note:'Προ-κοινωνική κατάσταση: οι άνθρωποι ζουν διασκορπισμένοι, χωρίς οργανωμένες κοινωνίες. Παρά τα τεχνικά επιτεύγματα, κινδυνεύουν με αφανισμό από τα θηρία, γιατί υστερούν σωματικά και δεν έχουν ακόμη κοινωνική/πολιτική οργάνωση ούτε πολεμική τέχνη.' },
    { lemma:'πολιτικὴν γὰρ τέχνην οὔπω εἶχον, ἧς μέρος πολεμική', note:'Η πολεμική είναι μέρος της πολιτικής τέχνης: η οργανωμένη διεξαγωγή πολέμου (στρατός με πειθαρχία, ιεραρχία, στρατηγική) προϋποθέτει οργανωμένη κοινωνία και τη συνείδηση του «συνανήκειν». Εδώ ο πόλεμος νοείται με τη θετική/αμυντική του σημασία (υπεράσπιση της πόλης), όχι ως επεκτατικός.' },
    { lemma:'ἐζήτουν δὴ ἀθροίζεσθαι … κτίζοντες πόλεις', note:'Πρώτη εκδήλωση κοινωνικότητας — αθροιστική, όχι οργανωμένη (η επανάληψη του ἀθροίζω δηλώνει απλή συγκέντρωση). Ο παρατατικός «ἐζήτουν» δείχνει παρατεταμένη, επαναλαμβανόμενη προσπάθεια. Η τάση για συνύπαρξη δεν πηγάζει από εσωτερική αναγκαιότητα (αντίθετα με τον Αριστοτέλη: «φύσει πολιτικὸν ζῷον»), αλλά επιβάλλεται από τον εξωτερικό κίνδυνο των θηρίων.' },
    { lemma:'ἠδίκουν ἀλλήλους … πάλιν σκεδαννύμενοι διεφθείροντο', note:'Ο κοινωνικός κίνδυνος. Χωρίς πολιτική τέχνη, η αθροιστική συνύπαρξη οδηγεί σε αδικία και αλληλοεξόντωση: το ανθρώπινο είδος κινδυνεύει τώρα από τον ίδιο τον εαυτό του. Οι πόλεις έχουν μόνο «υλική» μορφή, τους λείπει ο «άυλος πολιτισμός» (θεσμοί, κανόνες).' },
    { lemma:'Ζεὺς οὖν δείσας … Ἑρμῆν πέμπει … αἰδῶ τε καὶ δίκην', note:'Η παρέμβαση του Δία. Δεδομένου του αγνωστικισμού του Πρωταγόρα, ο μύθος είναι λαϊκότροπη αλληγορία: ο Δίας συμβολίζει τη νομοτέλεια/λογική που διέπει τη φύση, ενώ Προμηθέας, Επιμηθέας και Ερμής είναι τα εκτελεστικά της όργανα. Η δωρεά της αἰδοῦς και της δίκης συμβολίζει τη μετάβαση σε ανώτερο, ηθικό-πολιτικό στάδιο.' },

  /* Αποσπάσματα Φακέλου Υλικού — αυτούσια (με τις παραπομπές του βιβλίου) */
  fakelos:[

      'Ο Πλάτων δεν πιστεύει ότι ο άνθρωπος αποκτά τη γνώση ως πληροφορία που λαμβάνει χώρα έξωθεν, αλλά ότι την ανακαλύπτει και την παράγει μέσα του. Γι’ αυτό και αυτήν την έντονα βιωματική γνωστική διαδικασία την ονομάζει συμβολικά ἀνάμνησιν (Φαίδων 76a). Ιδιαίτερο ενδιαφέρον παρουσιάζει η εκφραστική επιλογή του φιλοσόφου, ο οποίος με την επαναληπτική (τετραπλή) χρήση της πρόθεσης ἐν (ἐνούσης, ἐντιθέναι, ἐντιθέντες) αναδεικνύει με τον εναργέστερο τρόπο τον εσωτερικό και απόλυτα βιωματικό χαρακτήρα της γνώσης. Αν η γνώση έχει ως στόχο τη σύλληψη της αλήθειας, τότε στοχεύει στην κατάργηση της λήθης, της λησμονιάς (ἀ-λήθεια). Θα μπορούσαμε να πούμε ότι γνωρίζω σημαίνει ξαναθυμάμαι.'

    { src:'τὸ ὄν (Φάκελος Υλικού, σελ. 91)', paras:[

  ermineutiki:[
    { lemma:'τὴν παιδείαν οὐχ οἵαν τινὲς ἐπαγγελλόμενοί φασιν εἶναι', note:'Ο Σωκράτης ορίζει την παιδεία εξ αντιθέσεως: δεν είναι αυτό που ισχυρίζονται όσοι την κάνουν επάγγελμα, δηλαδή οι σοφιστές. Το «ἐπαγγελλόμενοι» έχει αρνητική χροιά — δείχνει ότι υποβιβάζουν τη μόρφωση σε εμπορεύσιμο προϊόν που πωλείται μετ’ αμοιβής σε πλούσιους και φιλόδοξους μαθητές. Δριμύς υπαινιγμός εναντίον των σοφιστών.' },
    { lemma:'οὐκ ἐνούσης ἐν τῇ ψυχῇ ἐπιστήμης … ἐντιθέναι, οἷον τυφλοῖς ὀφθαλμοῖς ὄψιν ἐντιθέντες', note:'Η σοφιστική αντίληψη (που ο Πλάτων απορρίπτει): η γνώση δεν προϋπάρχει στην ψυχή και ο δάσκαλος την «εμφυτεύει» έξωθεν, σαν να έβαζε όραση σε τυφλά μάτια. 1η παρομοίωση. Η επαναληπτική (τετραπλή) χρήση της πρόθεσης ἐν (ἐνούσης, ἐντιθέναι, ἐντιθέντες) αναδεικνύει τον εσωτερικό, βιωματικό χαρακτήρα της γνώσης.' },

    { lemma:'οἷον εἰ ὄμμα … σὺν ὅλῳ τῷ σώματι στρέφειν … οὕτω σὺν ὅλῃ τῇ ψυχῇ … περιακτέον', note:'2η παρομοίωση: όπως το μάτι στρέφεται προς το φως μόνο μαζί με ολόκληρο το σώμα, έτσι και το όργανο της μάθησης πρέπει να στραφεί μαζί με ΟΛΗ την ψυχή (ολιστικά) από το γίγνεσθαι προς το ὄν. Το δεοντολογικό «περιακτέον» δηλώνει αναγκαιότητα μεταστροφής — επώδυνη στροφή όλης της ύπαρξης προς τον «ήλιο»/το Αγαθό.' },
    { lemma:'ἕως ἂν εἰς τὸ ὂν … τὸ φανότατον … θεωμένη· τοῦτο δ’ εἶναί φαμεν τἀγαθόν', note:'Στόχος της περιαγωγής: να ανυψωθεί η ψυχή στο αληθινά υπαρκτό (τὸ ὄν) και στην πιο φωτεινή βαθμίδα του (τὸ φανότατον), δηλαδή στην Ιδέα του Αγαθού. Το ρήμα «θεῶμαι» δηλώνει ολιστική, βιωματική θέαση — όχι μόνο διανοητική. Ο Πλάτων ταυτίζει το αληθινά υπαρκτό με το Αγαθό.' },
    { lemma:'τούτου … αὐτοῦ τέχνη ἂν εἴη, τῆς περιαγωγῆς … οὐ τοῦ ἐμποιῆσαι αὐτῷ τὸ ὁρᾶν', note:'Ορισμός της παιδείας (τοίνυν, συμπέρασμα): είναι η τέχνη της περιαγωγῆς — του να μεταστραφεί η ψυχή όσο το δυνατόν ευκολότερα και αποτελεσματικότερα. Δεν εμφυτεύει την ικανότητα της όρασης (ο άνθρωπος την έχει ήδη)· απλώς αναπροσανατολίζει το όργανο που «δεν κοιτάζει προς τα εκεί που θα έπρεπε» — από τον αισθητό στον νοητό κόσμο.' },

  /* ── ΑΣΚΗΣΕΙΣ · Α. Ερμηνευτικές ── */
  ermineytikes:[
    { q:'Να παρουσιάσετε τις αναλογίες της ενότητας και να εξηγήσετε τη λειτουργικότητά τους στο συλλογισμό του Σωκράτη.',
      answer:'Ο Σωκράτης χρησιμοποιεί δύο αναλογίες-παρομοιώσεις (και τις δύο τις εισάγει με το «οἷον»). (α) Την πρώτη τη δανείζεται από τους σοφιστές για να την ανασκευάσει: υποστηρίζουν ότι εμφυτεύουν τη γνώση σε μια ψυχή που δεν την έχει, «σαν να έβαζαν όραση σε τυφλά μάτια». (β) Τη δεύτερη τη διατυπώνει ο ίδιος για να στηρίξει τη δική του θέση: όπως το μάτι δεν μπορεί να στραφεί από το σκοτάδι στο φως παρά μόνο μαζί με ολόκληρο το σώμα, έτσι και το όργανο της μάθησης πρέπει να στραφεί μαζί με ολόκληρη την ψυχή από το γίγνεσθαι προς το ὄν και το Αγαθό. Λειτουργικά, οι αναλογίες μεταφέρουν τον αφηρημένο συλλογισμό στο εποπτικό πεδίο της όρασης/φωτός, κάνοντάς τον σαφή και πειστικό, και συνάμα προβάλλουν την κεντρική διαφορά: η παιδεία δεν είναι εμφύτευση αλλά μεταστροφή (περιαγωγή) μιας ήδη υπάρχουσας δύναμης.' },
    { q:'Πώς θα κατορθώσει ο άνθρωπος να χρησιμοποιήσει τη λογική του ικανότητα με τρόπο ωφέλιμο για τον ίδιο και το σύνολο;',
      answer:'Η φρόνησις (η λογική ικανότητα του λογιστικού μέρους) είναι έμφυτη, θεϊκότερης προέλευσης, και ποτέ δεν χάνει τη δύναμή της· έχει όμως αμφίσημο χαρακτήρα. Θα αποβεί χρήσιμη και ωφέλιμη μόνο αν, μέσω της παιδείας-περιαγωγῆς, στραφεί ολόκληρη η ψυχή προς τον νοητό κόσμο των Ιδεών και τελικά προς την Ιδέα του Αγαθού. Αντίθετα, αν στραφεί προς τον αισθητό, μεταβαλλόμενο κόσμο (τὸ γιγνόμενον), η ίδια ικανότητα γίνεται άχρηστη και βλαβερή. Επομένως το κρίσιμο δεν είναι η ύπαρξη της ικανότητας αλλά ο ορθός προσανατολισμός της: με σωστή καθοδήγηση ο νους υπηρετεί τόσο το ατομικό όσο και το κοινό αγαθό.' },
    { q:'Σύμφωνα με όσα λέει ο Σωκράτης σχετικά με την παιδεία, ποιο είναι το καθήκον του σωστού παιδαγωγού-δασκάλου;',
      answer:'Ο σωστός δάσκαλος δεν φορτώνει το μυαλό του μαθητή με έτοιμες, εξωτερικές γνώσεις (όπως κάνουν οι σοφιστές «επ’ αμοιβή»), αλλά ενεργοποιεί τις γνωστικές δυνάμεις που ήδη ενυπάρχουν λανθανόντως στην ψυχή. Καθήκον του είναι να ανοίξει το «ὄμμα τῆς ψυχῆς», δηλαδή να διδάξει τον μαθητή να σκέφτεται μόνος του, κατευθύνοντάς τον στα κατάλληλα, σωστά αντικείμενα ώστε να συντελεστεί η περιαγωγή της ψυχής από τα αισθητά στα νοητά. Έτσι παράγεται γνώση εμπεδωμένη, βιωμένη και ανθεκτική στη λήθη. Ο δάσκαλος λειτουργεί μαιευτικά, όπως ο Σωκράτης — βοηθός στην ανακάλυψη, όχι μεταδότης πληροφορίας.' },
    { q:'Κεντρική θέση στο παραπάνω απόσπασμα έχει η έννοια της περιαγωγῆς. Να παρουσιάσετε τα χαρακτηριστικά που της αποδίδει ο Πλάτων.',
      answer:'Η περιαγωγή είναι η μεταστροφή της ψυχής και ταυτίζεται με την ίδια την παιδεία. Χαρακτηριστικά της: (1) είναι ολιστική — αφορά «ὅλη τὴν ψυχήν», όχι μόνο τη διάνοια, γι’ αυτό και το ρήμα «θεῶμαι»· (2) έχει κατεύθυνση — από το γίγνεσθαι (αισθητός κόσμος) προς το ὄν και το φανότατον, την Ιδέα του Αγαθού· (3) δεν εμφυτεύει νέα δύναμη αλλά αναπροσανατολίζει το ήδη υπάρχον όργανο που «δεν κοιτάζει προς τα εκεί που θα έπρεπε»· (4) είναι αναγκαία και δεοντολογική (περιακτέον εἶναι)· (5) είναι επώδυνη και δύσκολη, όπως η ανηφορική έξοδος από το σπήλαιο. Πρόκειται για στροφή ολόκληρης της ύπαρξης προς τον «ήλιο»/το Αγαθό.' },
    { q:'Με βάση το κείμενο αναφοράς αλλά και το παράλληλο κείμενο που σας δίνεται παρακάτω να εντοπίσετε την ομοιότητα ή τη διαφορά στις απόψεις που διατυπώνονται.',

    { lemma:'τοὺς ἀπαιδεύτους καὶ ἀληθείας ἀπείρους', note:'Πρώτη κατηγορία ακατάλληλων αρχόντων: οι αμόρφωτοι, αφιλοσόφητοι πολιτικοί. Τους λείπει η παιδεία και η γνώση της αλήθειας, δεν έχουν κατακτήσει την αρετή ούτε φτάσει στη θέαση του αγαθού. Κυρίως, δεν έχουν έναν ανώτερο σκοπό στη ζωή· τα κίνητρά τους είναι ταπεινά (πλουτισμός, εξουσία, αυτοπροβολή). Σ’ αυτούς ο Πλάτων εντάσσει και πολιτικούς της εποχής του, χωρίς εξαίρεση ούτε για τον Περικλή και τον Θεμιστοκλή.' },
    { lemma:'τοὺς ἐν παιδείᾳ ἐωμένους διατρίβειν διὰ τέλους', note:'Δεύτερη κατηγορία: οι πεπαιδευμένοι που θέλουν να αφιερωθούν αποκλειστικά στην πνευματική ζωή. Διαθέτουν όλα τα τυπικά προσόντα (γνώση της αλήθειας, αρετή, θέαση του αγαθού), αλλά αρνούνται να ασχοληθούν με τα κοινά και την ενεργό πολιτική. Ιστορικά παραδείγματα τέτοιας απόσυρσης οι νομοθέτες Σόλων και Λυκούργος, που έφυγαν από τις πόλεις τους αφού ολοκλήρωσαν το έργο τους.' },
    { lemma:'ἡγούμενοι ἐν μακάρων νήσοις ζῶντες ἔτι ἀπῳκίσθαι', note:'Παρομοίωση: οι πεπαιδευμένοι πιστεύουν ότι ζουν ήδη, ενόσω είναι ζωντανοί, στα νησιά των μακάρων — στον πνευματικό «παράδεισό» τους. Η πεποίθηση αυτή υποδηλώνει και πιθανή αλαζονεία. Η έντονη απροθυμία τους για την ενεργό πολιτική εκφράζεται αργότερα με διπλή άρνηση («μὴ ἐθέλειν … μηδὲ μετέχειν»).' },
    { lemma:'Ἡμέτερον δὴ ἔργον … τῶν οἰκιστῶν', note:'«Οἰκισταί» = οι ιδρυτές της ιδανικής πολιτείας, δηλαδή ο Σωκράτης και οι συνομιλητές του που την οραματίζονται. Έργο τους είναι να υποχρεώσουν («ἀναγκάσαι») τους προικισμένους από τη φύση ανθρώπους να εξελιχθούν σε φιλοσόφους και να αναλάβουν τη διοίκηση.' },

  ermineytikes:[
    { q:'Ποιόν τρόπο ζωής προτιμούν να αναλάβουν περισσότερο οι πεπαιδευμένοι από την ανάληψη ευθυνών στη διοίκηση της πολιτείας; Με ποιόν εκφραστικό τρόπο παρουσιάζει την επιθυμία τους ο Πλάτων;',
      answer:'Οι πεπαιδευμένοι προτιμούν να ζουν αφοσιωμένοι αποκλειστικά στις πνευματικές τους ενασχολήσεις («ἐν παιδείᾳ … διατρίβειν διὰ τέλους»), απέχοντας από τα καθημερινά προβλήματα, την ενεργό πολιτική και τη διαχείριση των κοινών· δείχνουν αδιαφορία ακόμη και για την εξουσία, τις τιμές και την εκτίμηση των συμπολιτών τους. Ο Πλάτων παρουσιάζει την επιθυμία τους αυτή με την παρομοίωση των νησιών των μακάρων: νομίζουν ότι, ζωντανοί ακόμη, έχουν μεταφερθεί και κατοικούν στον «παράδεισο» των μακάρων («ἡγούμενοι ἐν μακάρων νήσοις ζῶντες ἔτι ἀπῳκίσθαι»), πράγμα που υποδηλώνει και μια πιθανή αλαζονεία. Η έντονη απροθυμία τους αποδίδεται επιπλέον με τη διπλή άρνηση «μὴ ἐθέλειν … μηδὲ μετέχειν».' },
    { q:'Να εντοπίσετε στο κείμενο τους όρους (λέξεις) που χρησιμοποιεί ο Πλάτων για να χαρακτηρίσει το ἀγαθό, την πορεία προς αυτό και την προσέγγισή του και να τους σχολιάσετε.',
      answer:'Το ίδιο το Αγαθό χαρακτηρίζεται ως «τὸ μάθημα … μέγιστον», η ύψιστη γνώση, η Ιδέα του Αγαθού. Την πορεία προς αυτό δηλώνουν οι τύποι του ρ. ἀναβαίνω («ἀναβῆναι», «ἀνάβασιν», «ἀναβάντες»): πρόκειται για επίπονη, ανηφορική άνοδο από το σκότος της άγνοιας στο φως της αλήθειας, που απαιτεί χρόνο και μόχθο (μεταφορική χρήση του «ἄνω» για την παιδεία). Την προσέγγιση/θέαση του Αγαθού δηλώνουν το «ἀφικέσθαι» (=να φθάσει, μετά από κοπιαστική «παίδευσιν») και οι τύποι του ρ. ὁρῶ «ἰδεῖν» και «ἴδωσι» (=να αντικρύσουν, να θεαθούν). Πρέπει να τονιστεί ότι τα «ἰδεῖν»/«ἴδωσι» δεν αναφέρονται στην αίσθηση της όρασης, αλλά σε πνευματική θέαση του Αγαθού μέσω της καθαρής νόησης.' },
    { q:'Ο Γλαύκων υποβάλλει την ένσταση ότι αν αναγκάσουν τους φιλοσόφους να επιστρέψουν στο σπήλαιο, θα τους αδικήσουν, αφού θα τους αναγκάσουν να ζουν χειρότερα, ενώ μπορούν να ζήσουν καλύτερα. α) Πώς κρίνετε την άποψη του Γλαύκωνα; β) Τι απαντά ο Σωκράτης στον Γλαύκωνα; Αξιολογήστε τη θέση του Σωκράτη.',
      answer:'α) Ο Γλαύκων βλέπει το δίκαιο από τη σκοπιά του ατομικού συμφέροντος: εκφράζει μια ατομοκεντρική αντίληψη, αντιλαμβάνεται το δίκαιο και το άδικο έξω από το κοινωνικό πλαίσιο και προτάσσει την ατομική συνείδηση, χωρίς να αναγνωρίζει την προτεραιότητα του συμφέροντος της οργανωμένης κοινότητας έναντι του ατομικού. Η ένστασή του δεν είναι αβάσιμη σε ανθρώπινο επίπεδο, αλλά αγνοεί τον σκοπό της πολιτείας. β) Ο Σωκράτης απαντά κοινωνιοκεντρικά: τον νόμο δεν τον ενδιαφέρει να ευτυχήσει ιδιαίτερα μία τάξη, αλλά να επιτευχθεί η ευδαιμονία ολόκληρης της πόλης· γι’ αυτό συναρμόζει τους πολίτες με πειθώ και ανάγκη και τους χρησιμοποιεί ως δεσμό ενότητας. Η θέση του είναι συνεπής με τη θεμελιώδη ιδέα της Πολιτείας (η πόλη ως οργανικό σύνολο) και ηθικά ισχυρή, αν και η έμφαση στον εξαναγκασμό και στην υποταγή του ατόμου στο σύνολο εγείρει ενστάσεις από τη σκοπιά της ατομικής ελευθερίας.' },

      answer:'Ο νόμος επιδιώκει την κοινωνική συναρμογή χρησιμοποιώντας δύο μέσα. Με την πειθώ εξασφαλίζει την εκούσια υπακοή: με λογικά επιχειρήματα, υγιή πρότυπα και εκπαίδευση κάνει τους πολίτες (κυρίως τους πεπαιδευμένους) να συνειδητοποιήσουν τον κοινωνικό τους ρόλο. Όσοι όμως δεν πείθονται με τον λόγο — κυρίως ο «ἄπειρος παιδείας ὄχλος», αλλά και όσοι πεπαιδευμένοι ή ακόμη και άρχοντες δεν συμμορφώνονται — αντιμετωπίζονται με «ἀνάγκη», δηλαδή με εξαναγκασμό μέσω ποινών και κυρώσεων. Η βία εδώ δεν σημαίνει τυραννική ή αυταρχική επιβολή ούτε εξόντωση των απείθαρχων· είναι το αναγκαίο μέσο για να μη διασπαστεί ο κοινωνικός ιστός, ώστε όλοι να συνεισφέρουν στη συνοχή και την κοινή ευδαιμονία της πόλης. Οι προθέσεις του νόμου παραμένουν αγαθές: χρησιμοποιεί τον εξαναγκασμό όχι για ατομικά συμφέροντα, αλλά για το κοινό συμφέρον.' },
    { q:'Να εξετάσετε πώς παρουσιάζεται η εξουσία και ο ρόλος του Νόμου στα παρακάτω κείμενα, συνδυάζοντάς τα με το κείμενο αναφοράς.',
      passage:'«Και όταν πια φύγουν αυτοί [οι νέοι άνδρες] από τους δασκάλους, η πόλη, με τη σειρά της, τους αναγκάζει να μάθουν τους νόμους και να ζουν σύμφωνα με αυτούς, ώστε να μην ενεργούν από μόνοι τους και όπως νομίζουν οι ίδιοι […]. Έτσι, και η πόλη … αναγκάζει και όσους ασκούν ένα αξίωμα και όσους άρχονται να συμμορφώνονται με αυτούς. Εκείνος δε ο οποίος τους παραβαίνει, υφίσταται κυρώσεις … εὐθύνες, λες και η δικαιοσύνη ξαναβάζει [τον παραβάτη] στην ευθεία.»\n— Πλάτων, Πρωταγόρας 326d-e\n\n«… μας συνδέει η φύση, όχι ο νόμος· γιατί η φύση συνδέει με συγγένεια το όμοιο με το όμοιο, ενώ ο νόμος, των ανθρώπων ο δυνάστης, συχνά επιβάλλει με τη βία σχέσεις που δεν τις ανέχεται η φύση.»\n— Πλάτων, Πρωταγόρας 337b (λόγος Ιππία)',

  /* ── ΑΣΚΗΣΕΙΣ · Α. Ερμηνευτικές ── */
  ermineytikes:[
    { q:'Ποιους υπονοεί ο Αριστοτέλης ότι πρέπει να ορίσουν νόμους για την παιδεία (νομοθετητέον περὶ παιδείας) και ποια πολιτική θέση διατυπώνει με την έκφραση: κοινὴν ποιητέον;',
      answer:'Με το «νομοθετητέον» ο Αριστοτέλης υπονοεί ότι για την παιδεία πρέπει να μεριμνούν οι πολιτικοί και οι νομοθέτες, δηλαδή το ίδιο το κράτος: η παιδεία είναι πολιτικό θέμα, αντικείμενο κρατικής μέριμνας, γιατί επηρεάζει τη συνολική ζωή της πόλης αλλά και του κάθε πολίτη ξεχωριστά. Με την έκφραση «κοινὴν ποιητέον» διατυπώνει τη θέση ότι η παιδεία δεν πρέπει να παρέχεται ιδιωτικά, με πρόγραμμα που επιλέγει ο κάθε γονιός, αλλά να είναι ενιαία και κοινή για όλους τους πολίτες, με βάση σχετική νομοθεσία. Η κοινή, δημόσια παιδεία είναι αναγκαία για την πολιτική και κοινωνική ισότητα, για την ενότητα της πόλης και την ευδαιμονία του συνόλου, αφού κοινός σκοπός της πόλης απαιτεί και κοινή παιδεία.' },
    { q:'Ποιες απόψεις του Αριστοτέλη για τη διαμόρφωση του ηθικού χαρακτήρα του ανθρώπου διακρίνετε στο κείμενο;',
      answer:'Ο Αριστοτέλης τοποθετεί τη διάπλαση του ήθους στο κέντρο της παιδείας. Ανάμεσα στους δύο πιθανούς στόχους —την άσκηση του νου (πρὸς τὴν διάνοιαν) και τη διαμόρφωση του ήθους της ψυχής (πρὸς τὸ τῆς ψυχῆς ἦθος)— δεν απορρίπτει καμία διάσταση, δίνει όμως κυρίαρχη θέση στον ηθοπλαστικό προσανατολισμό. Από τους τρεις «τύπους» παιδείας (ωφελιμιστική, ηθοπλαστική, γνωσιοκεντρική) κανένας δεν τον ικανοποιεί μόνος του· η αρετή, ως βάση του προτιμότερου βίου, καλλιεργείται με τον εθισμό και τον έλεγχο της λογικής. Γι’ αυτό και οι χρήσιμες γνώσεις δεν πρέπει να είναι αυτοσκοπός: απορρίπτει το βάναυσον, ό,τι καθιστά το σώμα, την ψυχή ή τον νου άχρηστα για τις πράξεις της αρετής και «υποδουλώνει» τον άνθρωπο. Ο χαρακτήρας της παιδείας πρέπει τελικά να στοχεύει στην αρετή του ελεύθερου ανθρώπου.' },
    { q:'Ποιο κριτήριο επιλογής «διδακτέας ύλης» δέχεται κατ’ αρχήν ο Αριστοτέλης και πώς αντιμετωπίζει την καλλιέργεια του νου μέσα από τα εκπαιδευτικά προγράμματα της εποχής του;',
      answer:'Κριτήριο επιλογής της διδακτέας ύλης είναι, κατ’ αρχήν, η αναγκαιότητα και το «ελεύθερο» της γνώσης: από τα χρήσιμα πρέπει να διδάσκονται τα αναγκαία (τὰ ἀναγκαῖα τῶν χρησίμων), και μάλιστα όχι όλα, αλλά μόνο όσα ταιριάζουν σε ελεύθερους ανθρώπους (ἐλευθέρια ἔργα) και δεν καθιστούν τον νέο βάναυσο. Απορρίπτει τις ευτελείς, «ανελεύθερες» ασχολίες που αδρανοποιούν σώμα και νου. Ως προς την καλλιέργεια του νου, ο Αριστοτέλης δεν αποδοκιμάζει τη γνωσιοκεντρική διάσταση (τὰ περιττά, τη γνώση για χάρη της γνώσης), απορρίπτει όμως το μονοδιάστατο κάθε τύπου παιδείας — και ιδίως τον στενά πρακτικό/ωφελιμιστικό προσανατολισμό. Προτείνει τη μέση οδό: ένα πρότυπο που συνθέτει χρησιμότητα, αναγκαιότητα και επιστημονική γνώση, με κυρίαρχο πάντα τον ηθοπλαστικό στόχο.' },
    { q:'Με τα δύο ρηματικά επίθετα στην πρώτη περίοδο του αρχαίου διδαγμένου κειμένου ο Αριστοτέλης διατυπώνει μία δεοντολογική διαπίστωση. Να την αναφέρετε και να την ερμηνεύσετε αντλώντας δύο (2) βασικά επιχειρήματα απ’ όσα αναφέρονται στο παράλληλο κείμενο.',
      passage:'«Κανείς, νομίζω, δεν έχει αμφιβολία ότι είναι υποχρέωση του νομοθέτη να ασχοληθεί πολύ σοβαρά με το θέμα της παιδείας των νέων· είναι κάτι που αν παραμεληθεί στις πόλεις, βλάπτει πριν απ’ όλα το ίδιο το πολίτευμά τους, αφού οι νέοι πρέπει να παίρνουν μόρφωση ταιριαστή με το πολίτευμα της πόλης τους. ... Καθώς, εξάλλου, οι πολίτες μιας πόλης έχουν να επιτελέσουν σαν σύνολο έναν σκοπό, είναι φανερό ότι και η παιδεία πρέπει να είναι μία και η ίδια για όλους, και η φροντίδα γι’ αυτήν πρέπει να ανήκει στο δημόσιο και όχι να αφήνεται στην ατομική πρωτοβουλία, όπως γίνεται σήμερα, που ο κάθε γονιός φροντίζει ιδιωτικά τα παιδιά του, διδάσκοντάς τους τους κλάδους της γνώσης που ο ίδιος θεωρεί ενδεδειγμένους. Για την επίτευξη ενός στόχου που είναι κοινός για όλους, κοινή πρέπει να είναι και η άσκηση. Και, φυσικά, κανείς πολίτης δεν πρέπει να πιστεύει ότι ανήκει στον εαυτό του, αλλά, αντίθετα, ότι όλοι οι πολίτες ανήκουν στην πόλη· ο καθένας δεν είναι παρά ένα μόριο της πόλης, και η φροντίδα για το κάθε ξεχωριστό μόριο πρέπει να γίνεται σε απόλυτο συνταίριασμα με τη φροντίδα για το σύνολο.»\n— Ἀριστοτέλης, Πολιτικά, 1104a-b (μτφρ. Δ. Λυπουρλής)',
      answer:'Τα δύο ρηματικά επίθετα σε -τέον (νομοθετητέον, κοινὴν ποιητέον) διατυπώνουν τη δεοντολογική διαπίστωση ότι πρέπει να υπάρχει ειδική νομοθεσία για την παιδεία και ότι αυτή πρέπει να είναι κοινή/ενιαία για όλους. Το παράλληλο κείμενο τη στηρίζει με δύο επιχειρήματα: (α) Το επιχείρημα του τέλους/σκοπού: αφού οι πολίτες έχουν σαν σύνολο έναν κοινό σκοπό να επιτελέσουν και η μόρφωση πρέπει να είναι ταιριαστή με το πολίτευμα, «για την επίτευξη ενός στόχου που είναι κοινός για όλους, κοινή πρέπει να είναι και η άσκηση» — άρα η παιδεία οφείλει να είναι δημόσια και όχι ιδιωτική. (β) Το επιχείρημα του όλου/μορίου: κανείς πολίτης δεν ανήκει στον εαυτό του, αλλά όλοι ανήκουν στην πόλη, της οποίας ο καθένας είναι ένα μόριο· η φροντίδα για το κάθε μόριο πρέπει να συνταιριάζεται με τη φροντίδα για το σύνολο — άρα το όλον (η πόλη) και όχι το μέρος (ο γονιός) αποφασίζει για την παιδεία.' },
