<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Αντωνυμίες — Θεωρία & Μελέτη</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<style>
:root{
  --ok:#27ae60; --err:#c0392b;
  /* gender accents — set per-theme in JS (applyTheme); fallbacks below */
  --g-m:oklch(0.71 0.055 248);  /* αρσενικό  – cool blue  */
  --g-f:oklch(0.71 0.055 22);   /* θηλυκό    – warm rose  */
  --g-n:oklch(0.71 0.055 150);  /* ουδέτερο  – sage green */
  --g-mf:oklch(0.73 0.055 90);  /* αρσ/θηλ   – amber      */
  --g-x:oklch(0.62 0.012 80);   /* αόριστο   – neutral    */
  /* per-case tablet colours (row coding) — set per-theme in applyTheme; fallbacks below */
  --c0:oklch(0.70 0.07 30); --c1:oklch(0.70 0.07 90); --c2:oklch(0.70 0.07 150);
  --c3:oklch(0.70 0.07 210); --c4:oklch(0.70 0.07 272); --c5:oklch(0.70 0.07 330);
  --tint:10%;          /* gender column wash (dir A)  */
  --tint-strong:14%;   /* gender tile wash  (dir B)  */
  --radius:14px;
  --serif:'Cinzel',Georgia,serif;
  --lat:'Cormorant Garamond',Georgia,serif;   /* Latin forms/lemmas — REAL lowercase italics */
  --sans:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  --mono:'SFMono-Regular',ui-monospace,'Cascadia Mono',Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  /* chrome — driven by SymposiON --sym-* tokens (RT.apply sets these on <body>), with fallbacks.
     MUST be body-scoped so the var() lookups see the body-level --sym-* values. */
  --bg:var(--sym-bg,#1a1610);
  --panel:var(--sym-bg-card,#241e16);
  --panel2:var(--sym-bg-raise,#2c2418);
  --gold:var(--sym-gold,#c9a44a);
  --gold-lt:var(--sym-gold-lt,#e8c87a);
  --txt:var(--sym-fg,#e8dcc8);
  --muted:var(--sym-fg-muted,#8a7a60);
  --border:color-mix(in srgb,var(--gold) 22%,var(--panel));
  background:
    radial-gradient(120% 80% at 50% -10%, color-mix(in srgb,var(--gold) 6%,var(--bg)), transparent 60%),
    var(--bg);
  color:var(--txt); font-family:var(--sans);
  -webkit-font-smoothing:antialiased; min-height:100vh; line-height:1.5;
}
.lat{font-family:var(--lat); font-style:italic; font-weight:600; letter-spacing:.2px}
.eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:2.4px; text-transform:uppercase; color:var(--muted)}
button{font-family:inherit; cursor:pointer}
::selection{background:color-mix(in srgb,var(--gold) 38%,transparent); color:var(--gold-lt)}
:focus-visible{outline:2px solid var(--gold-lt); outline-offset:2px; border-radius:6px}

/* ─── shell ─── */
.wrap{max-width:1080px; margin:0 auto; padding:34px 22px 80px}
header.app{margin-bottom:26px}
header.app h1{font-family:var(--serif); font-weight:600; font-size:34px; letter-spacing:.5px; margin:8px 0 4px; color:var(--gold-lt)}
header.app p{margin:0; color:var(--muted); max-width:60ch}
.theme-row{display:flex; align-items:center; gap:10px; margin-top:16px}
.theme-row label{font-family:var(--mono); font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted)}
.theme-row select{min-width:200px; padding:8px 30px 8px 12px; font-size:13.5px}
.theme-swatch{width:46px; height:22px; border-radius:6px; border:1px solid var(--border); flex:none}

.tabbar{display:flex; flex-wrap:wrap; gap:8px; margin:24px 0 28px; border-bottom:1px solid var(--border); padding-bottom:0}
.tab{
  appearance:none; border:1px solid transparent; border-bottom:none; background:transparent;
  color:var(--muted); padding:13px 18px 12px; font-size:14.5px; font-weight:600;
  border-radius:12px 12px 0 0; position:relative; top:1px; transition:color .18s, background .18s;
  display:flex; align-items:center; gap:9px;
}
.tab .num{font-family:var(--mono); font-size:11px; opacity:.7}
.tab:hover{color:var(--txt)}
.tab[aria-selected="true"]{
  color:var(--gold-lt); background:var(--panel); border-color:var(--border);
  box-shadow:0 -2px 0 var(--gold) inset;
}
.panel-host{}

/* ─── controls / chrome ─── */
.toolbar{display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin-bottom:20px}
.field{display:flex; flex-direction:column; gap:6px}
.field > label{font-family:var(--mono); font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted)}
select, .sellike{
  font-family:var(--sans); font-size:14.5px; color:var(--txt); background:var(--panel2);
  border:1px solid var(--border); border-radius:10px; padding:10px 13px; min-width:230px;
}
select{appearance:none; background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
  background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%; background-size:5px 5px,5px 5px; background-repeat:no-repeat; padding-right:34px}
.btn{
  background:var(--panel2); border:1px solid var(--border); color:var(--txt);
  padding:10px 16px; border-radius:10px; font-size:13.5px; font-weight:600; transition:.16s;
}
.btn:hover{border-color:var(--gold); color:var(--gold-lt)}
.btn.gold{background:linear-gradient(180deg,var(--gold-lt),var(--gold)); color:#231a08; border-color:var(--gold-lt)}
.btn.gold:hover{filter:brightness(1.06)}
.btn.sm{padding:7px 11px; font-size:12px}
.btn[aria-pressed="true"]{border-color:var(--gold); color:var(--gold-lt); background:color-mix(in srgb,var(--gold) 14%,var(--panel2))}

.seg{display:inline-flex; background:var(--panel2); border:1px solid var(--border); border-radius:11px; padding:4px; gap:4px}
.seg button{appearance:none; border:none; background:transparent; color:var(--muted); padding:8px 15px; border-radius:8px; font-size:13.5px; font-weight:600; transition:.16s}
.seg button[aria-pressed="true"]{background:color-mix(in srgb,var(--gold) 18%,var(--panel2)); color:var(--gold-lt); box-shadow:0 1px 0 color-mix(in srgb,var(--gold) 40%,transparent) inset}

.pill{font-family:var(--mono); font-size:10.5px; letter-spacing:1.2px; text-transform:uppercase; padding:5px 10px; border-radius:999px; border:1px solid var(--border); color:var(--muted)}

.lemma-head{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin:4px 0 18px}
.lemma-head .l{font-family:var(--lat); font-style:italic; font-weight:600; font-size:30px; color:var(--gold-lt); white-space:nowrap}
.lemma-head .cat{font-family:var(--mono); font-size:11px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted)}

.legend{display:flex; gap:16px; flex-wrap:wrap; align-items:center; margin:2px 0 18px; font-size:12.5px; color:var(--muted)}
.legend i{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:7px; vertical-align:-1px}

/* ─── tables base ─── */
.grid-card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:6px 18px 18px; overflow-x:auto}
table.par{border-collapse:separate; border-spacing:0; width:100%}
table.par th, table.par td{padding:0}
.grouphead{font-family:var(--serif); font-size:13px; letter-spacing:1.6px; text-transform:uppercase; color:var(--gold); text-align:center; padding:12px 0 12px}
.corner{width:1%; position:sticky; left:0; z-index:3; background:var(--panel)}
.caselab{text-align:right; white-space:nowrap; padding:0 18px 0 6px; width:1%; vertical-align:middle; position:sticky; left:0; z-index:2; background:var(--panel)}
.ctab{display:inline-block; font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:.2px; white-space:nowrap;
  padding:5px 13px; border-radius:999px;
  background:color-mix(in srgb,var(--cc,var(--muted)) 20%,var(--panel2));
  border:1px solid color-mix(in srgb,var(--cc,var(--border)) 48%,var(--border));
  color:color-mix(in srgb,var(--cc,var(--txt)) 50%,var(--txt));}
.c0{--cc:var(--c0)} .c1{--cc:var(--c1)} .c2{--cc:var(--c2)} .c3{--cc:var(--c3)} .c4{--cc:var(--c4)} .c5{--cc:var(--c5)}
.grp-sep{width:22px}

/* gender tint helpers */
.gm{--gc:var(--g-m)} .gf{--gc:var(--g-f)} .gn{--gc:var(--g-n)} .gmf{--gc:var(--g-mf)} .gx{--gc:var(--g-x)}
.colhead{font-family:var(--serif); font-style:italic; font-size:14.5px; text-align:center; padding:0 6px 9px; color:var(--gc,var(--txt)); white-space:nowrap}
.colhead small{display:block; font-family:var(--mono); font-style:normal; font-size:9px; letter-spacing:1.3px; text-transform:uppercase; color:var(--muted); margin-top:2px}

/* DIRECTION A — Ledger / stele */
.dirA table.par td.cell{
  background:color-mix(in srgb,var(--gc,var(--muted)) var(--tint),var(--panel2));
  border-top:1px solid var(--border);
  text-align:center; padding:11px 16px; font-family:var(--lat); font-style:italic; font-size:19px; color:var(--txt);
  position:relative; min-width:84px;
}
.dirA .colhead{border-bottom:2px solid color-mix(in srgb,var(--gc) 55%,transparent)}
.dirA td.cell.dash{color:var(--muted); font-style:normal; opacity:.5}
.dirA .grp-sep{background:transparent; border:none}

/* DIRECTION B — Tiles */
.dirB table.par{border-spacing:7px 7px}
.dirB table.par td.cell{
  background:color-mix(in srgb,var(--gc,var(--muted)) var(--tint-strong),var(--panel2));
  border:1px solid color-mix(in srgb,var(--gc,var(--border)) 36%,var(--border));
  border-radius:11px; text-align:center; padding:17px 14px 11px; min-width:96px;
  font-family:var(--lat); font-style:italic; font-size:19px; color:var(--txt);
  box-shadow:0 1px 0 color-mix(in srgb,var(--gc) 26%,transparent) inset; position:relative;
}
.dirB table.par td.cell::before{
  content:attr(data-case); position:absolute; top:5px; left:0; right:0;
  font-family:var(--mono); font-style:normal; font-size:8px; letter-spacing:1px; text-transform:uppercase;
  color:color-mix(in srgb,var(--gc) 75%,var(--muted)); opacity:.9;
}
.dirB td.cell.dash{color:var(--muted); font-style:normal; opacity:.45; box-shadow:none; background:var(--panel2); border-style:dashed}
.dirB .colhead{padding-bottom:3px}
.dirB .grp-sep{width:6px}

/* study (reveal) mode cells */
td.cell.hide{cursor:pointer; color:transparent; user-select:none}
.dirA td.cell.hide{background:repeating-linear-gradient(45deg,var(--panel2),var(--panel2) 6px,color-mix(in srgb,var(--gold) 8%,var(--panel2)) 6px,color-mix(in srgb,var(--gold) 8%,var(--panel2)) 12px)}
.dirB td.cell.hide{background:repeating-linear-gradient(45deg,var(--panel2),var(--panel2) 6px,color-mix(in srgb,var(--gold) 10%,var(--panel2)) 6px,color-mix(in srgb,var(--gold) 10%,var(--panel2)) 12px); border-style:dashed}
td.cell.hide::after{content:'?'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-family:var(--mono); font-style:normal; font-size:15px; opacity:.6}
td.cell.dash.hide{cursor:default}
td.cell.revealed{animation:pop .28s ease}
@keyframes pop{0%{transform:scale(.9); opacity:.3} 60%{transform:scale(1.04)} 100%{transform:scale(1)}}
td.cell.revealed{box-shadow:0 0 0 1.5px color-mix(in srgb,var(--ok) 55%,transparent) inset !important}

.counter{font-family:var(--mono); font-size:12px; color:var(--muted)}
.counter b{color:var(--gold-lt)}

/* fill inputs */
td.cell.fillcell{padding:6px; background:var(--panel2)}
.dirA td.cell.fillcell{background:color-mix(in srgb,var(--gc) 5%,var(--panel2)); padding:6px}
.dirB td.cell.fillcell{padding:6px}
td.cell.fillcell::before{display:none}
td.cell input.fin{
  width:100%; min-width:96px; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:9px 8px; text-align:center; color:var(--txt); font-family:var(--lat); font-style:italic; font-size:18px;
}
td.cell input.fin:focus{border-color:var(--gold); outline:none}
td.cell.fillcell.dash input{opacity:.4}
input.fin.good{border-color:var(--ok); background:color-mix(in srgb,var(--ok) 14%,var(--bg)); color:var(--gold-lt)}
input.fin.bad{border-color:var(--err); background:color-mix(in srgb,var(--err) 13%,var(--bg))}
.corr{display:block; margin-top:4px; font-family:var(--lat); font-style:italic; font-size:14.5px; color:var(--ok)}
.scorebar{display:flex; align-items:center; gap:14px; margin-top:18px; flex-wrap:wrap}
.scorebar .score{font-family:var(--serif); font-size:20px; color:var(--gold-lt)}

/* parse */
.parse-stage{display:grid; grid-template-columns:1fr; gap:22px; max-width:760px}
.formbox{
  background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
  padding:34px 24px; text-align:center; position:relative; overflow:hidden;
}
.formbox .word{font-family:var(--lat); font-style:italic; font-weight:600; font-size:56px; color:var(--gold-lt); letter-spacing:1px}
.formbox .q{font-size:13px; color:var(--muted); margin-bottom:6px}
.parse-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
@media(max-width:560px){.parse-grid{grid-template-columns:1fr}}
.parse-grid .field > label{margin-bottom:2px}
.chips{display:flex; flex-wrap:wrap; gap:8px}
.chip{appearance:none; background:var(--panel2); border:1px solid var(--border); color:var(--txt); padding:9px 13px; border-radius:999px; font-size:13.5px; font-weight:600; transition:.15s}
.chip:hover{border-color:var(--gold)}
.chip[aria-pressed="true"]{background:color-mix(in srgb,var(--gold) 20%,var(--panel2)); border-color:var(--gold); color:var(--gold-lt)}
.verdict{border-radius:12px; padding:15px 18px; font-size:14.5px; display:none}
.verdict.show{display:block}
.verdict.ok{background:color-mix(in srgb,var(--ok) 16%,var(--panel)); border:1px solid color-mix(in srgb,var(--ok) 50%,var(--border)); color:#bfe6c8}
.verdict.no{background:color-mix(in srgb,var(--err) 14%,var(--panel)); border:1px solid color-mix(in srgb,var(--err) 45%,var(--border)); color:#eccac4}
.verdict .lat{color:var(--gold-lt)}

/* rule flip cards */
.rules-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px}
.flip{perspective:1400px; height:230px}
.flip-inner{position:relative; width:100%; height:100%; transition:transform .6s cubic-bezier(.4,.16,.2,1); transform-style:preserve-3d; cursor:pointer}
.flip.flipped .flip-inner{transform:rotateY(180deg)}
.face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:var(--radius); border:1px solid var(--border); padding:22px; display:flex; flex-direction:column; overflow:hidden}
.face.front{background:linear-gradient(160deg,var(--panel2),var(--panel))}
.face.back{background:linear-gradient(160deg,color-mix(in srgb,var(--gold) 10%,var(--panel)),var(--panel)); transform:rotateY(180deg); border-color:color-mix(in srgb,var(--gold) 30%,var(--border))}
.face .rtag{font-family:var(--mono); font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--gold); margin-bottom:12px}
.face .rule{font-family:var(--serif); font-size:18px; line-height:1.34; color:var(--txt); flex:1}
.face .rule .lat{color:var(--gold-lt)}
.face .flip-hint{font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:10px}
.face.back .ex-label{font-family:var(--mono); font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); margin-bottom:8px}
.face.back .ex{font-family:var(--serif); font-size:16px; line-height:1.5; color:var(--txt)}
.face.back .ex .lat{color:var(--gold-lt); font-weight:600}
.face.back .arrow{color:var(--gold); font-style:normal}

.hint{font-size:12.5px; color:var(--muted); margin-top:14px}
.hint kbd{font-family:var(--mono); font-size:11px; background:var(--panel2); border:1px solid var(--border); border-bottom-width:2px; border-radius:5px; padding:1px 6px; color:var(--txt)}
.sr{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0)}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="eyebrow">Λατινικά · Γραμματική · Αντωνυμίες</div>
    <h1>Κλίση Αντωνυμιών</h1>
    <p>Τέσσερις τρόποι ενεργητικής μελέτης των αντωνυμικών κλίσεων — αποκάλυψε, συμπλήρωσε, αναγνώρισε, θυμήσου.</p>
    <!-- theme is inherited from the host app (--sym-* tokens copied into this iframe); standalone picker hidden -->
    <div class="theme-row" hidden style="display:none">
      <label for="theme-pick">Θέμα</label>
      <select id="theme-pick" aria-label="Επιλογή χρωματικού θέματος"></select>
      <span class="theme-swatch" id="theme-swatch" aria-hidden="true"></span>
    </div>
  </header>

  <div class="tabbar" role="tablist" aria-label="Μορφές μελέτης">
    <button class="tab" role="tab" id="tab-0" aria-controls="p-0" aria-selected="true"><span class="num">01</span> Πίνακας Κλίσης</button>
    <button class="tab" role="tab" id="tab-1" aria-controls="p-1" aria-selected="false"><span class="num">02</span> Συμπλήρωση Πίνακα</button>
    <button class="tab" role="tab" id="tab-2" aria-controls="p-2" aria-selected="false"><span class="num">03</span> Αναγνώριση Τύπου</button>
    <button class="tab" role="tab" id="tab-3" aria-controls="p-3" aria-selected="false"><span class="num">04</span> Κανόνες</button>
  </div>

  <div id="host"></div>
</div>

<!-- single source of truth: the verified pronoun dataset (LAT_P_DB) -->
<script src="data.js"></script>
<script>
/* ════════════════════════ DATA ════════════════════════ */
const CASES = ['Ονομαστική','Γενική','Δοτική','Αιτιατική','Κλητική','Αφαιρετική'];
const CASE_ABBR = ['Ονομ.','Γεν.','Δοτ.','Αιτ.','Κλητ.','Αφαιρ.'];
const CATS = [
  {k:'pers', name:'Προσωπικές'},
  {k:'poss', name:'Κτητικές'},
  {k:'dem',  name:'Δεικτικές'},
  {k:'det',  name:'Οριστικές'},
  {k:'rel',  name:'Αναφορικές'},
  {k:'int',  name:'Ερωτηματικές'},
  {k:'ind',  name:'Αόριστες'},
];
// gender class + accepted gender set + legend swatch var
const GEN = {
  'αρσενικό':       {cls:'gm',  v:'--g-m',  set:['m'],     short:'αρσ.'},
  'θηλυκό':         {cls:'gf',  v:'--g-f',  set:['f'],     short:'θηλ.'},
  'ουδέτερο':       {cls:'gn',  v:'--g-n',  set:['n'],     short:'ουδ.'},
  'αρσενικό/θηλυκό':{cls:'gmf', v:'--g-mf', set:['m','f'], short:'αρσ./θηλ.'},
  'αόριστο':        {cls:'gx',  v:'--g-x',  set:['-'],     short:'—'},
};

// each paradigm = group of entries sharing lemma `l`; s/p arrays follow CASES order; '-' = no form
// PRIMARY SOURCE: the verified shared dataset (games/lat-antonymies/data.js → LAT_P_DB).
// The inline array below is only a standalone fallback if data.js is unavailable.
const DATA = (typeof LAT_P_DB !== 'undefined' && Array.isArray(LAT_P_DB) && LAT_P_DB.length) ? LAT_P_DB : [
  /* ── Προσωπικές ── */
  { l:'ego (εγώ)', t:'αόριστο', sub:'pers_ego',
    s:['ego','mei','mihi','me','-','me'],
    p:['nos','nostri, nostrum','nobis','nos','-','nobis'] },
  { l:'tu (εσύ)', t:'αόριστο', sub:'pers_tu',
    s:['tu','tui','tibi','te','tu','te'],
    p:['vos','vestri, vestrum','vobis','vos','vos','vobis'] },
  { l:'sui (εαυτού)', t:'αόριστο', sub:'pers_sui',
    s:['-','sui','sibi','se','-','se'],
    p:['-','sui','sibi','se','-','se'] },

  /* ── Κτητικές ── */
  { l:'meus, mea, meum', t:'αρσενικό', sub:'poss_meus',
    s:['meus','mei','meo','meum','mi','meo'],
    p:['mei','meorum','meis','meos','mei','meis'] },
  { l:'meus, mea, meum', t:'θηλυκό', sub:'poss_meus',
    s:['mea','meae','meae','meam','mea','mea'],
    p:['meae','mearum','meis','meas','meae','meis'] },
  { l:'meus, mea, meum', t:'ουδέτερο', sub:'poss_meus',
    s:['meum','mei','meo','meum','meum','meo'],
    p:['mea','meorum','meis','mea','mea','meis'] },

  /* ── Δεικτικές ── */
  { l:'ille, illa, illud', t:'αρσενικό', sub:'dem_ille',
    s:['ille','illius','illi','illum','-','illo'],

const catOf = sub => sub.split('_')[0].replace(/[0-9]+$/,'');
const catName = k => (CATS.find(c=>c.k===k)||{}).name || k;
// canonical lemma key (head form) for grouping
const lemmaKey = l => l.split(' ')[0].replace(/,$/,'');

/* group paradigms by lemma, preserving order */
function paradigms(){
  const map = new Map();
  DATA.forEach(e=>{
    const key = e.l;
    if(!map.has(key)) map.set(key,{l:e.l, sub:e.sub, cat:catOf(e.sub), entries:[]});
    map.get(key).entries.push(e);
  });
  return [...map.values()];
}
const PARS = paradigms();

/* parse index: surface form -> [{lemma,sub,case,num,genSet}] */
const FORM_INDEX = (()=>{
  const idx = new Map();
  DATA.forEach(e=>{
    const gset = GEN[e.t].set;
    ['s','p'].forEach(num=>{
      e[num].forEach((cell,ci)=>{
        if(cell==='-') return;
        cell.split(',').map(s=>s.trim()).forEach(form=>{
          const key = form.toLowerCase();
          if(!idx.has(key)) idx.set(key,[]);
          idx.get(key).push({lemma:e.l, sub:e.sub, ci, num, gset, t:e.t});
        });
      });
    });
  });
  return idx;
})();

/* ════════════════════════ HELPERS ════════════════════════ */
const $ = (s,r=document)=>r.querySelector(s);
const el = (tag,cls,html)=>{const n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n;};
const norm = s => s.toLowerCase().replace(/[āēīōūăĕĭŏŭ]/g,m=>({'ā':'a','ă':'a','ē':'e','ĕ':'e','ī':'i','ĭ':'i','ō':'o','ŏ':'o','ū':'u','ŭ':'u'}[m])).replace(/[^a-z]/g,'').trim();
const alts = cell => cell.split(',').map(s=>s.trim());
const rint = n => Math.floor(Math.random()*n);
const sample = arr => arr[rint(arr.length)];

/* build a grouped <select> of paradigms */
function paradigmSelect(onChange, sel){
  const s = el('select'); s.setAttribute('aria-label','Επιλογή αντωνυμίας');
  CATS.forEach(c=>{
    const grp = PARS.filter(p=>p.cat===c.k);
    if(!grp.length) return;
    const og = el('optgroup'); og.label = c.name;
    grp.forEach(p=>{ const o=el('option'); o.value=p.l; o.textContent=p.l; og.appendChild(o); });
    s.appendChild(og);
  });
  if(sel) s.value=sel;
  s.addEventListener('change',()=>onChange(s.value));
  return s;
}

function countHidden(par){
  let n=0;
  par.entries.forEach((e,ei)=>['s','p'].forEach(num=>e[num].forEach(c=>{ if(c!=='-') n++; })));
  return n;
}
function revealAll(par){
  par.entries.forEach((e,ei)=>['s','p'].forEach(num=>e[num].forEach((c,ci)=>{ if(c!=='-') F1.revealed.add(`${ei}-${num}-${ci}`); })));
}

/* shared grid builder — ONE combined table: rows = cases, columns = [Ενικός: genders] | [Πληθυντικός: genders] */
function buildGrid(par, opts={}){
  const fill = !!opts.fill;
  const card = el('div', `grid-card dir${F1.dir}`);
  const table = el('table','par');
  const ents = par.entries, ng = ents.length;

  const thead = el('thead');
  // row 1 — group spans
  const r1 = el('tr');
  r1.append(el('th','corner'));
  const sgh = el('th','grouphead'); sgh.colSpan=ng; sgh.textContent='Ενικός'; r1.append(sgh);
  r1.append(el('th','grp-sep'));
  const plh = el('th','grouphead'); plh.colSpan=ng; plh.textContent='Πληθυντικός'; r1.append(plh);
  thead.append(r1);
  // row 2 — gender labels
  const r2 = el('tr');
  r2.append(el('th','corner'));
  ['s','p'].forEach(num=>{
    ents.forEach(e=>{
      const g=GEN[e.t];
      const th=el('th',`colhead ${g.cls}`);
      th.innerHTML=`${shortGender(e.t)}<small>${g.short}</small>`;
      r2.append(th);
    });
    if(num==='s') r2.append(el('th','grp-sep'));
  });
  thead.append(r2); table.append(thead);

  // body
  const tbody = el('tbody');
  CASES.forEach((cs,ci)=>{
    const tr = el('tr');
    const lab = el('td','caselab'); lab.append(el('span',`ctab c${ci}`, cs.toLowerCase()));
    tr.append(lab);
    ['s','p'].forEach(num=>{
      ents.forEach((e,ei)=>tr.append(makeCell(e,ei,num,ci,cs,par,fill,opts)));
      if(num==='s') tr.append(el('td','grp-sep'));
    });
    tbody.append(tr);
  });
  table.append(tbody);
  card.append(table);

  if(!ents.some(e=>e.p.some(c=>c!=='-')))
    card.append(el('div','hint','Δεν σχηματίζει πληθυντικό — οι τύποι δηλώνονται με «—».'));
  return card;
}

function makeCell(e,ei,num,ci,cs,par,fill,opts){
  const raw = e[num][ci], g = GEN[e.t];
  const td = el('td',`cell ${g.cls}`);
  td.dataset.case = CASE_ABBR[ci];
  if(raw==='-'){ td.classList.add('dash'); td.textContent='—'; return td; }
  if(fill){
    td.classList.add('fillcell');
    const inp=el('input'); inp.className='fin'; inp.type='text';
    inp.setAttribute('aria-label',`${cs} ${num==='s'?'ενικός':'πληθ.'} ${e.t}`);
    inp.autocapitalize='off'; inp.autocomplete='off'; inp.spellcheck=false;
    inp.dataset.answer=raw; td.append(inp); return td;
  }
  if(F1.mode==='study'){
    const key=`${ei}-${num}-${ci}`;
    if(F1.revealed.has(key)){ td.textContent=raw; return td; }
    td.classList.add('hide'); td.tabIndex=0; td.setAttribute('role','button');
    td.setAttribute('aria-label','Κρυμμένος τύπος — πάτησε για αποκάλυψη');
    const reveal=()=>{
      F1.revealed.add(key); td.classList.remove('hide'); td.classList.add('revealed');
      td.removeAttribute('tabindex'); td.textContent=raw;
      if(opts.counterEl){ const tot=countHidden(par); opts.counterEl.innerHTML=`Αποκαλύφθηκαν <b>${F1.revealed.size}</b> / ${tot}`; }
    };
    td.onclick=reveal;
    td.onkeydown=ev=>{ if(ev.key==='Enter'||ev.key===' '){ev.preventDefault(); reveal();} };
    return td;
  }
  td.textContent=raw; return td;
}
function shortGender(t){
  return {'αρσενικό':'Αρσενικό','θηλυκό':'Θηλυκό','ουδέτερο':'Ουδέτερο','αρσενικό/θηλυκό':'Αρσ. / Θηλ.','αόριστο':'Άκλιτο γένος'}[t]||t;
}

function checkFill(scope){
  let ok=0, total=0;
  scope.querySelectorAll('input.fin').forEach(inp=>{
    total++;
    inp.classList.remove('good','bad');
    const td=inp.closest('td');
    td.querySelectorAll('.corr').forEach(n=>n.remove());
    const ans = inp.dataset.answer;
    const accepted = alts(ans).map(norm);
    const val = norm(inp.value);
    if(val && accepted.includes(val)){ inp.classList.add('good'); ok++; }
    else {
      inp.classList.add('bad');
      const c=el('span','corr', alts(ans).join(' / '));
      td.append(c);
    }
  });
  return {ok,total};
}

const F3 = { q:null, sel:{lemma:null,ci:null,num:null,gen:null} };

function newParseQ(){
  // pick interesting forms: prefer ambiguous (multiple analyses) sometimes
  const keys=[...FORM_INDEX.keys()];
  // weight toward forms with >1 analysis
  const ambiguous = keys.filter(k=>FORM_INDEX.get(k).length>1);
  const form = Math.random()<0.6 && ambiguous.length ? sample(ambiguous) : sample(keys);
  F3.q = { form };
  F3.sel = {lemma:null,ci:null,num:null,gen:null};
}

function renderF3(host){

  host.innerHTML='';

  [['s','Ενικός'],['p','Πληθυντικός']].forEach(([v,lab])=>{
    const b=el('button','chip',lab); b.type='button';
    b.onclick=()=>{F3.sel.num=v; [...nch.children].forEach(c=>c.setAttribute('aria-pressed',c===b));};
    nch.append(b);
  });
  fn.append(nch); grid.append(fn);

  // case chips
  const fc=el('div','field'); fc.append(el('label',null,'Πτώση'));

  });
  fc.append(cch); grid.append(fc);

  // gender chips
  const fg=el('div','field'); fg.append(el('label',null,'Γένος'));
  const gch=el('div','chips');
  [['m','Αρσενικό'],['f','Θηλυκό'],['n','Ουδέτερο'],['-','Χωρίς γένος']].forEach(([v,lab])=>{
    const b=el('button','chip',lab); b.type='button';
    b.onclick=()=>{F3.sel.gen=v; [...gch.children].forEach(c=>c.setAttribute('aria-pressed',c===b));};
    gch.append(b);
  });
  fg.append(gch); grid.append(fg);
  stage.append(grid);

  const submit=el('button','btn gold','Έλεγχος ανάλυσης'); submit.style.alignSelf='start';
  const verdict=el('div','verdict');

function judgeParse(verdict){
  const {lemma,ci,num,gen}=F3.sel;
  verdict.className='verdict show';
  if(!lemma||ci==null||!num||!gen){
    verdict.classList.add('no'); verdict.innerHTML='Συμπλήρωσε και τα τέσσερα πεδία.'; return;
  }
  const analyses = FORM_INDEX.get(F3.q.form)||[];
  const hit = analyses.find(a=> a.lemma===lemma && a.ci===ci && a.num===num && a.gset.includes(gen));
  if(hit){
    verdict.classList.add('ok');
    const others = analyses.length-1;
    verdict.innerHTML = `✓ Σωστά! Ο τύπος <span class="lat">${F3.q.form}</span> αναλύεται έτσι.`
      + (others>0 ? `<div style="margin-top:6px;color:var(--muted);font-size:13px">Ο τύπος είναι συγκρητικός — δέχεται ${analyses.length} έγκυρες αναλύσεις.</div>` : '');
  } else {
    const a = analyses[0];
    const g = a.gset.map(x=>({m:'αρσενικό',f:'θηλυκό',n:'ουδέτερο','-':'χωρίς γένος'}[x])).join(' / ');
    verdict.classList.add('no');
    verdict.innerHTML = `✗ Όχι ακριβώς. Μία σωστή ανάλυση: <span class="lat">${a.lemma}</span> · `
      + `${CASES[a.ci]} · ${a.num==='s'?'Ενικός':'Πληθυντικός'} · ${g}.`;
  }
}

    ex:'<span class="lat">mi / meus</span> (mi pater) <span class="arrow">·</span> <span class="lat">mea</span> (mea Tertia) <span class="arrow">·</span> <span class="lat">ille, hic, qui…</span> → καμία.' },
  { tag:'sui / suus — αυτοπαθείς', rule:'Το <span class="lat">sui</span> (προσωπική) και το <span class="lat">suus</span> (κτητική) είναι <span class="lat">αυτοπαθή</span>: παραπέμπουν στο υποκείμενο της πρότασης.',
    ex:'<span class="lat">se</span> laudat = επαινεί <i>τον εαυτό του</i> <span class="arrow">·</span> το <span class="lat">sui</span> δεν έχει ονομαστική.' },
  { tag:'quis, quid — ερωτηματική', rule:'Στον <span class="lat">ενικό</span> το αρσενικό &amp; θηλυκό ταυτίζονται (<span class="lat">quis</span>)· στον <span class="lat">πληθυντικό</span> χωρίζονται κατά γένος.',
    ex:'Εν.: <span class="lat">quis</span> (αρσ./θηλ.), <span class="lat">quid</span> (ουδ.) <span class="arrow">·</span> Πληθ.: <span class="lat">qui / quae / quae</span>.' },
  { tag:'nemo, nihil — συμπληρωματικά', rule:'Τα <span class="lat">nemo</span> &amp; <span class="lat">nihil</span> δανείζονται τύπους <span class="lat">συμπληρωματικά</span> από τα <span class="lat">nullus</span> και <span class="lat">nulla res</span>.',
    ex:'Γεν.: <span class="lat">nullius</span> (rei) <span class="arrow">·</span> Αφαιρ.: <span class="lat">nullo / nulla re</span> αντί *neminis.' },
  { tag:'Γενική σε -ius', rule:'Οι δεικτικές/οριστικές έχουν <span class="lat">γενική ενικού -ius</span> και <span class="lat">δοτική -i</span> για όλα τα γένη.',
    ex:'<span class="lat">illius, illi</span> <span class="arrow">·</span> <span class="lat">huius, huic</span> <span class="arrow">·</span> <span class="lat">eius, ei</span> — αρσ.=θηλ.=ουδ.' },
  { tag:'hic — πρόσφυμα -c', rule:'Το <span class="lat">hic</span> φέρει δεικτικό πρόσφυμα <span class="lat">-c(e)</span>, γι\' αυτό η γενική/δοτική γράφονται με συγκεκομμένο θέμα.',
    ex:'<span class="lat">hu-ius, hu-ic</span> <span class="arrow">·</span> αιτ. <span class="lat">hunc, hanc</span> (h-n-c).' },
];

function renderF4(host){
  host.innerHTML='';
  host.append(el('div','hint','Πάτησε μια κάρτα για να δεις το παράδειγμα. <kbd>Enter</kbd> / <kbd>Space</kbd> για αναποδογύρισμα.'));
  const grid=el('div','rules-grid'); grid.style.marginTop='14px';
  RULES.forEach((r,i)=>{
    const flip=el('div','flip');
    const inner=el('div','flip-inner'); inner.tabIndex=0; inner.setAttribute('role','button');
    inner.setAttribute('aria-label',`Κανόνας: ${r.tag}. Πάτησε για παράδειγμα.`);
    const front=el('div','face front');
    front.append(el('div','rtag',r.tag), el('div','rule',r.rule), el('div','flip-hint','▸ Παράδειγμα'));
    const back=el('div','face back');
    back.append(el('div','ex-label','Παράδειγμα'), el('div','ex',r.ex), el('div','flip-hint','◂ Κανόνας'));
    inner.append(front,back); flip.append(inner);
    const toggle=()=>flip.classList.toggle('flipped');
    inner.onclick=toggle;
    inner.onkeydown=ev=>{ if(ev.key==='Enter'||ev.key===' '){ev.preventDefault(); toggle();} };
    grid.append(flip);
  });
  host.append(grid);
}

/* ════════════════════════ TAB ROUTER ════════════════════════ */
const RENDERERS=[renderF1,renderF2,renderF3,renderF4];
const tabs=[...document.querySelectorAll('.tab')];
function selectTab(i){
  tabs.forEach((t,j)=>t.setAttribute('aria-selected', j===i));
  const host=$('#host');
  const panel=el('div','panel-host'); panel.id=`p-${i}`; panel.setAttribute('role','tabpanel'); panel.setAttribute('aria-labelledby',`tab-${i}`);
  host.innerHTML=''; host.append(panel);
  RENDERERS[i](panel);
  history.replaceState(null,'',`#${i}`);
}
tabs.forEach((t,i)=>{
  t.addEventListener('click',()=>selectTab(i));
  t.addEventListener('keydown',ev=>{
    if(ev.key==='ArrowRight'||ev.key==='ArrowLeft'){
      ev.preventDefault();
      const ni=(i+(ev.key==='ArrowRight'?1:tabs.length-1))%tabs.length;
      tabs[ni].focus(); selectTab(ni);
    }
  });
});
function initFromHash(){
  const qs = new URLSearchParams(location.search);
  const d = qs.get('d'); if(d==='A'||d==='B'){ F1.dir=d; F2.dir=d; }
  const m = qs.get('m'); if(m==='ref'||m==='study') F1.mode=m;
  const hashT = parseInt((location.hash||'').replace('#',''));
  const i = Math.max(0, Math.min(3, (isNaN(hashT)?parseInt(qs.get('t')):hashT)||0));
  selectTab(i);
}
window.addEventListener('hashchange', initFromHash);

/* ════════════════════════ THEME — SymposiON --sym-* tokens ════════════════════════ */
function applyTheme(id){
  const t = window.RT ? (RT.apply(document.body, id) || RT.apply(document.body,'obsidian')) : null;
  const light = document.body.classList.contains('is-light');
  const L = light ? 0.55 : 0.71, C = light ? 0.095 : 0.055;
  const set=(k,h)=>document.body.style.setProperty(k, `oklch(${L} ${C} ${h})`);
  // gender accents re-derived per theme (fixed distinguishing hues, theme-tuned L/C)
  set('--g-m',248); set('--g-f',22); set('--g-n',150); set('--g-mf',90);
  document.body.style.setProperty('--g-x', `oklch(${light?0.5:0.62} 0.012 80)`);
  // per-case tablet colours (6 hues), theme-tuned
  const cl = light?0.52:0.70, cc = light?0.095:0.07;
  [30,90,150,210,272,330].forEach((h,i)=>document.body.style.setProperty('--c'+i, `oklch(${cl} ${cc} ${h})`));
  document.body.style.setProperty('--tint', light?'20%':'10%');
  document.body.style.setProperty('--tint-strong', light?'30%':'14%');
  const sw=$('#theme-swatch'); if(sw && window.RT){ const th=RT.get(id); if(th) sw.style.background=RT.swatch(th); }
  try{ localStorage.setItem('latpron-theme', id); }catch(e){}
  return t;
}
function setupThemes(){
  const sel=$('#theme-pick');
  if(!sel || !window.RT){ applyTheme('obsidian'); return; }
  RT.GROUPS.forEach(([gk,gl])=>{
    const list=RT.THEMES.filter(t=>t.group===gk && !t.locked);
    if(!list.length) return;
    const og=el('optgroup'); og.label=gl;
    list.forEach(t=>{ const o=el('option'); o.value=t.id; o.textContent=t.name; og.append(o); });
    sel.append(og);
  });
  let saved='obsidian';
  try{ saved=localStorage.getItem('latpron-theme')||'obsidian'; }catch(e){}
  if(!RT.get(saved) || RT.get(saved).locked) saved='obsidian';
  sel.value=saved;
  sel.addEventListener('change',()=>applyTheme(sel.value));
  applyTheme(saved);
}
setupThemes();
initFromHash();
</script>
