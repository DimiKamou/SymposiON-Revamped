<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ιστορία — Εξάσκηση</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<link rel="stylesheet" href="css/istoria.css"/>
</head>
<body class="dir-atlas istoria-body">

  <!-- direction toggle (persisted; the student picks light or dark) -->
  <div class="dir-toggle" style="position:fixed;top:14px;right:16px;z-index:60;display:flex;border:1px solid var(--hair-strong);border-radius:40px;padding:3px;background:var(--paper);box-shadow:var(--shadow);">
    <button data-d="dir-atlas" onclick="setIstoriaDir('dir-atlas')" style="font-family:var(--f-mono);font-size:11px;letter-spacing:.06em;border:0;background:transparent;color:var(--ink-soft);border-radius:30px;padding:8px 13px;cursor:pointer;display:flex;align-items:center;gap:6px;"><span class="ico" data-ic-atlas style="font-size:14px"></span> ΑΤΛΑΣ</button>
    <button data-d="dir-agon" onclick="setIstoriaDir('dir-agon')" style="font-family:var(--f-mono);font-size:11px;letter-spacing:.06em;border:0;background:transparent;color:var(--ink-soft);border-radius:30px;padding:8px 13px;cursor:pointer;display:flex;align-items:center;gap:6px;"><span class="ico" data-ic-agon style="font-size:14px"></span> ΑΓΩΝ</button>
  </div>

  <!-- ════ HUB ════ -->
  <div class="screen on" id="hub">
    <div class="wrap">
      <header class="mast" id="mast">
        <div class="kicker eyebrow">Θέματα Νεοελληνικής Ιστορίας</div>
        <h1>ΑΤΛΑΣ</h1>
        <div class="sub">Ιστορία — Εξάσκηση</div>
        <div class="cat"></div>
      </header>
      <div class="meander mndr center" style="margin-bottom:18px;"></div>

      <div class="sec-h"><span class="n">§ Α</span><span class="ic" id="lab1" style="display:none"></span><h2>Θεματικές Ενότητες</h2><span class="ln"></span></div>
      <div class="units" id="units"></div>

      <div class="subrail" id="subrail" style="display:none;"></div>

      <div class="sec-h" style="margin-top:30px;"><span class="n">§ Β</span><span class="ic" id="lab2" style="display:none"></span><h2>Τρόποι Μελέτης</h2><span class="ln"></span></div>
      <div class="modes" id="modes"></div>

      <div class="sec-h" id="ai-sec" style="margin-top:36px;display:none;"><span class="n">§ Γ</span><h2>Γραπτή Εξάσκηση — AI</h2><span class="ln"></span></div>
      <div class="modes" id="aimodes" style="display:none;"></div>

      <div class="sec-h" id="exam-sec" style="margin-top:36px;display:none;"><span class="n">§ Δ</span><h2>Αξιολόγηση</h2><span class="ln"></span></div>
      <div class="modes" id="exammodes" style="display:none;"></div>

      <div class="meander mndr center" style="margin:40px auto 8px;max-width:120px;"></div>
      <p style="text-align:center;font-family:var(--f-quote);font-style:italic;font-size:16px;color:var(--stone);margin:0 0 30px;">
        Επτά τρόποι· μία ύλη. Διάλεξε ενότητα και μέθοδο.</p>
    </div>
  </div>

  <!-- ════ MODE SCREENS (filled by JS) ════ -->
  <div class="screen" id="m-read"></div>
  <div class="screen" id="m-mc"></div>
  <div class="screen" id="m-match"></div>
  <div class="screen" id="m-fc"></div>
  <div class="screen" id="m-tl"></div>
  <div class="screen" id="m-tf"></div>
  <div class="screen" id="m-fib"></div>
  <div class="screen" id="m-vid"></div>

  <!-- ════ AI-GRADED METHOD SCREENS (filled by JS) ════ -->
  <div class="screen" id="mt-anaptyxi"></div>
  <div class="screen" id="mt-orismoi"></div>
  <div class="screen" id="mt-pigi"></div>
  <div class="screen" id="mt-sl"></div>
  <div class="screen" id="mt-sygkrisi"></div>
  <div class="screen" id="m-aigen"></div>

  <!-- ════ TIMED EXAMS (Τεστ / Διαγώνισμα) ════ -->
  <div class="screen" id="tt-exam"></div>

  <!-- foundation -->
  <script src="js/sym-icons.js"></script>
  <!-- content packs -->
  <script src="js/content/g3.js"></script>
  <script src="js/content/scaffolds.js"></script>
  <!-- engine -->
  <script src="js/data-layer.js"></script>
  <script src="js/study-kit.js"></script>
  <script src="js/hub.js"></script>
  <script src="js/methods.js"></script>
  <script src="js/aigen.js"></script>
  <script src="js/test.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
