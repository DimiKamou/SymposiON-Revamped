<!-- ══════════ ADMIN (Command Center) — admin-only, lazy-visible ══════════
     Ver1 admin styles. Scoped to #page-admin so they never touch the shell.
     The overlay host (#page-admin) is added below; SYM_SCREENS.admin shows it. -->
<link rel="stylesheet" href="css/admin-cc.css"/>
<link rel="stylesheet" href="css/admin-studio.css"/>
<link rel="stylesheet" href="css/admin-realm.css"/>

<style id="syn-admin-host-css">
  /* Full-screen overlay host for the admin Command Center. Hidden until the
     admin screen activates it (SYM_SCREENS.admin). Synthesis has no Ver1
     .page system, so we self-position here instead of pulling main.css. */
  /* Above the harness top-bar (z-index:9000) and tweaks (9400) so the admin
     Command Center is a true full-screen takeover, not layered under them. */
  #page-admin { position:fixed; inset:0; z-index:9600; display:none; }
  #page-admin.syn-admin-on { display:flex; }
  .syn-admin-back {
    position:fixed; top:14px; right:18px; z-index:9700;
    font:600 13px/1 'Montserrat',system-ui,sans-serif; letter-spacing:.3px;
    color:#EDE5DA; background:rgba(40,32,24,.85); border:1px solid rgba(212,174,88,.4);
    border-radius:999px; padding:9px 16px; cursor:pointer; display:none;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  #page-admin.syn-admin-on ~ .syn-admin-back,
  .syn-admin-back.syn-admin-on { display:block; }
  .syn-admin-back:hover { background:#C8512E; border-color:#C8512E; color:#fff; }
</style>
</head>
<body>

<div class="harness" id="harness"></div>

<div class="stage theme-alabaster">
  <div id="sym-home" class="theme-alabaster dir-synthesis"></div>
</div>

<div class="tweaks" id="tweaks"></div>

<!-- ══════════ ADMIN OVERLAY HOST ══════════
     Command Center mounts here (admin-cc.js _renderAdminPage). Hidden until the
     admin screen activates it. Back button returns to the home shell. -->
<div id="page-admin"></div>
<button class="syn-admin-back" id="syn-admin-back" onclick="if(window.symGo)symGo('home')">✕ Κλείσιμο</button>

<!-- ══════════ AUTH MODAL (Firebase login / signup) ══════════
     Brought from Ver1; driven by js/auth.js. Carries .theme-alabaster so it
     inherits the revamp's token tree, and .sym-auth-skin for the on-brand
     skin in css/auth-skin.css. -->
<div id="auth-modal" class="auth-modal-overlay sym-auth-skin theme-alabaster" onclick="if(event.target===this)closeAuthModal()">
  <div class="auth-modal-box sym-auth">

    <div class="auth-modal-top">
      <div class="auth-modal-logo">Symposi<span>ON</span></div>
      <button class="auth-close-btn" onclick="closeAuthModal()">✕</button>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login"  onclick="switchAuthTab('login')">Είσοδος</button>
      <button class="auth-tab"        id="auth-tab-signup" onclick="switchAuthTab('signup')">Εγγραφή</button>
    </div>

    <!-- OAuth buttons -->
    <div class="auth-oauth-row">
      <button class="auth-oauth-btn auth-google-btn" id="auth-google-btn" onclick="signInWithGoogle()" title="Google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Google
      </button>
      <button class="auth-oauth-btn auth-microsoft-btn" id="auth-microsoft-btn" onclick="signInWithMicrosoft()" title="Microsoft / Outlook">
        <svg width="18" height="18" viewBox="0 0 23 23" aria-hidden="true">
          <rect x="1"  y="1"  width="10" height="10" fill="#F25022"/>
          <rect x="12" y="1"  width="10" height="10" fill="#7FBA00"/>
          <rect x="1"  y="12" width="10" height="10" fill="#00A4EF"/>
          <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
        </svg>
        Microsoft
      </button>
    </div>

    <div class="auth-divider"><span>ή</span></div>

    <!-- LOGIN FORM -->
    <div id="auth-view-login" style="display:flex;flex-direction:column;gap:10px;">
      <input class="auth-input" type="email"    id="auth-email"    placeholder="Email" autocomplete="email"/>
      <input class="auth-input" type="password" id="auth-password" placeholder="Κωδικός" autocomplete="current-password"/>
      <button class="auth-submit-btn" id="auth-submit-btn" data-label="Είσοδος →" onclick="signInWithEmail()">Είσοδος →</button>
      <p class="auth-switch-link">Δεν έχεις λογαριασμό; <span onclick="switchAuthTab('signup')">Εγγραφή</span></p>
    </div>

    <!-- SIGNUP FORM -->
    <div id="auth-view-signup" style="display:none;flex-direction:column;gap:10px;">
      <input class="auth-input" type="text"     id="auth-name"            placeholder="Όνομα" autocomplete="name"/>
      <input class="auth-input" type="email"    id="auth-signup-email"    placeholder="Email" autocomplete="email"/>
      <input class="auth-input" type="password" id="auth-signup-password" placeholder="Κωδικός (min 6)" autocomplete="new-password"/>
      <button class="auth-submit-btn" data-label="Δημιουργία Λογαριασμού →" onclick="signUpWithEmail()">Δημιουργία Λογαριασμού →</button>
      <p class="auth-switch-link">Έχεις ήδη λογαριασμό; <span onclick="switchAuthTab('login')">Είσοδος</span></p>
    </div>

    <div class="auth-error" id="auth-error" style="display:none;"></div>
  </div>
</div>

<!-- ══════════ SIGN-OUT CONFIRMATION MODAL ══════════ -->
<div id="signout-modal" class="sym-confirm-overlay sym-auth-skin theme-alabaster" onclick="if(event.target===this)closeSignoutModal()">
  <div class="sym-confirm-box">
    <div class="sym-confirm-icon">↩</div>
    <div class="sym-confirm-title">Έξοδος από τον λογαριασμό</div>
    <div class="sym-confirm-msg">Θέλεις σίγουρα να αποσυνδεθείς;</div>
    <div class="sym-confirm-btns">
      <button class="sym-confirm-btn sym-confirm-cancel" onclick="closeSignoutModal()">Άκυρο</button>
      <button class="sym-confirm-btn sym-confirm-yes" onclick="_doSignOut()">Ναι, έξοδος</button>
    </div>
  </div>
</div>
