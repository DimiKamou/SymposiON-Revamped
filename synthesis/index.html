     admin screen activates it (SYM_SCREENS.admin). Synthesis has no Ver1
     .page system, so we self-position here instead of pulling main.css. */

     Command Center is a true full-screen takeover, not layered under them. */
  #page-admin { position:fixed; inset:0; z-index:9600; display:none; }
  #page-admin.syn-admin-on { display:flex; }
  .syn-admin-back {
    position:fixed; top:14px; right:18px; z-index:9700;
    font:600 13px/1 'Montserrat',system-ui,sans-serif; letter-spacing:.3px;
    color:#EDE5DA; background:rgba(40,32,24,.85); border:1px solid rgba(212,174,88,.4);
    border-radius:999px; padding:9px 16px; cursor:pointer; display:none;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  #page-admin.syn-admin-on ~ .syn-admin-back,
  .syn-admin-back.syn-admin-on { display:block; }
  .syn-admin-back:hover { background:#C8512E; border-color:#C8512E; color:#fff; }

          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>

<!-- ══════════ HYDRATED BOOT LOADER GATEWAY (ported from Ver1) ══════════
     Show the branded SymLoader (the real one is defined in app.js, loaded just
     above — its earlier loader.js namesake is shadowed) at boot, then hide it
     once Firebase auth resolves so the shell paints in its final signed-in/out
     state (no logged-out→in flash). Fail-open: if the Firebase CDN is blocked/
     offline, the polls give up after ~3s and a 4s hard fail-safe reveals the
     app regardless. -->
<script>
(function () {
  if (typeof SymLoader === 'undefined' || !SymLoader.show) return;
  SymLoader.show();
  var _hidden = false, _tries = 0;
  function _hide(){ if (_hidden) return; _hidden = true; setTimeout(function(){ SymLoader.hide(); }, 180); }
  var gate = setInterval(function () {
    _tries++;
    if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length
        && (typeof _firebaseReady === 'undefined' || _firebaseReady)) {
      clearInterval(gate);
      try { firebase.auth().onAuthStateChanged(function () { _hide(); }); }
      catch (e) { _hide(); }
    } else if (_tries > 60) {        // ~3s — Firebase never came up (CDN blocked / offline)
      clearInterval(gate); _hide();
    }
  }, 50);
  setTimeout(function () { clearInterval(gate); _hide(); }, 4000);   // absolute fail-safe
})();
</script>
