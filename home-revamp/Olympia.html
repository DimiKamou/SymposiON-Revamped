<!-- ── Olympia focus + direction switcher ──────────────────────────── -->
<script>
(function () {
  // Boot straight into the Olympia (Temple) screen, in the Fusion direction.
  if (window.STATE) { window.STATE.screen = 'temple'; window.STATE.direction = 'synthesis'; }

  var DIRS = [
    { id:'warm',   cls:'oly-warm',   theme:'obsidian',   nm:'Obsidian',   gr:'Ὀψιδιανός',  a:'#0A0907', b:'#D2A24A' },
    { id:'verd',   cls:'oly-verd',   theme:'acroterion', nm:'Acroterion', gr:'Ἀκρωτήριον', a:'#08110F', b:'#3E9183' },
    { id:'orphic', cls:'oly-orphic', theme:'orphic',     nm:'Orphic',     gr:'Ὀρφικὴ Νύξ', a:'#07080C', b:'#8E7FD6' },
  ];
  var CLASSES = DIRS.map(function (d) { return d.cls; });
  var bar = null;

  function applyDir(d, doRender) {
    CLASSES.forEach(function (c) { document.body.classList.remove(c); });
    document.body.classList.add(d.cls);
    if (window.STATE) { window.STATE.theme = d.theme; window.STATE.season = null; }
    if (window.SymSeasons) { try { SymSeasons.apply(null); } catch (e) {} }
    if (window.SymStore) SymStore.set('oly_dir', d.id);
    if (doRender !== false && window.symRender) window.symRender();
    if (bar) bar.querySelectorAll('.oly-switch__b').forEach(function (b) {
      b.classList.toggle('on', b.getAttribute('data-dir') === d.id);
    });
  }

  function buildBar(active) {
    bar = document.createElement('div');
    bar.className = 'oly-switch';
    var lbl = document.createElement('span');
    lbl.className = 'oly-switch__lbl';
    lbl.textContent = 'Direction';
    bar.appendChild(lbl);
    DIRS.forEach(function (d) {
      var b = document.createElement('button');
      b.className = 'oly-switch__b' + (d.id === active ? ' on' : '');
      b.setAttribute('data-dir', d.id);
      b.style.setProperty('--a', d.a);
      b.style.setProperty('--c', d.b);
      b.innerHTML =
        '<span class="oly-switch__sw"></span>' +
        '<span class="oly-switch__tx">' +
          '<span class="oly-switch__nm">' + d.nm + '</span>' +
          '<span class="oly-switch__gr">' + d.gr + '</span>' +
        '</span>';
      b.addEventListener('click', function () { applyDir(d, true); });
      bar.appendChild(b);
    });
    document.body.appendChild(bar);
  }

  function init() {
    var saved = (window.SymStore && SymStore.get('oly_dir', 'warm')) || 'warm';
    var d0 = DIRS.filter(function (x) { return x.id === saved; })[0] || DIRS[0];
    buildBar(d0.id);
    applyDir(d0, true);
    document.body.classList.add('oly-ready');
  }

  // boot() runs on DOMContentLoaded first; this listener (registered later) runs after it.
  if (document.readyState !== 'loading') init();
  else document.addEventListener('DOMContentLoaded', init);
})();
</script>
