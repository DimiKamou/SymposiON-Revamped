    context: {
      en: 'At 3 a.m. on 28 October 1940 the Italian ambassador wakes Prime Minister Metaxas with an ultimatum: free passage for Italian troops, or war. The answer — remembered by the people as a single word, "OXI" — is war at dawn. Mussolini\'s army pours over the Epirus frontier in rain and mud. Pre-war planning had written off Epirus as indefensible, ordering a fighting withdrawal to the Arachthos river; but the VIII Division\'s commander believes the swollen Kalamas and the hills of Elaia can stop an army.',
      el: 'Στις 3 τα ξημερώματα της 28ης Οκτωβρίου 1940 ο Ιταλός πρέσβης ξυπνά τον πρωθυπουργό Μεταξά με τελεσίγραφο: ελεύθερη διέλευση των ιταλικών στρατευμάτων, ή πόλεμος. Η απάντηση — που ο λαός τη θυμάται ως μία λέξη, «ΟΧΙ» — είναι πόλεμος με την αυγή. Ο στρατός του Μουσολίνι ξεχύνεται στο ηπειρωτικό μέτωπο μέσα σε βροχή και λάσπη. Ο προπολεμικός σχεδιασμός είχε ξεγράψει την Ήπειρο ως μη υπερασπίσιμη, διατάσσοντας ελαστική σύμπτυξη στον Άραχθο· όμως ο διοικητής της VIII Μεραρχίας πιστεύει ότι ο φουσκωμένος Καλαμάς και τα υψώματα της Ελαίας μπορούν να σταματήσουν στρατιά.',

    terms: [
      { term: { en: '“OXI” — 28 October', el: '«ΟΧΙ» — 28 Οκτωβρίου' }, def: { en: 'The refusal of the Italian ultimatum, celebrated as a national anniversary.', el: 'Η απόρριψη του ιταλικού τελεσιγράφου, εθνική επέτειος έκτοτε.' } },

    dilemma: {
      en: 'Doctrine and the capital say: trade space for time, fall back to the Arachthos, let mobilization complete behind a deep buffer — Epirus, including Ioannina, is the price. Katsimitros says: the ground itself fights here — the flooded Kalamas, the marsh of Kalpaki, registered artillery on every approach — and yielding it gifts Mussolini the triumphal entry his propaganda has already printed. Disobeying the spirit of GHQ\'s plan means courting ruin if the line breaks.',
      el: 'Το δόγμα και η πρωτεύουσα λένε: ανταλλαγή χώρου με χρόνο, σύμπτυξη στον Άραχθο, ολοκλήρωση της επιστράτευσης πίσω από βαθύ προκάλυμμα — με τίμημα την Ήπειρο, μαζί και τα Γιάννενα. Ο Κατσιμήτρος λέει: εδώ πολεμά το ίδιο το έδαφος — ο πλημμυρισμένος Καλαμάς, ο βάλτος του Καλπακίου, πυροβολικό ρυθμισμένο σε κάθε προσπέλαση — και η εγκατάλειψή του χαρίζει στον Μουσολίνι τη θριαμβευτική είσοδο που η προπαγάνδα του έχει ήδη τυπώσει. Η ανυπακοή στο πνεύμα του σχεδίου του ΓΕΣ φλερτάρει με την καταστροφή αν η γραμμή σπάσει.',

    choices: [

          el: 'Άμυνα στην Ελαία–Καλαμά: η προωθημένη γραμμή κρατιέται με ευθύνη του στρατηγού, οι γέφυρες ναρκοθετούνται, κάθε πυροβόλο σκοπεύει το στένωμα του Καλπακίου — και συγχρόνως το απόσπασμα Δαβάκη να αφαιμάξει τη Μεραρχία Τζούλια στα περάσματα της Πίνδου.',

        outcome: {
          en: 'The invasion breaks on the river. Italian armor drowns in the Kalpaki marsh under pre-registered fire; in the Pindos, villagers — women famously carrying shells up the mule-paths — help Davakis cut off the Julia. Within three weeks the invaders are back across the border, and the world\'s front pages carry their first Axis defeat.',

        outcome: {

    note: {

      en: 'The invader has been thrown out of Greece — and the question nobody dared ask in October is suddenly real: pursue into Italian-held Albania? Winter in the Pindos kills as surely as bullets — frostbite will claim more men than combat — and every kilometre forward stretches mule-track supply lines. But the Italian army is off balance, Britain\'s only fighting ally is watching the world watch Greece, and in the villages of Northern Epirus Greek church bells are waiting.',

          el: 'Η Κορυτσά πέφτει στις 22 Νοεμβρίου με τις καμπάνες να χτυπούν, η Κλεισούρα τον Ιανουάριο· το ένα τέταρτο της Αλβανίας είναι σε ελληνικά χέρια και η ιταλική εαρινή επίθεση, όταν έρχεται, σπάει σε εννέα μέρες πάνω σε στρατιώτες που πατούν κατακτημένο έδαφος. Το κόστος γράφεται σε κρυοπαγημένα πόδια — αλλά το Έπος ολοκληρώνεται, και ο Χίτλερ πρέπει τώρα να κάνει ό,τι δεν μπόρεσε ο Μουσολίνι.',

const T = ({ x, y, children, fill = MC.label, size = 8.5, anchor = 'middle', bold = false, rotate = 0, o = 1 }) => (
  <text x={x} y={y} fill={fill} fontSize={size} textAnchor={anchor} opacity={o}
    transform={rotate ? `rotate(${rotate} ${x} ${y})` : undefined}
    paintOrder="stroke" stroke="rgba(6,10,19,0.85)" strokeWidth="2.6" strokeLinejoin="round"
    fontFamily="'Plus Jakarta Sans', sans-serif" fontWeight={bold ? 700 : 500} letterSpacing="0.07em">{children}</text>
);

const FX_BY_SYM = {
  uHop: 'anim-bob', uPers: 'anim-bob', uPike: 'anim-bob', uRifle: 'anim-bob', uCav: 'anim-bob', uChar: 'anim-bob',
  uShip: 'anim-rock', uSteam: 'anim-rock', uFlame: 'anim-flick', uClash: 'anim-clash', uPara: 'anim-drop', uBombard: 'anim-kick',
};
function Unit({ sym, x, y, w = 13, color, mirror = false, rot = 0, o = 1, fx }) {
  const t = `translate(${x} ${y})${rot ? ` rotate(${rot})` : ''}${mirror ? ' scale(-1 1)' : ''}`;
  const cls = fx === 'none' ? undefined : (fx || FX_BY_SYM[sym]);
  const delay = -(((x * 7 + y * 13) % 17) / 10);
  return (
    <g transform={t} style={{ color }} opacity={o}>
      <g className={cls} style={cls ? { animationDelay: `${delay}s` } : undefined}>
        <use href={`#${sym}`} x={mirror ? -w : 0} y={0} width={w} height={w} />
      </g>
    </g>
  );
}
function Rank({ sym, x, y, n, dx = 11, dy = 0, ...rest }) {
  return (
    <g>{Array.from({ length: n }).map((_, i) => (
      <Unit key={i} sym={sym} x={x + i * dx} y={y + i * dy} {...rest} />
    ))}</g>
  );
}
/* A unit that travels along an SVG path, looping — the moving soldier/ship/rider */
function Mover({ sym, path, w = 13, color, mirror = false, o = 1, dur = 6, begin = '0s' }) {
  return (
    <g style={{ color }} opacity={o}>
      <g transform={mirror ? 'scale(-1 1)' : undefined}>
        <use href={`#${sym}`} x={-w / 2} y={-w / 2} width={w} height={w} />
      </g>
      <animateMotion dur={`${dur}s`} begin={begin} repeatCount="indefinite" path={path} />
    </g>
  );
}
/* A steady stream of movers on the same route — a marching column */
function Column({ sym, path, n = 3, dur = 8, w = 13, color, mirror = false, o = 1 }) {
  return (
    <g>{Array.from({ length: n }).map((_, i) => (
      <Mover key={i} sym={sym} path={path} dur={dur} w={w} color={color} mirror={mirror} o={o} begin={`${-(dur / n) * i}s`} />
    ))}</g>
  );
}
const Ridge = ({ d, o = 1 }) => (
  <g opacity={o}>
    <path d={d} fill="#242b39" stroke={MC.landLine} strokeWidth="0.9" strokeLinejoin="round" />
    <path d={d} fill="none" stroke="rgba(226,232,240,0.13)" strokeWidth="0.7" strokeDasharray="1.5 3" />
  </g>
);
const Contour = ({ d, o = 0.16 }) => (
  <path d={d} fill="none" stroke="#cbd5e1" strokeWidth="0.6" opacity={o} />
);

   SCENARIO VIEW — 3-step loop
   ============================================================ */
function ScenarioView({ lang, setLang, scenario, scenarioNum, totalScenarios, step, setStep, unity, power, chosenIndex, onChoose, onAdvance, isLastOfRun }) {
  const t = UI[lang];
  const phase = PHASES.find((p) => p.key === scenario.phase);
  const MapComp = MAPS[scenario.mapId];
  const chosen = chosenIndex != null ? scenario.choices[chosenIndex] : null;
  const positive = chosen ? (chosen.unity + chosen.power) > 0 : false;

  return (
    <motion.div key={scenario.id} {...fadeUp} className="w-full max-w-4xl mx-auto">
      {/* Command header */}
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div className="flex items-center gap-3">
          <span className="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-900/80 border border-slate-700/60 text-[11px] font-bold uppercase tracking-widest text-slate-400">
            <Icon name={phase.icon} size={13} className="text-cyan-300" /> {phase.name[lang]}
          </span>
          <span className="text-[11px] font-semibold uppercase tracking-widest text-slate-500">{t.scenarioOf(scenarioNum, totalScenarios)}</span>
        </div>
        <LangToggle lang={lang} setLang={setLang} />
      </div>

      {/* Metrics dashboard */}
      <div className="glass-card rounded-2xl px-5 py-4 mb-5 flex flex-col sm:flex-row gap-4 sm:gap-8">
        <MetricBar label={t.unity} value={unity} icon="Users" color="cyan" />
        <MetricBar label={t.power} value={power} icon="Crown" color="tyrian" />
      </div>

      {/* Main tactical card */}
      <div className="glass-card rounded-2xl overflow-hidden">
        <div className="px-6 sm:px-8 pt-6 pb-5 border-b border-marble-300/15 greek-key-border">
          <div className="flex flex-wrap items-end justify-between gap-3">
            <div>
              <p className="text-marble-300/90 text-[11px] font-bold uppercase tracking-[0.25em] mb-1">{t.year(scenario.year)} · {t.location}: {scenario.location[lang]}</p>
              <h2 className="font-display font-bold text-2xl sm:text-3xl text-slate-100">{scenario.title[lang]}</h2>
            </div>
            <StepPips step={step} />
          </div>
        </div>

        <AnimatePresence mode="wait">
          {/* ---- STEP 1: SOURCE ANALYSIS ---- */}
          {step === 1 && (
            <motion.div key="s1" {...fadeUp} className="px-6 sm:px-8 py-7">
              <p className="flex items-center gap-2 text-cyan-300 text-xs font-bold uppercase tracking-[0.2em] mb-5">
                <Icon name="Scroll" size={15} /> {t.step1Title}
              </p>
              {scenario.context && (
                <div className="rounded-xl border border-slate-700/60 bg-slate-900/50 px-5 py-4 mb-5">
                  <p className="flex items-center gap-2 text-marble-300 text-[11px] font-bold uppercase tracking-widest mb-2">
                    <Icon name="Compass" size={13} /> {t.briefing}
                  </p>
                  <p className="text-slate-300 text-sm leading-relaxed">{scenario.context[lang]}</p>
                </div>
              )}
              <div className="relative rounded-xl border border-cyan-400/25 bg-cyan-400/5 px-6 py-6 sm:px-8">
                <span className="absolute -top-3 left-6 px-2.5 bg-slate-900 text-cyan-300 text-[10px] font-bold uppercase tracking-widest border border-cyan-400/25 rounded">
                  {t.theSourceSays}
                </span>
                <blockquote className="font-display text-lg sm:text-xl text-slate-200 leading-relaxed italic">
                  {scenario.source.quote[lang]}
                </blockquote>
                <p className="mt-4 text-cyan-300/90 text-sm font-semibold flex items-center gap-2">
                  <Icon name="BookOpen" size={14} /> — {scenario.source.author[lang]}
                </p>
              </div>
              {scenario.terms && (
                <div className="mt-5">
                  <p className="text-[10px] font-bold uppercase tracking-[0.25em] text-slate-500 mb-2.5">{t.keyTerms}</p>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-2.5">
                    {scenario.terms.map((k, i) => (
                      <div key={i} className="rounded-lg border border-slate-700/60 bg-slate-900/50 px-3.5 py-2.5">
                        <p className="text-cyan-200 text-xs font-bold">{k.term[lang]}</p>
                        <p className="text-slate-400 text-[11px] leading-snug mt-1">{k.def[lang]}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div className="mt-7 flex justify-center">
                <motion.button
                  whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }}
                  onClick={() => setStep(2)}
                  className="inline-flex items-center gap-2.5 px-8 py-3.5 rounded-xl bg-gradient-to-r from-cyan-600 to-teal-500 text-slate-950 font-bold text-sm uppercase tracking-widest shadow-glow-cyan hover:from-cyan-500 hover:to-teal-400 transition-colors"
                >
                  <Icon name="Compass" size={17} /> {t.analyzeSource}
                </motion.button>
              </div>
            </motion.div>
          )}

          {/* ---- STEP 2: STRATEGIC CHOICE & MAP ---- */}
          {step === 2 && (
            <motion.div key="s2" {...fadeUp} className="px-6 sm:px-8 py-7">
              <p className="flex items-center gap-2 text-cyan-300 text-xs font-bold uppercase tracking-[0.2em] mb-5">
                <Icon name="Map" size={15} /> {t.step2Title}
              </p>
              <div className="rounded-xl border border-slate-700/60 bg-slate-900/50 px-5 py-4 mb-5">
                <p className="flex items-center gap-2 text-laurel-300 text-[11px] font-bold uppercase tracking-widest mb-2">
                  <Icon name="AlertTriangle" size={13} /> {t.dilemmaTitle}
                </p>
                <p className="text-slate-300 text-sm leading-relaxed">{scenario.dilemma[lang]}</p>
              </div>
              <p className="flex items-center gap-2 text-slate-400 text-[11px] font-bold uppercase tracking-widest mb-2.5">
                <Icon name="Compass" size={13} className="text-cyan-300" /> {t.mapTitle}
              </p>
              <MapComp lang={lang} />
              <p className="mt-6 mb-3 font-display text-marble-200 text-base font-bold">{t.choicePrompt}</p>
              <div className="grid grid-cols-1 gap-4">
                {scenario.choices.map((c, i) => (
                  <motion.button
                    key={i}
                    whileHover={{ y: -4, scale: 1.012 }} whileTap={{ scale: 0.99 }}
                    onClick={() => onChoose(i)}
                    className="text-left rounded-xl border border-slate-700/70 bg-slate-900/60 px-5 py-4 hover:border-cyan-400/70 hover:shadow-glow-cyan hover:bg-slate-900/90 transition-all duration-300 group"
                  >
                    <span className={`inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.25em] mb-2 ${i === 0 ? 'text-cyan-300' : 'text-purple-300'}`}>
                      <Icon name="Swords" size={12} /> {i === 0 ? t.optionA : t.optionB}
                    </span>
                    <p className="text-slate-200 text-sm leading-relaxed group-hover:text-slate-50 transition-colors">{c.text[lang]}</p>
                  </motion.button>
                ))}
              </div>
            </motion.div>
          )}

          {/* ---- STEP 3: OUTCOME FEEDBACK ---- */}
          {step === 3 && chosen && (
            <motion.div key="s3" {...fadeUp} className="px-6 sm:px-8 py-7">
              <p className="flex items-center gap-2 text-cyan-300 text-xs font-bold uppercase tracking-[0.2em] mb-5">
                <Icon name="Hourglass" size={15} /> {t.step3Title}
              </p>
              <div className={`rounded-xl border px-6 py-6 ${positive ? 'border-emerald-500/40 bg-emerald-500/5' : 'border-rose-500/40 bg-rose-500/5'}`}>
                <p className={`flex items-center gap-2 font-display font-bold text-lg mb-3 ${positive ? 'text-emerald-400' : 'text-rose-400'}`}>
                  <Icon name={positive ? 'TrendingUp' : 'Flame'} size={19} />
                  {positive ? t.outcomeTriumph : t.outcomeSetback}
                </p>
                <p className="text-slate-200 text-sm sm:text-[15px] leading-relaxed">{chosen.outcome[lang]}</p>
                <div className="mt-5 pt-4 border-t border-slate-700/50">
                  <p className="text-[10px] font-bold uppercase tracking-[0.25em] text-slate-500 mb-2.5">{t.metricShift}</p>
                  <div className="flex flex-wrap gap-2.5">
                    <DeltaChip label={t.unityDelta} delta={chosen.unity} color="cyan" />
                    <DeltaChip label={t.powerDelta} delta={chosen.power} color="tyrian" />
                  </div>
                </div>
              </div>
              {scenario.note && (
                <div className="mt-5 rounded-xl border border-laurel-300/25 bg-laurel-300/5 px-5 py-4">
                  <p className="flex items-center gap-2 text-laurel-300 text-[11px] font-bold uppercase tracking-widest mb-2">
                    <Icon name="BookOpen" size={13} /> {t.histNote}
                  </p>
                  <p className="text-slate-300 text-sm leading-relaxed italic">{scenario.note[lang]}</p>
                </div>
              )}
              <div className="mt-7 flex justify-center">
                <motion.button
                  whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }}
                  onClick={onAdvance}
                  className="inline-flex items-center gap-2.5 px-8 py-3.5 rounded-xl bg-gradient-to-r from-purple-600 to-fuchsia-500 text-white font-bold text-sm uppercase tracking-widest shadow-glow-tyrian hover:from-purple-500 hover:to-fuchsia-400 transition-colors"
                >
                  {isLastOfRun ? t.concludePhase : t.nextScenario} <Icon name="ChevronRight" size={17} />
                </motion.button>
              </div>
            </motion.div>
          )}
        </AnimatePresence>
      </div>
    </motion.div>
  );
}

/* ============================================================
   ERA / GRAND CAMPAIGN OUTCOME SCREENS
   ============================================================ */
function EndingScreen({ lang, setLang, phaseKey, unity, power, mode, history, onContinue, onReplay, onHub, isGrandFinale }) {
  const t = UI[lang];
  const tier = resolveTier(unity, power);
  const phase = PHASES.find((p) => p.key === phaseKey);
  const ending = PHASE_ENDINGS[phaseKey][tier];
  const grand = GRAND_VERDICT[tier];
  const tierStyles = {
    golden: { ring: 'border-laurel-300/60', glow: 'shadow-glow-ivory', text: 'text-laurel-300', icon: 'Trophy' },
    endured: { ring: 'border-cyan-400/50', glow: 'shadow-glow-cyan', text: 'text-cyan-300', icon: 'Shield' },
    collapse: { ring: 'border-rose-500/50', glow: '', text: 'text-rose-400', icon: 'Flame' },
  }[tier];
  const canContinue = mode === 'all' && !isGrandFinale;

  return (
    <motion.div key={`end-${phaseKey}-${isGrandFinale}`} {...fadeUp} className="w-full max-w-3xl mx-auto">
      <div className="flex justify-end mb-4"><LangToggle lang={lang} setLang={setLang} /></div>
      <div className={`glass-card rounded-2xl overflow-hidden ${tierStyles.glow}`}>
        <div className="px-6 sm:px-10 pt-9 pb-7 text-center border-b border-slate-700/50">
          <motion.div initial={{ scale: 0.6, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} transition={{ duration: 0.6, delay: 0.15 }}
            className={`inline-flex items-center justify-center w-16 h-16 rounded-2xl border bg-slate-900/80 mb-4 ${tierStyles.ring} ${tierStyles.text}`}>
            <Icon name={tierStyles.icon} size={30} strokeWidth={1.6} />
          </motion.div>
          <p className="text-[11px] font-bold uppercase tracking-[0.3em] text-slate-500 mb-2">
            {isGrandFinale ? t.campaignComplete : `${t.phaseComplete} — ${phase.name[lang]}`}
          </p>
          <h2 className={`font-display font-black text-2xl sm:text-4xl ${tierStyles.text}`}>
            {isGrandFinale ? grand.title[lang] : ending.title[lang]}
          </h2>
          {typeof RANKS !== 'undefined' && (
            <p className="mt-3 inline-flex items-center gap-2 px-3.5 py-1.5 rounded-lg border border-slate-700/60 bg-slate-900/60 text-[11px] font-bold uppercase tracking-widest text-slate-300">
              <Icon name="Trophy" size={13} className={tierStyles.text} /> {t.rankLabel}: <span className={tierStyles.text}>{RANKS[tier][lang]}</span>
            </p>
          )}
        </div>
        <div className="px-6 sm:px-10 py-7">
          <p className="flex items-center gap-2 text-slate-500 text-[11px] font-bold uppercase tracking-[0.25em] mb-3">
            <Icon name="BookOpen" size={13} /> {t.verdict}
          </p>
          <p className="text-slate-200 text-sm sm:text-[15px] leading-relaxed">
            {isGrandFinale ? grand.text[lang] : ending.text[lang]}
          </p>
          {isGrandFinale && (
            <p className="text-slate-400 text-sm leading-relaxed mt-4 border-l-2 border-laurel-300/40 pl-4 italic">
              {ending.text[lang]}
            </p>
          )}
          <div className="mt-7">
            <p className="text-[11px] font-bold uppercase tracking-[0.25em] text-slate-500 mb-3">{t.finalStanding}</p>
            <div className="flex flex-col sm:flex-row gap-4 sm:gap-8">
              <MetricBar label={t.unity} value={unity} icon="Users" color="cyan" />
              <MetricBar label={t.power} value={power} icon="Crown" color="tyrian" />
            </div>
          </div>
          {history.length > 0 && (
            <div className="mt-7">
              <p className="text-[11px] font-bold uppercase tracking-[0.25em] text-slate-500 mb-3">{t.chronicleOfDecisions}</p>
              <ul className="space-y-2">
                {history.map((h, i) => {
                  const sc = SCENARIOS.find((s) => s.id === h.id);
                  const ch = sc.choices[h.choice];
                  const good = (ch.unity + ch.power) > 0;
                  return (
                    <li key={i} className="flex items-center justify-between gap-3 rounded-lg border border-slate-700/50 bg-slate-900/50 px-4 py-2.5">
                      <span className="flex items-center gap-2.5 text-xs text-slate-300 min-w-0">
                        <Icon name={good ? 'TrendingUp' : 'Flame'} size={13} className={good ? 'text-emerald-400 shrink-0' : 'text-rose-400 shrink-0'} />
                        <span className="truncate">{sc.title[lang]}</span>
                        <span className="text-slate-600 shrink-0">· {h.choice === 0 ? 'Α' : 'Β'}</span>
                      </span>
                      <span className="text-[11px] font-bold tabular-nums shrink-0">
                        <span className={ch.unity >= 0 ? 'text-cyan-300' : 'text-rose-400'}>{ch.unity >= 0 ? '+' : ''}{ch.unity}U</span>
                        <span className="text-slate-600 mx-1">/</span>
                        <span className={ch.power >= 0 ? 'text-purple-300' : 'text-rose-400'}>{ch.power >= 0 ? '+' : ''}{ch.power}P</span>
                      </span>
                    </li>
                  );
                })}
              </ul>
            </div>
          )}
          <div className="mt-8 flex flex-wrap justify-center gap-3">
            {canContinue && (
              <motion.button whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }} onClick={onContinue}
                className="inline-flex items-center gap-2 px-7 py-3 rounded-xl bg-gradient-to-r from-cyan-600 to-teal-500 text-slate-950 font-bold text-sm uppercase tracking-widest shadow-glow-cyan">
                <Icon name="Swords" size={16} /> {t.continueCampaign}
              </motion.button>
            )}
            <motion.button whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }} onClick={onReplay}
              className="inline-flex items-center gap-2 px-7 py-3 rounded-xl border border-purple-400/40 bg-slate-900/70 text-purple-300 font-bold text-sm uppercase tracking-widest hover:border-purple-400/80 hover:shadow-glow-tyrian transition-all">
              <Icon name="RotateCcw" size={16} /> {t.replay}
            </motion.button>
            <motion.button whileHover={{ scale: 1.04, y: -2 }} whileTap={{ scale: 0.97 }} onClick={onHub}
              className="inline-flex items-center gap-2 px-7 py-3 rounded-xl border border-slate-600/60 bg-slate-900/70 text-slate-300 font-bold text-sm uppercase tracking-widest hover:border-slate-400/60 transition-all">
              <Icon name="Home" size={16} /> {t.returnHub}
            </motion.button>
          </div>
        </div>
      </div>
    </motion.div>
  );
}

/* ============================================================
   ROOT APP — STATE MACHINE
   ============================================================ */
const BASELINE = { unity: 50, power: 20 };

function App() {
  const [lang, setLang] = useState('en');
  const [selectedPlayMode, setSelectedPlayMode] = useState(null); // "all" | "phase1" | "phase2" | "phase3" | null (hub)
  const [screen, setScreen] = useState('hub'); // 'hub' | 'game' | 'ending'
  const [currentScenarioIndex, setCurrentScenarioIndex] = useState(0);
  const [currentStep, setCurrentStep] = useState(1); // 1: Source, 2: Choice & Map, 3: Outcome
  const [unity, setUnity] = useState(BASELINE.unity);
  const [power, setPower] = useState(BASELINE.power);
  const [chosenIndex, setChosenIndex] = useState(null);
  const [history, setHistory] = useState([]);
  const [endedPhase, setEndedPhase] = useState(null);
  const [isGrandFinale, setIsGrandFinale] = useState(false);

  const runScenarios = useMemo(() => {
    if (!selectedPlayMode) return [];
    return selectedPlayMode === 'all' ? SCENARIOS : SCENARIOS.filter((s) => s.phase === selectedPlayMode);
  }, [selectedPlayMode]);

  const startRun = useCallback((mode) => {
    setSelectedPlayMode(mode);
    setCurrentScenarioIndex(0);
    setCurrentStep(1);
    setUnity(BASELINE.unity);
    setPower(BASELINE.power);
    setChosenIndex(null);
    setHistory([]);
    setEndedPhase(null);
    setIsGrandFinale(false);
    setScreen('game');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const scenario = runScenarios[currentScenarioIndex] || null;

  const handleChoose = useCallback((i) => {
    if (!scenario) return;
    const c = scenario.choices[i];
    setChosenIndex(i);
    setUnity((u) => clamp(u + c.unity));
    setPower((p) => clamp(p + c.power));
    setHistory((h) => [...h, { id: scenario.id, choice: i }]);
    setCurrentStep(3);
  }, [scenario]);

  const handleAdvance = useCallback(() => {
    if (!scenario) return;
    const isLastInRun = currentScenarioIndex === runScenarios.length - 1;
    const nextScenario = runScenarios[currentScenarioIndex + 1];
    const phaseBoundary = isLastInRun || (nextScenario && nextScenario.phase !== scenario.phase);
    if (phaseBoundary) {
      setEndedPhase(scenario.phase);
      setIsGrandFinale(selectedPlayMode === 'all' && isLastInRun);
      setScreen('ending');
    } else {
      setCurrentScenarioIndex((x) => x + 1);
      setCurrentStep(1);
      setChosenIndex(null);
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [scenario, currentScenarioIndex, runScenarios, selectedPlayMode]);

  const handleContinueCampaign = useCallback(() => {
    setScreen('game');
    setCurrentScenarioIndex((x) => x + 1);
    setCurrentStep(1);
    setChosenIndex(null);
    setEndedPhase(null);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const goHub = useCallback(() => {
    setSelectedPlayMode(null);
    setScreen('hub');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const isLastOfRun = scenario
    ? (currentScenarioIndex === runScenarios.length - 1 ||
       (runScenarios[currentScenarioIndex + 1] && runScenarios[currentScenarioIndex + 1].phase !== scenario.phase))
    : false;

  const endingHistory = useMemo(() => {
    if (!endedPhase) return history;
    if (isGrandFinale) return history;
    return history.filter((h) => {
      const sc = SCENARIOS.find((s) => s.id === h.id);
      return sc && sc.phase === endedPhase;
    });
  }, [history, endedPhase, isGrandFinale]);

  return (
    <div className="min-h-screen w-full px-4 py-8 sm:py-12 font-body">
      <AnimatePresence mode="wait">
        {screen === 'hub' && (
          <Hub key="hub" lang={lang} setLang={setLang} onStart={startRun} />
        )}
        {screen === 'game' && scenario && (
          <ScenarioView
            key={`game-${scenario.id}`}
            lang={lang} setLang={setLang}
            scenario={scenario}
            scenarioNum={currentScenarioIndex + 1}
            totalScenarios={runScenarios.length}
            step={currentStep} setStep={setCurrentStep}
            unity={unity} power={power}
            chosenIndex={chosenIndex}
            onChoose={handleChoose}
            onAdvance={handleAdvance}
            isLastOfRun={isLastOfRun}
          />
        )}
        {screen === 'ending' && endedPhase && (
          <EndingScreen
            key={`ending-${endedPhase}-${isGrandFinale}`}
            lang={lang} setLang={setLang}
            phaseKey={endedPhase}
            unity={unity} power={power}
            mode={selectedPlayMode}
            history={endingHistory}
            onContinue={handleContinueCampaign}
            onReplay={() => startRun(selectedPlayMode)}
            onHub={goHub}
            isGrandFinale={isGrandFinale}
          />
        )}
      </AnimatePresence>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
